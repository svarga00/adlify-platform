<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientský portál | Adlify</title>
    <link rel="icon" type="image/svg+xml" href="/shared/img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Adlify Design System -->
    <link rel="stylesheet" href="/shared/css/tokens.css">
    <link rel="stylesheet" href="/shared/css/ui.css">
    <link rel="stylesheet" href="/shared/css/chrome.css">
    <link rel="stylesheet" href="/shared/css/responsive.css">
    <script src="/shared/js/design/icons.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            min-height: 100vh;
            color: var(--ink);
        }

        /* ===== Topbar right actions ===== */
        .pt-iconbtn {
            width: 34px; height: 34px;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: inline-flex; align-items: center; justify-content: center;
            position: relative;
            color: var(--ink-sub);
            cursor: pointer;
        }
        .pt-iconbtn:hover { color: var(--ink); background: var(--n-50); }
        .pt-iconbtn .dot {
            position: absolute; top: 7px; right: 8px;
            width: 6px; height: 6px; border-radius: 99px; background: var(--brand-500);
        }

        /* ===== Dashboard hero ===== */
        .pt-hero {
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            border-radius: 16px;
            padding: 28px;
            color: #fff;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .pt-hero::before {
            content: ''; position: absolute; right: -50px; top: -50px;
            width: 260px; height: 260px;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
            pointer-events: none;
        }
        .pt-hero-row { display: flex; align-items: flex-start; gap: 40px; position: relative; }
        .pt-hero-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.85; font-weight: 600; }
        .pt-hero-value { font-size: 44px; font-weight: 700; letter-spacing: -1.5px; margin-top: 6px; line-height: 1.1; font-family: var(--font-mono); }
        .pt-hero-meta { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
        .pt-hero-chip {
            font-family: var(--font-mono);
            font-size: 13px;
            background: rgba(255,255,255,0.18);
            padding: 4px 10px; border-radius: 999px;
        }
        .pt-hero-sub { font-size: 13px; opacity: 0.85; }
        .pt-hero-spark { width: 300px; flex-shrink: 0; }
        @media (max-width: 720px) {
            .pt-hero-row { flex-direction: column; gap: 16px; }
            .pt-hero-spark { width: 100%; }
            .pt-hero-value { font-size: 34px; }
        }

        /* ===== KPI stat grid ===== */
        .pt-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        @media (max-width: 900px) { .pt-stats { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .pt-stats { grid-template-columns: 1fr; } }
        .pt-stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .pt-stat-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
        .pt-stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-top: 6px; font-family: var(--font-mono); color: var(--ink); }
        .pt-stat-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 11px; }
        .pt-stat-delta-up { color: var(--ok); font-weight: 600; }
        .pt-stat-delta-down { color: var(--err); font-weight: 600; }
        .pt-stat-hint { color: var(--ink-mute); }

        /* ===== Two-col dashboard grids ===== */
        .pt-grid-13 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin-bottom: 16px; }
        .pt-grid-2  { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 900px) { .pt-grid-13, .pt-grid-2 { grid-template-columns: 1fr; } }

        /* ===== Cards (light) ===== */
        .pt-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .pt-card-head {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
        }
        .pt-card-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
        .pt-card-body { padding: 18px; }
        .pt-card-body.tight { padding: 0; }

        /* ===== Campaign row in dashboard ===== */
        .pt-camp-row {
            padding: 14px 18px;
            display: grid;
            grid-template-columns: 2fr 100px 80px 80px 60px;
            gap: 14px;
            align-items: center;
        }
        .pt-camp-row + .pt-camp-row { border-top: 1px solid var(--border); }
        .pt-camp-name { font-size: 13px; font-weight: 600; color: var(--ink); }
        .pt-camp-meta { font-size: 11px; color: var(--ink-sub); display: flex; gap: 6px; align-items: center; margin-top: 2px; }
        @media (max-width: 720px) {
            .pt-camp-row { grid-template-columns: 1fr auto; }
            .pt-camp-row > :nth-child(n+3) { display: none; }
        }

        /* ===== Action items ===== */
        .pt-action {
            display: flex; gap: 12px;
            padding: 12px 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background .12s;
        }
        .pt-action:hover { background: var(--n-50); }
        .pt-action-icon {
            width: 34px; height: 34px; border-radius: 9px;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .pt-action-body { flex: 1; min-width: 0; }
        .pt-action-title { font-size: 13px; font-weight: 600; color: var(--ink); }
        .pt-action-sub { font-size: 11px; color: var(--ink-sub); margin-top: 2px; }

        /* ===== Team + events ===== */
        .pt-team-row { display: flex; align-items: center; gap: 14px; }
        .pt-team-name { font-size: 14px; font-weight: 600; color: var(--ink); }
        .pt-team-sub { font-size: 11px; color: var(--ink-sub); margin-top: 2px; }
        .pt-event {
            display: flex; gap: 14px;
            padding: 10px 0;
        }
        .pt-event + .pt-event { border-top: 1px dashed var(--border); }
        .pt-event-date {
            text-align: center; width: 44px; flex-shrink: 0;
            font-family: var(--font-mono);
            font-size: 15px; font-weight: 600; color: var(--ink);
        }
        .pt-event-time { font-size: 10px; color: var(--ink-mute); margin-top: 2px; }
        .pt-event-body { flex: 1; font-size: 13px; padding-left: 12px; border-left: 3px solid var(--acc-sky-ink); color: var(--ink); }

        /* ===== Preview banner ===== */
        .pt-preview-badge {
            background: color-mix(in oklab, var(--warn) 18%, var(--surface));
            color: var(--warn);
            font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
            font-size: 10px;
            padding: 3px 8px; border-radius: 6px;
        }

        /* ===== Mobile sidebar toggle (PR A: simple — hidden on mobile, content goes full-width) ===== */
        .pt-menu-btn { display: none; }
        @media (max-width: 900px) {
            .pt-menu-btn {
                display: inline-flex; align-items: center; justify-content: center;
                width: 34px; height: 34px; border-radius: 9px;
                border: 1px solid var(--border); background: var(--surface);
                color: var(--ink-sub);
            }
        }

        /* ===== Campaigns grid (PR B) ===== */
        .pt-camp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        @media (max-width: 1100px) { .pt-camp-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px)  { .pt-camp-grid { grid-template-columns: 1fr; } }
        .pt-camp-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
        }
        .pt-camp-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); }
        .pt-camp-cover {
            height: 100px;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 14px;
        }
        .pt-camp-cover-rose { background: linear-gradient(135deg, var(--acc-rose), #F0B5BF); }
        .pt-camp-cover-mint { background: linear-gradient(135deg, var(--acc-mint), #A3D6B5); }
        .pt-camp-cover-lav  { background: linear-gradient(135deg, var(--acc-lavender), #C6BDF0); }
        .pt-camp-cover-sky  { background: linear-gradient(135deg, var(--acc-sky), #B0CFEA); }
        .pt-camp-cover-amber{ background: linear-gradient(135deg, var(--acc-amber), #F2C879); }
        .pt-camp-platforms {
            position: absolute; top: 14px; right: 14px;
            display: flex; gap: 6px;
            background: rgba(255,255,255,0.85);
            padding: 5px 8px; border-radius: 8px;
            color: var(--ink);
        }
        .pt-camp-body { padding: 18px; }
        .pt-camp-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); }
        .pt-camp-sub   { font-size: 12px; color: var(--ink-sub); margin-top: 2px; }
        .pt-progress-wrap { margin-top: 14px; }
        .pt-progress-head {
            display: flex; justify-content: space-between;
            font-size: 11px; color: var(--ink-mute);
            margin-bottom: 6px;
        }
        .pt-progress-bar {
            height: 6px; background: var(--n-75);
            border-radius: 99px; overflow: hidden;
        }
        .pt-progress-fill { height: 100%; background: var(--brand-500); }
        .pt-camp-stats {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px; padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .pt-camp-stat-label {
            font-size: 10px; color: var(--ink-mute);
            text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600;
        }
        .pt-camp-stat-value {
            font-size: 20px; font-weight: 600;
            font-family: var(--font-mono);
            color: var(--ink);
        }
        .pt-camp-stat-value.ok   { color: var(--ok); }
        .pt-camp-stat-value.warn { color: var(--warn); }

        /* ===== Data table (PR B — Invoices, Tickets) ===== */
        .pt-table { width: 100%; }
        .pt-table-row {
            display: grid;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            align-items: center;
            gap: 12px;
        }
        .pt-table-row:first-of-type { border-top: none; }
        .pt-table-head {
            display: grid;
            padding: 12px 20px;
            background: var(--n-50);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-sub);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            gap: 12px;
        }
        .pt-table-cols-inv      { grid-template-columns: 140px 1fr 100px 120px 110px 100px 32px; }
        @media (max-width: 900px) {
            .pt-table-cols-inv  { grid-template-columns: 1fr 100px 100px; }
            .pt-table-cols-inv > :nth-child(n+4) { display: none; }
            .pt-table-head.pt-table-cols-inv > :nth-child(n+4) { display: none; }
        }

        /* ===== Filter chip strip (PR B — Documents) ===== */
        .pt-chip-strip {
            display: flex; gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .pt-chip-filter {
            display: inline-flex; align-items: center;
            padding: 5px 12px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 500;
            color: var(--ink-sub);
            cursor: pointer;
            transition: all .12s;
            font-family: inherit;
        }
        .pt-chip-filter:hover { color: var(--ink); background: var(--n-50); }
        .pt-chip-filter.active {
            background: var(--n-900);
            color: #fff;
            border-color: var(--n-900);
        }

        /* ===== Document grid (PR B) ===== */
        .pt-doc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        @media (max-width: 1100px) { .pt-doc-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 720px)  { .pt-doc-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px)  { .pt-doc-grid { grid-template-columns: 1fr; } }
        .pt-doc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex; flex-direction: column;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: transform .12s, box-shadow .12s, border-color .12s;
        }
        .pt-doc-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); border-color: var(--n-100); }
        .pt-doc-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .pt-doc-icon-mint { background: var(--acc-mint); color: var(--acc-mint-ink); }
        .pt-doc-icon-lav  { background: var(--acc-lavender); color: var(--acc-lavender-ink); }
        .pt-doc-icon-sky  { background: var(--acc-sky); color: var(--acc-sky-ink); }
        .pt-doc-icon-rose { background: var(--acc-rose); color: var(--acc-rose-ink); }
        .pt-doc-icon-amber{ background: var(--acc-amber); color: var(--acc-amber-ink); }
        .pt-doc-title { font-size: 13px; font-weight: 600; color: var(--ink); }
        .pt-doc-sub   { font-size: 11px; color: var(--ink-sub); margin-top: 2px; }
        .pt-doc-foot {
            display: flex; justify-content: space-between;
            font-size: 11px; color: var(--ink-mute);
            margin-top: auto;
            align-items: center;
        }

        /* ===== Settings 2-col layout (PR B) ===== */
        .pt-settings-grid {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 24px;
        }
        @media (max-width: 900px) {
            .pt-settings-grid { grid-template-columns: 1fr; gap: 14px; }
        }
        .pt-settings-nav {
            display: flex; flex-direction: column;
            gap: 2px;
        }
        @media (max-width: 900px) {
            .pt-settings-nav { flex-direction: row; flex-wrap: wrap; }
        }
        .pt-settings-nav-item {
            display: flex; align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-sub);
            cursor: pointer;
            background: transparent;
            border: none;
            font-family: inherit;
            text-align: left;
        }
        .pt-settings-nav-item:hover { background: var(--n-50); color: var(--ink); }
        .pt-settings-nav-item.active {
            background: var(--n-75);
            color: var(--ink);
            font-weight: 600;
        }

        /* ===== Settings — Profile readonly fields ===== */
        .pt-field-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 640px) { .pt-field-grid { grid-template-columns: 1fr; } }
        .pt-field-label {
            font-size: 11px;
            color: var(--ink-mute);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        .pt-field-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--n-50);
            border: 1px solid var(--border);
            border-radius: 9px;
            font-size: 13px;
            font-family: inherit;
            color: var(--ink);
        }
        .pt-field-input:focus {
            outline: none;
            border-color: var(--brand-500);
            background: var(--surface);
        }

        /* ===== Profile header (settings) ===== */
        .pt-profile-head {
            display: flex; gap: 20px; align-items: center;
            margin-bottom: 20px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .pt-profile-avatar-lg {
            width: 70px; height: 70px;
            border-radius: 99px;
            background: var(--brand-500); color: #fff;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 600;
            flex-shrink: 0;
        }

        /* ===== Legacy styles still used by other tabs (PR B will refactor) ===== */
        .card {
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 18px;
            box-shadow: var(--sh-sm);
        }
        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h2 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-body { padding: 20px; }

        .item-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--n-50);
            border-radius: 10px;
            cursor: pointer;
            transition: background .12s, transform .12s;
            text-decoration: none;
            color: inherit;
        }
        .item:hover { background: var(--n-75); transform: translateX(2px); }
        .item-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .item-icon.project { background: var(--acc-sky); color: var(--acc-sky-ink); }
        .item-icon.campaign { background: var(--acc-amber); color: var(--acc-amber-ink); }
        .item-icon.invoice { background: var(--acc-mint); color: var(--acc-mint-ink); }
        .item-icon.document { background: var(--acc-lavender); color: var(--acc-lavender-ink); }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 600; font-size: 13px; color: var(--ink); letter-spacing: -0.1px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 11px; color: var(--ink-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-status {
            padding: 3px 9px; border-radius: 999px;
            font-size: 11px; font-weight: 500; flex-shrink: 0;
        }
        .status-active, .status-paid { background: var(--acc-mint); color: var(--acc-mint-ink); }
        .status-pending, .status-in_progress { background: var(--acc-amber); color: var(--acc-amber-ink); }
        .status-draft { background: var(--n-100); color: var(--ink-sub); }
        .status-overdue { background: color-mix(in oklab, var(--err) 14%, transparent); color: var(--err); }

        .invoice-amount { font-weight: 700; color: var(--ink); margin-right: 1rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--ink-sub); }
        .empty-state h3 { font-size: 1rem; font-weight: 500; }

        .error-screen {
            min-height: 80vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }
        .error-screen h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .error-screen p { color: var(--ink-sub); margin-bottom: 1.5rem; }

        .btn {
            padding: 10px 16px; border-radius: 10px;
            font-weight: 500; font-size: 13px;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid transparent;
            font-family: inherit;
        }
        .btn-primary { background: var(--brand-500); color: white; border-color: var(--brand-500); }
        .btn-primary:hover { background: var(--brand-600); }

        .loading {
            min-height: 80vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--n-100);
            border-top-color: var(--brand-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .contact-card {
            display: flex; align-items: center; gap: 1rem;
            padding: 1.5rem;
            background: var(--n-50);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .contact-avatar {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.25rem;
        }
        .contact-info { flex: 1; }
        .contact-info h4 { font-size: 1rem; margin-bottom: 0.25rem; }
        .contact-info p { font-size: 0.85rem; color: var(--ink-sub); }
        .contact-actions { display: flex; gap: 0.5rem; }

        /* ─── Messages (PR C) ─── */
        .pt-msg-wrap {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 16px;
            height: calc(100vh - 160px);
            min-height: 520px;
        }
        .pt-msg-side {
            display: flex; flex-direction: column; gap: 12px;
        }
        .pt-msg-am {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
        }
        .pt-msg-am-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;

            if (isPreview) {

                window.location.href = '/portal/login.html';
                return;
            }

            user = session.user;

            try {
                // Get client user link
                const { data: clientUser, error: clientError } = await db
                    .from('client_users')
                    .select('*, clients(*)')
                    .eq('user_id', user.id)
                    .single();

                if (clientError || !clientUser) {
                    showError('Účet nie je prepojený', 'Váš účet nie je prepojený so žiadnou firmou. Kontaktujte podporu.');
                    return;
                }

                client = clientUser.clients;

                // Check if onboarding completed
                if (client.onboarding_status && client.onboarding_status !== 'completed') {
                    window.location.href = '/portal/onboarding.html';
                    return;
                }

                await Promise.all([loadProjects(), loadCampaigns(), loadInvoices(), loadDocuments(), loadTickets(), loadMessages()]);
                render();
                subscribeToMessages();

            } catch (error) {
                console.error('Init error:', error);
                showError('Chyba', 'Nastala chyba pri načítavaní. Skúste obnoviť stránku.');
            }
        }

            messages = data || [];

        function subscribeToMessages() {
            if (isPreview || !client?.id) return;
            try { messagesSubscription?.unsubscribe(); } catch (_) {}
            messagesSubscription = db.channel(`messages-${client.id}`)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `client_id=eq.${client.id}` }, payload => {
                    const m = payload.new;
                    if (!m) return;
                    if (m.sender_type === 'client' && m.sender_id === user?.id) return;
                    if (messages.find(x => x.id === m.id)) return;
                    messages.push(m);
                    if (currentTab === 'messages') {
                        renderMessageThreadOnly();
                        if (m.sender_type === 'team') markMessagesAsRead();
                    } else {
                        renderSidebarOnly();
                    }
                })
                .subscribe();
        }

        function unreadTeamMessagesCount() {
            return messages.filter(m => m.sender_type === 'team' && !m.is_read).length;
        }

        async function markMessagesAsRead() {
            const unread = messages.filter(m => m.sender_type === 'team' && !m.is_read);
            if (unread.length === 0) return;
            unread.forEach(m => { m.is_read = true; m.read_at = new Date().toISOString(); });
            renderSidebarOnly();
            if (isPreview) return;
            const ids = unread.map(m => m.id);
            await db.from('messages').update({ is_read: true, read_at: new Date().toISOString() }).in('id', ids);
        }

        async function sendMessage(formEl) {
            const ta = formEl.querySelector('textarea');
            const content = (ta.value || '').trim();
            if (!content) return;
            if (isPreview) {
                const banner = formEl.querySelector('[data-preview-banner]');
                previewBlocked(banner);
                return;
            }
            const btn = formEl.querySelector('button[type="submit"]');
            btn.disabled = true;
            const optimistic = {
                id: 'tmp-' + Date.now(),
                client_id: client.id,
                sender_id: user.id,
                sender_type: 'client',
                content,
                is_read: true,
                created_at: new Date().toISOString()
            };
            messages.push(optimistic);
            ta.value = '';
            messageDraft = '';
            renderMessageThreadOnly();
            const { data, error } = await db.from('messages').insert({
                client_id: client.id,
                sender_id: user.id,
                sender_type: 'client',
                content
            }).select().single();
            if (error) {
                messages = messages.filter(m => m.id !== optimistic.id);
                ta.value = content;
                messageDraft = content;
                renderMessageThreadOnly();
                alert('Správu sa nepodarilo odoslať: ' + error.message);
            } else if (data) {
                const idx = messages.findIndex(m => m.id === optimistic.id);
                if (idx !== -1) messages[idx] = data;
                renderMessageThreadOnly();
            }
            btn.disabled = false;
        }

                { key: 'account',   icon: 'Settings', label: 'Nastavenia' },
            ]},
        ];

        const TAB_META = {
            dashboard: { title: () => `Dobré ráno, ${firstName()}`, sub: () => `${currentMonthLabel()} · ${client.company_name}` },
            reports:   { title: () => 'Reporty',                     sub: () => `Výkon kampaní · ${client.company_name}` },
            campaigns: { title: () => 'Kampane',                     sub: () => `${campaigns.length} aktívnych` },
            messages:  { title: () => 'Správy',                      sub: () => 'Komunikácia s tímom' },
            approvals: { title: () => 'Schvaľovanie',                sub: () => 'Kreatívy čakajúce na schválenie' },
            calendar:  { title: () => 'Kalendár',                    sub: () => 'Plánované udalosti' },
            support:   { title: () => 'Tickety',                     sub: () => 'Podporné požiadavky' },
            invoices:  { title: () => 'Faktúry',                     sub: () => 'História platieb' },
            documents: { title: () => 'Dokumenty',                   sub: () => 'Zmluvy, reporty, kreatívy' },
            account:   { title: () => 'Nastavenia',                  sub: () => client.company_name },
        };

        function firstName() {
            return user?.user_metadata?.full_name?.split(' ')[0]
                || client?.contact_person?.split(' ')[0]
                || 'vážený klient';
        }

        function currentMonthLabel() {
            const months = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
            const d = new Date();
            return `${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        function initials(name) {
            if (!name) return '?';
            const parts = name.trim().split(/\s+/);
            return (parts[0][0] + (parts[1]?.[0] || '')).toUpperCase();
        }

        function renderSidebar() {
            return `
                <aside class="adl-sidebar">
                    <div class="adl-sidebar-inner">
                        <div class="adl-sidebar-brand">
                            ${I.Logo({size:28, id:'sb-logo'})}
                            <div class="adl-sidebar-brand-text">Adlify<span class="adl-sidebar-brand-subtag">Klient</span></div>
                        </div>
                        <nav class="adl-sidebar-nav">
                            ${SIDEBAR_GROUPS.map(g => `
                                <div class="adl-sidebar-group">
                                    <div class="adl-sidebar-group-label">${g.label}</div>
                                    ${g.items.map(it => {
                                        const badge = it.key === 'messages' ? unreadTeamMessagesCount() : 0;
                                        return `
                                        <a class="adl-sidebar-item ${currentTab === it.key ? 'active' : ''}" onclick="switchTab('${it.key}')">
                                            ${I[it.icon]({size:17})}
                                            <span class="adl-sidebar-item-label">${it.label}</span>
                                            ${badge > 0 ? `<span class="adl-sidebar-item-badge">${badge}</span>` : ''}
                                        </a>`;
                                    }).join('')}
                                </div>
                            `).join('')}
                        </nav>
                        <div class="adl-sidebar-footer">
                            <div class="adl-avatar">${initials(client.contact_person || client.company_name)}</div>
                            <div class="adl-sidebar-footer-info">
                                <div class="adl-sidebar-footer-name">${client.contact_person || 'Klient'}</div>
                                <div class="adl-sidebar-footer-sub">${client.company_name}</div>
                            </div>
                            <a class="adl-sidebar-item" onclick="logout()" style="margin:0; padding:6px; flex:0;" title="Odhlásiť">${I.Logout({size:16})}</a>
                        </div>
                    </div>
                </aside>
            `;
        }

        function renderTopbar() {
            const meta = TAB_META[currentTab] || TAB_META.dashboard;
            return `
                <header class="adl-topbar">
                    <div class="adl-topbar-title-wrap">
                        <div class="adl-topbar-title">
                            ${meta.title()}
                            ${isPreview ? `<span class="pt-preview-badge">Náhľad</span>` : ''}
                        </div>
                        <div class="adl-topbar-sub">${meta.sub()}</div>
                    </div>
                    <div class="adl-topbar-actions">
                        <button class="pt-iconbtn" title="Notifikácie">${I.Bell({size:16})}<span class="dot"></span></button>
                    </div>
                </header>
            `;
        }

        function render() {
            document.getElementById('app').innerHTML = `
                <div class="adl adl-frame">
                    ${renderSidebar()}
                    <div class="adl-main">
                        ${renderTopbar()}
                        <main class="adl-content">
                            ${renderContent()}
                        </main>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            render();
            if (tab === 'messages') {
                markMessagesAsRead();
                scrollMessageThreadToBottom();
            }
        }

        function renderSidebarOnly() {
            const old = document.querySelector('.adl-sidebar');
            if (!old) return;
            const wrap = document.createElement('div');
            wrap.innerHTML = renderSidebar();
            const fresh = wrap.firstElementChild;
            old.replaceWith(fresh);
        }

        function renderMessageThreadOnly() {
            const thread = document.getElementById('pt-msg-thread');
            if (!thread) { if (currentTab === 'messages') render(); return; }
            thread.outerHTML = renderMessageThread();
            scrollMessageThreadToBottom();
        }

        function scrollMessageThreadToBottom() {
            requestAnimationFrame(() => {
                const t = document.getElementById('pt-msg-thread');
                if (t) t.scrollTop = t.scrollHeight;
            });
        }

        function onMessageInput(el) {
            messageDraft = el.value;
        }

        function renderContent() {
            switch (currentTab) {
                case 'dashboard': return renderDashboard();
                case 'reports':   return renderComingSoon('Reporty', 'Detailné reporty výkonu kampaní pribudnú v ďalšom update.');
                case 'campaigns': return renderCampaigns();
                case 'messages':  return renderMessages();
                case 'approvals': return renderComingSoon('Schvaľovanie', 'Schvaľovanie kreatív pribudne v ďalšom update.');
                case 'calendar':  return renderComingSoon('Kalendár', 'Plánované udalosti pribudnú v ďalšom update.');
                case 'support':   return renderSupport();
                case 'invoices':  return renderInvoices();
                case 'documents': return renderDocuments();
                case 'account':   return renderAccount();
                default: return renderDashboard();
            }
        }

        function renderComingSoon(title, description) {
            return `
                <div class="pt-card" style="padding:60px 28px; text-align:center;">
                    <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:var(--n-50); color:var(--ink-mute); margin-bottom:14px;">${I.Clock({size:24})}</div>
                    <h2 style="font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:6px;">${title} — čoskoro</h2>
                    <p style="color:var(--ink-sub); font-size:13px; max-width:380px; margin:0 auto;">${description}</p>
                </div>
            `;
        }

        function sparkline(data, w = 300, h = 80, color = '#fff') {
            if (!data || data.length < 2) return '';
            const max = Math.max(...data), min = Math.min(...data);
            const range = max - min || 1;
            const step = w / (data.length - 1);
            const points = data.map((v, i) => `${i * step},${h - ((v - min) / range) * (h - 4) - 2}`);
            const path = `M ${points.join(' L ')}`;
            const fillPath = `${path} L ${w},${h} L 0,${h} Z`;
            return `
                <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block; max-width:100%;">
                    <defs>
                        <linearGradient id="spark-grad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="${color}" stop-opacity="0.4"/>
                            <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <path d="${fillPath}" fill="url(#spark-grad)" stroke="none"/>
                    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            `;
        }

        function renderDashboard() {
            const k = client.dashboard_kpis || {};
            const conv = k.conversions ?? 0;
            const convDelta = k.conversions_delta_pct;
            const roi = k.roi ?? 0;
            const cpa = k.cost_per_conversion ?? 0;
            const reach = k.reach ?? 0;
            const clicks = k.clicks ?? 0;
            const ctr = k.ctr_pct;
            const spent = k.spent ?? 0;
            const budget = k.budget ?? 0;
            const value = k.conversion_value ?? 0;
            const valueDelta = k.conversion_value_delta_pct;
            const trend = k.trend || [];
            const actionItems = client.action_items || [];
            const teamMember = client.account_manager || null;
            const upcomingEvents = client.upcoming_events || [];
            const activeCamps = campaigns.filter(c => c.status === 'active' || c.status === 'paused').slice(0, 3);

            const fmtNum = (n) => new Intl.NumberFormat('sk-SK').format(Math.round(n));
            const fmtMoney = (n) => new Intl.NumberFormat('sk-SK', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' €';
            const deltaChip = (pct) => pct == null ? ''
                : `<span class="${pct >= 0 ? 'pt-stat-delta-up' : 'pt-stat-delta-down'}">${pct >= 0 ? '↑' : '↓'} ${Math.abs(pct)}%</span>`;
            const statusToneClass = (s) => s === 'active' ? 'adl-chip-mint' : s === 'paused' ? 'adl-chip-amber' : '';
            const statusLabel = (s) => s === 'active' ? 'Aktívna' : s === 'paused' ? 'Pauza' : (s || '—');

            return `
                <div class="pt-hero">
                    <div class="pt-hero-row">
                        <div style="flex:1; min-width:0;">
                            <div class="pt-hero-label">Váš výkon · ${currentMonthLabel()}</div>
                            <div class="pt-hero-value">${fmtNum(conv)} <span style="font-size:18px; font-weight:500; font-family:inherit; opacity:0.85;">konverzií</span></div>
                            <div class="pt-hero-meta">
                                ${convDelta != null ? `<span class="pt-hero-chip">${convDelta >= 0 ? '+' : ''}${convDelta}% vs. minulý mesiac</span>` : ''}
                                <span class="pt-hero-sub">ROI ${roi}× · cena za konverziu ${fmtMoney(cpa)}</span>
                            </div>
                        </div>
                        <div class="pt-hero-spark">${sparkline(trend, 300, 80, '#fff')}</div>
                    </div>
                </div>

                <div class="pt-stats">
                    <div class="pt-stat">
                        <div class="pt-stat-label">Dosah</div>
                        <div class="pt-stat-value">${fmtNum(reach)}</div>
                    </div>
                    <div class="pt-stat">
                        <div class="pt-stat-label">Kliky</div>
                        <div class="pt-stat-value">${fmtNum(clicks)}</div>
                        <div class="pt-stat-meta">${ctr != null ? `<span class="pt-stat-hint">CTR ${ctr}%</span>` : ''}</div>
                    </div>
                    <div class="pt-stat">
                        <div class="pt-stat-label">Minuté z budgetu</div>
                        <div class="pt-stat-value">${fmtMoney(spent)}</div>
                        ${budget ? `<div class="pt-stat-meta"><span class="pt-stat-hint">z ${fmtMoney(budget)}</span></div>` : ''}
                    </div>
                    <div class="pt-stat">
                        <div class="pt-stat-label">Hodnota konverzií</div>
                        <div class="pt-stat-value">${fmtMoney(value)}</div>
                        <div class="pt-stat-meta">${deltaChip(valueDelta)}</div>
                    </div>
                </div>

                <div class="pt-grid-13">
                    <div class="pt-card">
                        <div class="pt-card-head">
                            <div class="pt-card-title">Aktívne kampane (${activeCamps.length})</div>
                            <button class="adl-btn adl-btn-ghost adl-btn-sm" onclick="switchTab('campaigns')">Všetky ${I.ArrowRight({size:12})}</button>
                        </div>
                        <div class="pt-card-body tight">
                            ${activeCamps.length > 0 ? activeCamps.map(c => `
                                <div class="pt-camp-row">
                                    <div>
                                        <div class="pt-camp-name">${escapeHtml(c.name || 'Kampaň')}</div>
                                        <div class="pt-camp-meta">${c.platform_label ? escapeHtml(c.platform_label) : 'Multi-platform'}</div>
                                    </div>
                                    <span class="adl-chip ${statusToneClass(c.status)} adl-chip-sm"><span class="dot"></span>${statusLabel(c.status)}</span>
                                    <span class="mono" style="font-size:12px; font-weight:600;">${c.budget ? fmtMoney(c.budget) : '—'}</span>
                                    <span class="mono" style="font-size:12px;">${c.conversions != null ? c.conversions + ' konv.' : '—'}</span>
                                    ${c.roi != null ? `<span class="adl-chip ${c.roi > 2 ? 'adl-chip-mint' : 'adl-chip-amber'} adl-chip-sm">${c.roi}×</span>` : '<span></span>'}
                                </div>
                            `).join('') : `<div class="empty-state" style="padding:40px;"><h3 style="margin-bottom:6px;">Žiadne aktívne kampane</h3><p style="color:var(--ink-sub); font-size:13px;">Akonáhle tím spustí kampaň, objaví sa tu.</p></div>`}
                        </div>
                    </div>

                    <div class="pt-card">
                        <div class="pt-card-head">
                            <div class="pt-card-title">Vyžaduje vašu akciu</div>
                        </div>
                        <div class="pt-card-body">
                            ${actionItems.length > 0 ? actionItems.map((a, i) => `
                                <div class="pt-action" onclick="${a.target_tab ? `switchTab('${a.target_tab}')` : ''}" style="${i === 0 ? 'background:var(--brand-50);' : ''}">
                                    <div class="pt-action-icon" style="background:${a.tone === 'brand' ? 'var(--brand-500)' : `var(--acc-${a.tone || 'sky'})`}; color:${a.tone === 'brand' ? '#fff' : `var(--acc-${a.tone || 'sky'}-ink)`};">
                                        ${I[a.icon || 'Info']({size:15})}
                                    </div>
                                    <div class="pt-action-body">
                                        <div class="pt-action-title">${escapeHtml(a.title)}</div>
                                        <div class="pt-action-sub">${escapeHtml(a.sub || '')}</div>
                                    </div>
                                    ${I.Chevron({size:14, color:'var(--ink-mute)'})}
                                </div>
                            `).join('') : `<div style="text-align:center; padding:20px; color:var(--ink-sub); font-size:13px;">${I.Check({size:24})}<div style="margin-top:8px;">Žiadne akcie nečakajú</div></div>`}
                        </div>
                    </div>
                </div>

                <div class="pt-grid-2">
                    <div class="pt-card">
                        <div class="pt-card-head"><div class="pt-card-title">Tím Adlify</div></div>
                        <div class="pt-card-body">
                            ${teamMember ? `
                                <div class="pt-team-row">
                                    <div class="adl-avatar adl-avatar-lg">${initials(teamMember.name)}</div>
                                    <div style="flex:1; min-width:0;">
                                        <div class="pt-team-name">${escapeHtml(teamMember.name)}</div>
                                        <div class="pt-team-sub">${escapeHtml(teamMember.role || 'Account manažér')} · ${escapeHtml(teamMember.response_time || 'odpovedá do 2h')}</div>
                                    </div>
                                    ${teamMember.email ? `<a class="adl-btn adl-btn-outline adl-btn-sm" href="mailto:${teamMember.email}">${I.Mail({size:14})} Napísať</a>` : ''}
                                    ${teamMember.phone ? `<a class="adl-btn adl-btn-outline adl-btn-sm" href="tel:${teamMember.phone}">${I.Phone({size:14})} Zavolať</a>` : ''}
                                </div>
                            ` : `<div style="color:var(--ink-sub); font-size:13px;">Account manažér ešte nebol priradený.</div>`}
                        </div>
                    </div>

                    <div class="pt-card">
                        <div class="pt-card-head"><div class="pt-card-title">Najbližšie udalosti</div></div>
                        <div class="pt-card-body">
                            ${upcomingEvents.length > 0 ? upcomingEvents.map(ev => `
                                <div class="pt-event">
                                    <div class="pt-event-date">
                                        <div>${escapeHtml(ev.date)}</div>
                                        ${ev.time ? `<div class="pt-event-time">${escapeHtml(ev.time)}</div>` : ''}
                                    </div>
                                    <div class="pt-event-body" style="border-left-color:var(--acc-${ev.tone || 'sky'}-ink);">${escapeHtml(ev.title)}</div>
                                </div>
                            `).join('') : `<div style="color:var(--ink-sub); font-size:13px;">Žiadne plánované udalosti.</div>`}
                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function renderProjects() {
            return `
                <div class="card">
                    <div class="card-header">
                        <h2>Aktuálne projekty</h2>
                    </div>
                    <div class="card-body">
                        ${projects.length > 0 ? `
                            <div class="item-list">
                                ${projects.map(p => `
                                    <div class="item">
                                        <div class="item-icon project" style="color:var(--acc-sky-ink);">${I.Folder({size:18})}</div>
                                        <div class="item-info">
                                            <div class="item-name">${p.name}</div>
                                            <div class="item-meta">${p.description || 'Bez popisu'}</div>
                                        </div>
                                        <span class="item-status status-${p.status || 'draft'}">${getStatusLabel(p.status)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `<div style="padding:40px 24px; text-align:center; color:var(--ink-sub); background:var(--n-50); border-radius:10px;"><div style="display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:var(--n-75); color:var(--ink-mute); margin-bottom:10px;">${I.Folder({size:18})}</div><div style="font-size:14px; font-weight:600; color:var(--ink);">Zatiaľ žiadne projekty</div></div>`}
                    </div>
                </div>
            `;
        }

        function renderCampaigns() {
            if (campaigns.length === 0) {
                return `
                    <div class="pt-card" style="padding:60px 28px; text-align:center;">
                        <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:var(--n-50); color:var(--ink-mute); margin-bottom:14px;">${I.Campaign({size:24})}</div>
                        <h2 style="font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:6px;">Zatiaľ žiadne kampane</h2>
                        <p style="color:var(--ink-sub); font-size:13px; max-width:380px; margin:0 auto;">Kampane sa zobrazia po spustení tímom.</p>
                    </div>
                `;
            }
            const coverTones = ['rose', 'mint', 'lav', 'sky', 'amber'];
            const fmtMoney = (n) => new Intl.NumberFormat('sk-SK', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' €';
            const statusChip = (s) => {
                if (s === 'active') return `<span class="adl-chip adl-chip-mint adl-chip-sm"><span class="dot"></span>Aktívna</span>`;
                if (s === 'paused') return `<span class="adl-chip adl-chip-amber adl-chip-sm"><span class="dot"></span>Pauza</span>`;
                if (s === 'completed') return `<span class="adl-chip adl-chip-sky adl-chip-sm">Dokončená</span>`;
                return `<span class="adl-chip adl-chip-sm">${getStatusLabel(s)}</span>`;
            };
            const platformIcons = (c) => {
                const label = c.platform_label || (c.platform === 'meta' ? 'Facebook' : c.platform === 'google' ? 'Google' : '');
                const icons = [];
                if (/FB|Facebook|Meta/i.test(label)) icons.push(I.Fb({size:14}));
                if (/IG|Instagram/i.test(label))    icons.push(I.Instagram({size:14}));
                if (/Google/i.test(label))          icons.push(I.Google({size:14}));
                return icons.length ? `<div class="pt-camp-platforms">${icons.join('')}</div>` : '';
            };
            return `
                <div class="pt-camp-grid">
                    ${campaigns.map((c, i) => {
                        const cover = c.cover_tone || coverTones[i % coverTones.length];
                        const budget = c.budget || 0;
                        const budgetTotal = c.budget_total || budget;
                        const pct = budgetTotal > 0 ? Math.min(100, Math.round((budget / budgetTotal) * 100)) : 0;
                        const conv = c.conversions ?? 0;
                        const roi = c.roi;
                        return `
                            <div class="pt-camp-card">
                                <div class="pt-camp-cover pt-camp-cover-${cover}">
                                    ${statusChip(c.status)}
                                    ${platformIcons(c)}
                                </div>
                                <div class="pt-camp-body">
                                    <div class="pt-camp-title">${escapeHtml(c.name || 'Kampaň')}</div>
                                    <div class="pt-camp-sub">${escapeHtml(c.platform_label || (c.platform === 'meta' ? 'Meta Ads' : c.platform === 'google' ? 'Google Ads' : 'Multi-platform'))}</div>
                                    ${budget > 0 ? `
                                        <div class="pt-progress-wrap">
                                            <div class="pt-progress-head">
                                                <span>Rozpočet</span>
                                                <span class="mono">${fmtMoney(budget)}${budgetTotal !== budget ? ` z ${fmtMoney(budgetTotal)}` : ''}</span>
                                            </div>
                                            <div class="pt-progress-bar"><div class="pt-progress-fill" style="width:${pct}%;"></div></div>
                                        </div>
                                    ` : ''}
                                    <div class="pt-camp-stats">
                                        <div>
                                            <div class="pt-camp-stat-label">Konverzie</div>
                                            <div class="pt-camp-stat-value">${conv}</div>
                                        </div>
                                        <div>
                                            <div class="pt-camp-stat-label">ROI</div>
                                            <div class="pt-camp-stat-value ${roi == null ? '' : roi > 2 ? 'ok' : 'warn'}">${roi != null ? roi + '×' : '—'}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderInvoices() {
            const year = new Date().getFullYear();
            const paid = invoices.filter(i => i.status === 'paid');
            const paidThisYear = paid.filter(i => new Date(i.issue_date || i.created_at || 0).getFullYear() === year);
            const paidTotal = paidThisYear.reduce((sum, i) => sum + (i.total || 0), 0);
            const upcoming = invoices
                .filter(i => i.status !== 'paid' && i.due_date)
                .sort((a, b) => new Date(a.due_date) - new Date(b.due_date))[0];
            const paymentMethod = client?.payment_method || 'SEPA';
            const paymentLast4 = client?.payment_last4 || '•••• ••••';

            const fmtMoney = (n) => new Intl.NumberFormat('sk-SK', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' €';
            const statusChip = (s) => {
                if (s === 'paid') return `<span class="adl-chip adl-chip-mint adl-chip-sm"><span class="dot"></span>Zaplatené</span>`;
                if (s === 'overdue') return `<span class="adl-chip adl-chip-err adl-chip-sm"><span class="dot"></span>Po splatnosti</span>`;
                if (s === 'pending' || s === 'sent') return `<span class="adl-chip adl-chip-amber adl-chip-sm"><span class="dot"></span>Čaká</span>`;
                return `<span class="adl-chip adl-chip-sm">${getInvoiceStatusLabel(s)}</span>`;
            };

            return `

        function renderMessageThread() {

                : groups.map(g => `

        function renderMessageBubble(m) {
            const isClient = m.sender_type === 'client';
            const time = new Date(m.created_at);
            const hh = String(time.getHours()).padStart(2, '0');
            const mm = String(time.getMinutes()).padStart(2, '0');
            return `
                <div class="pt-msg-row ${isClient ? 'pt-msg-row--out' : 'pt-msg-row--in'}">
                    <div class="pt-msg-bubble ${isClient ? 'pt-msg-bubble--out' : 'pt-msg-bubble--in'}">
                        <div class="pt-msg-text">${escapeHtml(m.content || '').replace(/\n/g, '<br>')}</div>
                        <div class="pt-msg-meta">${hh}:${mm}${isClient && m.is_read ? ` · prečítané` : ''}</div>
                    </div>
                </div>
            `;
        }

        function groupMessagesByDay(items) {
            const groups = [];
            let last = null;
            const today = new Date(); today.setHours(0,0,0,0);
            const yest  = new Date(today.getTime() - 86400000);
            for (const m of items) {
                const d = new Date(m.created_at); d.setHours(0,0,0,0);
                const key = d.toISOString().slice(0,10);
                let label;
                if (d.getTime() === today.getTime()) label = 'Dnes';
                else if (d.getTime() === yest.getTime()) label = 'Včera';
                else label = d.toLocaleDateString('sk-SK', { day: 'numeric', month: 'long', year: d.getFullYear() === today.getFullYear() ? undefined : 'numeric' });
                if (!last || last.key !== key) {
                    last = { key, label, items: [] };
                    groups.push(last);
                }
                last.items.push(m);
            }
            return groups;
        }

        async function submitTicket(e) {
            e.preventDefault();
            const subject = document.getElementById('t-subject').value.trim();
            const description = document.getElementById('t-description').value.trim();
            const category = document.getElementById('t-category').value;
            const priority = document.getElementById('t-priority').value;
            const btn = document.getElementById('ticket-submit-btn');
            const msg = document.getElementById('ticket-form-msg');
            if (!subject) return;

            if (isPreview) { previewBlocked(msg); return; }

            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = 'Odosielam…';
            msg.innerHTML = '';

            try {
                const { data, error } = await db.from('tickets').insert([{
                    client_id: client.id,
                    subject,
                    description: description || null,
                    category,
                    priority,
                    status: 'open'
                }]).select().single();
                if (error) throw error;
                tickets.unshift(data);
                render();
            } catch (err) {
                console.error('Create ticket error:', err);
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} Chyba: ${err.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = original;
            }
        }

                                    <input id="acc-company" class="pt-field-input" type="text" value="${escapeHtml(client?.company_name || '')}">
                                </div>
                                <div><label class="pt-field-label">IČO</label><input id="acc-ico" class="pt-field-input" type="text" value="${escapeHtml(client?.ico || '')}"></div>
                                <div><label class="pt-field-label">DIČ</label><input id="acc-dic" class="pt-field-input" type="text" value="${escapeHtml(client?.dic || '')}"></div>
                                <div><label class="pt-field-label">IČ DPH</label><input id="acc-ic-dph" class="pt-field-input" type="text" value="${escapeHtml(client?.ic_dph || '')}" placeholder="SK1234567890"></div>
                                <div><label class="pt-field-label">Web</label><input id="acc-web" class="pt-field-input" type="url" value="${escapeHtml(client?.domain || '')}" placeholder="https://www.firma.sk"></div>
                                <div><label class="pt-field-label">Kontaktná osoba</label><input id="acc-contact" class="pt-field-input" type="text" value="${escapeHtml(client?.contact_person || '')}"></div>
                                <div><label class="pt-field-label">Email</label><input id="acc-email" class="pt-field-input" type="email" value="${escapeHtml(client?.email || '')}"></div>
                                <div><label class="pt-field-label">Telefón</label><input id="acc-phone" class="pt-field-input" type="tel" value="${escapeHtml(client?.phone || '')}" placeholder="+421 9XX XXX XXX"></div>
                                <div style="grid-column:1/-1;">
                                    <label class="pt-field-label">Fakturačná adresa</label>
                                    <input id="acc-street" class="pt-field-input" type="text" value="${escapeHtml(client?.billing_street || '')}" placeholder="Ulica a číslo">
                                </div>
                                <div><label class="pt-field-label">PSČ</label><input id="acc-zip" class="pt-field-input" type="text" value="${escapeHtml(client?.billing_zip || '')}"></div>
                                <div><label class="pt-field-label">Mesto</label><input id="acc-city" class="pt-field-input" type="text" value="${escapeHtml(client?.billing_city || '')}"></div>
                                <div>
                                    <label class="pt-field-label">Krajina</label>
                                    <select id="acc-country" class="pt-field-input">
                                        <option value="SK" ${(client?.billing_country || 'SK') === 'SK' ? 'selected' : ''}>Slovensko</option>
                                        <option value="CZ" ${client?.billing_country === 'CZ' ? 'selected' : ''}>Česko</option>
                                        <option value="HU" ${client?.billing_country === 'HU' ? 'selected' : ''}>Maďarsko</option>
                                        <option value="AT" ${client?.billing_country === 'AT' ? 'selected' : ''}>Rakúsko</option>
                                        <option value="PL" ${client?.billing_country === 'PL' ? 'selected' : ''}>Poľsko</option>
                                    </select>
                                </div>
                            </div>
                            <div id="account-message" style="margin-top:16px;"></div>
                            <div style="display:flex; justify-content:flex-end; margin-top:20px;">
                                <button type="submit" class="adl-btn adl-btn-primary" id="save-account-btn">${I.Check({size:14})} Uložiť zmeny</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderSettingsNotifications() {
            const prefs = client?.notification_prefs || { email_invoices: true, email_campaigns: true, email_messages: true, email_marketing: false };
            const row = (key, title, sub) => `
                <label style="display:flex; align-items:center; gap:14px; padding:14px 16px; border:1px solid var(--border); border-radius:10px; cursor:pointer; margin-bottom:8px;">
                    <input type="checkbox" id="notif-${key}" ${prefs[key] ? 'checked' : ''} style="width:18px; height:18px; accent-color:var(--brand-500);">
                    <div style="flex:1;">
                        <div style="font-size:13px; font-weight:600;">${title}</div>
                        <div style="font-size:11px; color:var(--ink-sub); margin-top:2px;">${sub}</div>
                    </div>
                </label>
            `;
            return `
                <div class="pt-card">
                    <div class="pt-card-head"><div class="pt-card-title">Notifikácie</div></div>
                    <div class="pt-card-body">
                        ${row('email_invoices',  'Nová faktúra',           'Email pri každej novej faktúre alebo blížiacej sa splatnosti.')}
                        ${row('email_campaigns', 'Update kampaní',         'Týždenný report výkonu vašich kampaní.')}
                        ${row('email_messages',  'Správy od tímu',         'Notifikácia keď vám tím napíše správu.')}
                        ${row('email_marketing', 'Novinky a tipy',         'Občasné tipy ako zlepšiť výkon kampaní.')}
                        <div style="display:flex; justify-content:flex-end; margin-top:14px;">
                            <button class="adl-btn adl-btn-primary" onclick="saveNotificationPrefs()">${I.Check({size:14})} Uložiť</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSettingsAdAccounts() {
            const accounts = client?.ad_accounts || [];
            return `
                <div class="pt-card">
                    <div class="pt-card-head"><div class="pt-card-title">Reklamné účty</div></div>
                    <div class="pt-card-body">
                        ${accounts.length > 0 ? accounts.map(a => `
                            <div style="display:flex; align-items:center; gap:14px; padding:14px 16px; border:1px solid var(--border); border-radius:10px; margin-bottom:8px;">
                                <div style="width:36px; height:36px; border-radius:10px; background:var(--n-50); display:inline-flex; align-items:center; justify-content:center;">
                                    ${a.platform === 'meta' ? I.Fb({size:18}) : a.platform === 'google' ? I.Google({size:18}) : I.Link({size:18})}
                                </div>
                                <div style="flex:1;">
                                    <div style="font-size:13px; font-weight:600;">${escapeHtml(a.name || a.platform)}</div>
                                    <div style="font-size:11px; color:var(--ink-sub); margin-top:2px;">${escapeHtml(a.account_id || '')}</div>
                                </div>
                                <span class="adl-chip adl-chip-mint adl-chip-sm"><span class="dot"></span>Pripojený</span>
                            </div>
                        `).join('') : `
                            <div style="text-align:center; padding:40px 20px;">
                                <div style="display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:12px; background:var(--n-50); color:var(--ink-mute); margin-bottom:12px;">${I.Link({size:20})}</div>
                                <div style="font-size:14px; font-weight:600; margin-bottom:4px;">Zatiaľ žiadne pripojené účty</div>
                                <div style="font-size:12px; color:var(--ink-sub); max-width:340px; margin:0 auto;">Tím Adlify nastavuje reklamné účty počas onboardingu. Ak potrebuješ niečo zmeniť, ozvi sa.</div>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function renderSettingsPayment() {
            const method = client?.payment_method || 'SEPA';
            const last4 = client?.payment_last4 || '•••• ••••';
            return `
                <div class="pt-card">
                    <div class="pt-card-head"><div class="pt-card-title">Spôsob platby</div></div>
                    <div class="pt-card-body">
                        <div style="display:flex; align-items:center; gap:16px; padding:18px; border:1px solid var(--border); border-radius:12px; background:var(--n-50);">
                            <div style="width:48px; height:48px; border-radius:12px; background:var(--surface); border:1px solid var(--border); display:inline-flex; align-items:center; justify-content:center;">${I.Money({size:22})}</div>
                            <div style="flex:1;">
                                <div style="font-size:14px; font-weight:600;">${escapeHtml(method)}</div>
                                <div style="font-size:12px; color:var(--ink-sub); margin-top:2px; font-family:var(--font-mono);">${escapeHtml(last4)}</div>
                            </div>
                            <button class="adl-btn adl-btn-outline adl-btn-sm" onclick="alert('Pre zmenu spôsobu platby kontaktujte tím Adlify.')">Zmeniť</button>
                        </div>
                        <div style="font-size:12px; color:var(--ink-sub); margin-top:14px; line-height:1.6;">
                            Faktúry sa automaticky strhávajú zo SEPA mandátu. Pre zmenu kontaktujte tím Adlify cez ticket alebo email.
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSettingsSecurity() {
            return `
                <div class="pt-card">
                    <div class="pt-card-head"><div class="pt-card-title">Bezpečnosť</div></div>
                    <div class="pt-card-body">
                        <form id="password-form" onsubmit="changePassword(event)" style="max-width:480px;">
                            <p style="margin:0 0 14px; font-size:13px; color:var(--ink-sub);">Pre zmenu hesla zadajte nové dvakrát. Heslo musí mať aspoň 8 znakov.</p>
                            <div style="margin-bottom:14px;">
                                <label class="pt-field-label">Nové heslo</label>
                                <input id="pw-new" class="pt-field-input" type="password" required minlength="8" autocomplete="new-password" placeholder="••••••••">
                            </div>
                            <div style="margin-bottom:14px;">
                                <label class="pt-field-label">Nové heslo (znova)</label>
                                <input id="pw-confirm" class="pt-field-input" type="password" required minlength="8" autocomplete="new-password" placeholder="••••••••">
                            </div>
                            <div id="password-message" style="margin-bottom:14px;"></div>
                            <div style="display:flex; justify-content:flex-end;">
                                <button type="submit" id="pw-submit-btn" class="adl-btn adl-btn-primary">${I.Lock({size:14})} Zmeniť heslo</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        async function saveProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('save-profile-btn');
            const msg = document.getElementById('profile-message');
            msg.innerHTML = '';
            if (isPreview) { previewBlocked(msg); return; }
            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = 'Ukladám…';
            try {
                const first = document.getElementById('prof-first').value.trim();
                const last  = document.getElementById('prof-last').value.trim();
                const fullName = [first, last].filter(Boolean).join(' ');
                const updateData = {
                    contact_person: fullName,
                    email:    document.getElementById('prof-email').value.trim(),
                    phone:    document.getElementById('prof-phone').value.trim(),
                    position: document.getElementById('prof-position').value.trim(),
                    language: document.getElementById('prof-language').value
                };
                const { error } = await db.from('clients').update(updateData).eq('id', client.id);
                if (error) throw error;
                Object.assign(client, updateData);
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--ok) 14%, var(--surface)); color:var(--ok); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Check({size:14})} Profil bol uložený</div>`;
            } catch (err) {
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} ${err.message}</div>`;
            }
            btn.disabled = false;
            btn.innerHTML = original;
        }

        function saveNotificationPrefs() {
            alert('Notifikácie sa uložia v ďalšom update.');
        }

        async function changePassword(e) {
            e.preventDefault();
            const pw1 = document.getElementById('pw-new').value;
            const pw2 = document.getElementById('pw-confirm').value;
            const msg = document.getElementById('password-message');
            const btn = document.getElementById('pw-submit-btn');
            msg.innerHTML = '';
            if (pw1 !== pw2) {
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} Heslá sa nezhodujú</div>`;
                return;
            }
            if (isPreview) { previewBlocked(msg); return; }
            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = 'Ukladám…';
            try {
                const { error } = await db.auth.updateUser({ password: pw1 });
                if (error) throw error;
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--ok) 14%, var(--surface)); color:var(--ok); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Check({size:14})} Heslo bolo zmenené</div>`;
                document.getElementById('pw-new').value = '';
                document.getElementById('pw-confirm').value = '';
            } catch (err) {
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} ${err.message}</div>`;
            }
            btn.disabled = false;
            btn.innerHTML = original;
        }

        async function saveAccount(e) {
            e.preventDefault();

            const btn = document.getElementById('save-account-btn');
            const msg = document.getElementById('account-message');

            if (isPreview) { previewBlocked(msg); return; }

            btn.disabled = true;
            const originalBtn = btn.innerHTML;
            btn.innerHTML = 'Ukladám…';
            msg.innerHTML = '';

            try {
                const updateData = {
                    company_name: document.getElementById('acc-company').value.trim(),
                    ico: document.getElementById('acc-ico').value.trim(),
                    dic: document.getElementById('acc-dic').value.trim(),
                    ic_dph: document.getElementById('acc-ic-dph').value.trim(),
                    domain: document.getElementById('acc-web').value.trim(),
                    contact_person: document.getElementById('acc-contact').value.trim(),
                    email: document.getElementById('acc-email').value.trim(),
                    phone: document.getElementById('acc-phone').value.trim(),
                    billing_street: document.getElementById('acc-street').value.trim(),
                    billing_zip: document.getElementById('acc-zip').value.trim(),
                    billing_city: document.getElementById('acc-city').value.trim(),
                    billing_country: document.getElementById('acc-country').value
                };

                const { error } = await db
                    .from('clients')
                    .update(updateData)
                    .eq('id', client.id);

                if (error) throw error;

                Object.assign(client, updateData);

                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--ok) 14%, var(--surface)); color:var(--ok); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Check({size:14})} Údaje boli uložené</div>`;
                btn.disabled = false;
                btn.innerHTML = originalBtn;

            } catch (err) {
                console.error('Save error:', err);
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} Chyba pri ukladaní: ${err.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = originalBtn;
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('sk-SK');
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('sk-SK', { style: 'currency', currency: 'EUR', minimumFractionDigits: 0 }).format(amount || 0);
        }

        function getStatusLabel(status) {
            const labels = { draft: 'Návrh', active: 'Aktívny', in_progress: 'V procese', completed: 'Dokončený', paused: 'Pozastavený' };
            return labels[status] || status || 'Návrh';
        }

        function getInvoiceStatusLabel(status) {
            const labels = { draft: 'Návrh', sent: 'Odoslaná', pending: 'Čaká', paid: 'Zaplatená', overdue: 'Po splatnosti' };
            return labels[status] || status || 'Čaká';
        }

        function getDocIcon(category) {
            const map = {
                contract: I.Edit({size:18}),
                invoice: I.Invoice({size:18}),
                proposal: I.Docs({size:18}),
                report: I.Chart({size:18}),
                image: I.Image({size:18})
            };
            return map[category] || I.Docs({size:18});
        }

        init();
    </script>
</body>
</html>
