                        <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:var(--n-50); color:var(--ink-mute); margin-bottom:14px;">${I.Campaign({size:24})}</div>
                        <h2 style="font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:6px;">Zatiaľ žiadne kampane</h2>
                        <p style="color:var(--ink-sub); font-size:13px; max-width:380px; margin:0 auto;">Kampane sa zobrazia po spustení tímom.</p>
                    </div>
                `;
            }
            const coverTones = ['rose', 'mint', 'lav', 'sky', 'amber'];
            const fmtMoney = (n) => new Intl.NumberFormat('sk-SK', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' €';
            const statusChip = (s) => {
                if (s === 'active') return `<span class="adl-chip adl-chip-mint adl-chip-sm"><span class="dot"></span>Aktívna</span>`;
                if (s === 'paused') return `<span class="adl-chip adl-chip-amber adl-chip-sm"><span class="dot"></span>Pauza</span>`;
                if (s === 'completed') return `<span class="adl-chip adl-chip-sky adl-chip-sm">Dokončená</span>`;
                return `<span class="adl-chip adl-chip-sm">${getStatusLabel(s)}</span>`;
            };
            const platformIcons = (c) => {
                const label = c.platform_label || (c.platform === 'meta' ? 'Facebook' : c.platform === 'google' ? 'Google' : '');
                const icons = [];
                if (/FB|Facebook|Meta/i.test(label)) icons.push(I.Fb({size:14}));
                if (/IG|Instagram/i.test(label))    icons.push(I.Instagram({size:14}));
                if (/Google/i.test(label))          icons.push(I.Google({size:14}));
                return icons.length ? `<div class="pt-camp-platforms">${icons.join('')}</div>` : '';
            };
            return `
                <div class="pt-camp-grid">
                    ${campaigns.map((c, i) => {
                        const cover = c.cover_tone || coverTones[i % coverTones.length];
                        const budget = c.budget || 0;
                        const budgetTotal = c.budget_total || budget;
                        const pct = budgetTotal > 0 ? Math.min(100, Math.round((budget / budgetTotal) * 100)) : 0;
                        const conv = c.conversions ?? 0;
                        const roi = c.roi;
                        return `
                            <div class="pt-camp-card">
                                <div class="pt-camp-cover pt-camp-cover-${cover}">
                                    ${statusChip(c.status)}
                                    ${platformIcons(c)}
                                </div>
                                <div class="pt-camp-body">
                                    <div class="pt-camp-title">${escapeHtml(c.name || 'Kampaň')}</div>
                                    <div class="pt-camp-sub">${escapeHtml(c.platform_label || (c.platform === 'meta' ? 'Meta Ads' : c.platform === 'google' ? 'Google Ads' : 'Multi-platform'))}</div>
                                    ${budget > 0 ? `
                                        <div class="pt-progress-wrap">
                                            <div class="pt-progress-head">
                                                <span>Rozpočet</span>
                                                <span class="mono">${fmtMoney(budget)}${budgetTotal !== budget ? ` z ${fmtMoney(budgetTotal)}` : ''}</span>
                                            </div>
                                            <div class="pt-progress-bar"><div class="pt-progress-fill" style="width:${pct}%;"></div></div>
                                        </div>
                                    ` : ''}
                                    <div class="pt-camp-stats">
                                        <div>
                                            <div class="pt-camp-stat-label">Konverzie</div>
                                            <div class="pt-camp-stat-value">${conv}</div>
                                        </div>
                                        <div>
                                            <div class="pt-camp-stat-label">ROI</div>
                                            <div class="pt-camp-stat-value ${roi == null ? '' : roi > 2 ? 'ok' : 'warn'}">${roi != null ? roi + '×' : '—'}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderInvoices() {
            const year = new Date().getFullYear();
            const paid = invoices.filter(i => i.status === 'paid');
            const paidThisYear = paid.filter(i => new Date(i.issue_date || i.created_at || 0).getFullYear() === year);
            const paidTotal = paidThisYear.reduce((sum, i) => sum + (i.total || 0), 0);
            const upcoming = invoices
                .filter(i => i.status !== 'paid' && i.due_date)
                .sort((a, b) => new Date(a.due_date) - new Date(b.due_date))[0];
            const paymentMethod = client?.payment_method || 'SEPA';
            const paymentLast4 = client?.payment_last4 || '•••• ••••';

            const fmtMoney = (n) => new Intl.NumberFormat('sk-SK', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' €';
            const statusChip = (s) => {
                if (s === 'paid') return `<span class="adl-chip adl-chip-mint adl-chip-sm"><span class="dot"></span>Zaplatené</span>`;
                if (s === 'overdue') return `<span class="adl-chip adl-chip-err adl-chip-sm"><span class="dot"></span>Po splatnosti</span>`;
                if (s === 'pending' || s === 'sent') return `<span class="adl-chip adl-chip-amber adl-chip-sm"><span class="dot"></span>Čaká</span>`;
                return `<span class="adl-chip adl-chip-sm">${getInvoiceStatusLabel(s)}</span>`;
            };

            return `
                <div class="pt-stats" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="pt-stat">
                        <div class="pt-stat-label">Celkom zaplatené (${year})</div>
                        <div class="pt-stat-value">${fmtMoney(paidTotal)}</div>
                        <div class="pt-stat-meta"><span class="pt-stat-hint">${paidThisYear.length} ${paidThisYear.length === 1 ? 'faktúra' : paidThisYear.length < 5 ? 'faktúry' : 'faktúr'}</span></div>
                    </div>
                    <div class="pt-stat">
                        <div class="pt-stat-label">Ďalšia splatnosť</div>
                        <div class="pt-stat-value">${upcoming ? fmtMoney(upcoming.total || 0) : '—'}</div>
                        <div class="pt-stat-meta"><span class="pt-stat-hint">${upcoming ? formatDate(upcoming.due_date) : 'Žiadne neuhradené'}</span></div>
                    </div>
                    <div class="pt-stat">
                        <div class="pt-stat-label">Spôsob platby</div>
                        <div class="pt-stat-value">${escapeHtml(paymentMethod)}</div>
                        <div class="pt-stat-meta"><span class="pt-stat-hint mono">${escapeHtml(paymentLast4)}</span></div>
                    </div>
                </div>

                <div class="pt-card">
                    ${invoices.length > 0 ? `
                        <div class="pt-table">
                            <div class="pt-table-head pt-table-cols-inv">
                                <span>Číslo</span><span>Popis</span><span>Suma</span><span>Splatnosť</span><span>Status</span><span></span><span></span>
                            </div>
                            ${invoices.map(inv => `
                                <div class="pt-table-row pt-table-cols-inv">
                                    <span class="mono" style="font-size:11px; color:var(--ink-sub);">${escapeHtml(inv.invoice_number || '—')}</span>
                                    <span style="font-size:13px; font-weight:500;">${escapeHtml(inv.description || inv.note || 'Faktúra')}</span>
                                    <span class="mono" style="font-size:13px; font-weight:600;">${fmtMoney(inv.total || 0)}</span>
                                    <span style="font-size:12px; color:var(--ink-sub);">${formatDate(inv.due_date)}</span>
                                    ${statusChip(inv.status)}
                                    ${inv.file_url
                                        ? `<a class="adl-btn adl-btn-outline adl-btn-sm" href="${inv.file_url}" target="_blank" rel="noopener">${I.Download({size:12})} PDF</a>`
                                        : `<span></span>`}
                                    <span style="color:var(--ink-mute); cursor:pointer;">${I.More({size:14})}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div style="padding:60px 28px; text-align:center;">
                            <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:var(--n-50); color:var(--ink-mute); margin-bottom:14px;">${I.Invoice({size:24})}</div>
                            <h2 style="font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:6px;">Zatiaľ žiadne faktúry</h2>
                            <p style="color:var(--ink-sub); font-size:13px;">Prvá faktúra sa zobrazí po vystavení.</p>
                        </div>
                    `}
                </div>
            `;
        }

        // ─── Approvals (PR E2) ───
        const APPROVAL_STATUS_META = {
            pending:  { label: 'Čaká',       tone: 'amber' },
            approved: { label: 'Schválené',  tone: 'mint'  },
            rejected: { label: 'Zamietnuté', tone: 'err'   }
        };
        const APPROVAL_KIND_META = {
            creative: { label: 'Kreatíva', icon: 'Template' },
            copy:     { label: 'Texty',    icon: 'Docs'     },
            design:   { label: 'Dizajn',   icon: 'Template' },
            video:    { label: 'Video',    icon: 'Campaign' },
            other:    { label: 'Iné',      icon: 'Docs'     }
        };
        const APPROVAL_FILTERS = [
            { key: 'pending',   label: 'Čakajú na vás', match: a => a.status === 'pending' },
            { key: 'approved',  label: 'Schválené',     match: a => a.status === 'approved' },
            { key: 'rejected',  label: 'Zamietnuté',    match: a => a.status === 'rejected' },
            { key: 'all',       label: 'Všetko',        match: () => true }
        ];

        function pendingApprovalsCount() {
            return approvals.filter(a => a.status === 'pending').length;
        }

        function buildApprovalChain(approval) {
            // Najnovšia verzia s rovnakým „root" — najprv vystúpame na root, potom všetky deti.
            const byId = new Map(approvals.map(a => [a.id, a]));
            let root = approval;
            while (root.parent_approval_id && byId.has(root.parent_approval_id)) {
                root = byId.get(root.parent_approval_id);
            }
            const chain = [];
            const visit = (node) => {
                chain.push(node);
                const children = approvals.filter(a => a.parent_approval_id === node.id);
                children.sort((a, b) => (a.version || 0) - (b.version || 0));
                children.forEach(visit);
            };
            visit(root);
            return chain;
        }

        function renderApprovals() {
            const activeFilter = APPROVAL_FILTERS.find(f => f.key === approvalsFilter) || APPROVAL_FILTERS[0];
            const filtered = approvals.filter(activeFilter.match);
            const selected = approvals.find(a => a.id === selectedApprovalId) || null;

            return `
                <div class="pt-chip-strip">
                    ${APPROVAL_FILTERS.map(f => {
                        const count = approvals.filter(f.match).length;
                        return `<button class="pt-chip-filter ${approvalsFilter === f.key ? 'active' : ''}" onclick="setApprovalsFilter('${f.key}')">${f.label} (${count})</button>`;
                    }).join('')}
                </div>

                ${filtered.length === 0 ? `
                    <div class="pt-card" style="padding:60px 28px; text-align:center;">
                        <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:var(--n-50); color:var(--ink-mute); margin-bottom:14px;">${I.Check({size:24})}</div>
                        <h2 style="font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:6px;">${approvals.length === 0 ? 'Zatiaľ nič na schválenie' : 'V tomto filtri nič nie je'}</h2>
                        <p style="color:var(--ink-sub); font-size:13px;">${approvals.length === 0 ? 'Keď vám tím pošle kreatívy alebo texty na schválenie, objavia sa tu.' : 'Skúste iný filter.'}</p>
                    </div>
                ` : `
                    <div class="pt-ap-grid">
                        ${filtered.map(renderApprovalCard).join('')}
                    </div>
                `}

                ${selected ? renderApprovalDetailModal(selected) : ''}
            `;
        }

        function renderApprovalCard(a) {
            const status = APPROVAL_STATUS_META[a.status] || APPROVAL_STATUS_META.pending;
            const kind = APPROVAL_KIND_META[a.kind] || APPROVAL_KIND_META.other;
            const v = a.version > 1 ? `v${a.version}` : '';
            const thumb = a.thumbnail_url || a.asset_url;
            return `
                <button class="pt-ap-card" onclick="selectApproval('${a.id}')">
                    <div class="pt-ap-card-media">
                        ${thumb
                            ? `<img src="${escapeHtml(thumb)}" alt="" loading="lazy">`
                            : `<div class="pt-ap-card-placeholder">${I[kind.icon]({size:32})}</div>`}
                        ${v ? `<span class="pt-ap-card-version">${v}</span>` : ''}
                        <span class="pt-ap-card-status adl-chip adl-chip-${status.tone} adl-chip-sm"><span class="dot"></span>${status.label}</span>
                    </div>
                    <div class="pt-ap-card-body">
                        <div class="pt-ap-card-title">${escapeHtml(a.title || 'Bez názvu')}</div>
                        <div class="pt-ap-card-meta">
                            <span>${I[kind.icon]({size:11})} ${kind.label}</span>
                            <span class="pt-ap-card-date">${formatDate(a.created_at)}</span>
                        </div>
                    </div>
                </button>
            `;
        }

        function renderApprovalDetailModal(a) {
            const status = APPROVAL_STATUS_META[a.status] || APPROVAL_STATUS_META.pending;
            const kind = APPROVAL_KIND_META[a.kind] || APPROVAL_KIND_META.other;
            const chain = buildApprovalChain(a);
            const reviewer = a.reviewed_at ? formatDate(a.reviewed_at) : '';
            const isPending = a.status === 'pending';
            const isReject = approvalDecisionMode === 'reject';

            return `
                <div class="pt-modal-overlay" onclick="if(event.target===this) closeApprovalDetail()">
                    <div class="pt-modal pt-modal--lg">
                        <div class="pt-modal-head">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span class="adl-chip adl-chip-${status.tone} adl-chip-sm"><span class="dot"></span>${status.label}</span>
                                <span class="adl-chip adl-chip-sm">${kind.label}</span>
                                ${a.version > 1 ? `<span class="pt-ap-modal-version">v${a.version}</span>` : ''}
                            </div>
                            <button class="pt-iconbtn" onclick="closeApprovalDetail()" title="Zatvoriť">${I.X({size:14})}</button>
                        </div>
                        <div class="pt-ap-modal-body">
                            <div class="pt-ap-preview">
                                ${a.asset_url
                                    ? `<img src="${escapeHtml(a.asset_url)}" alt="${escapeHtml(a.title || '')}">`
                                    : `<div class="pt-ap-preview-placeholder">${I[kind.icon]({size:48})}<span>Bez náhľadu</span></div>`}
                            </div>
                            <div class="pt-ap-side">
                                <div class="pt-ap-side-title">${escapeHtml(a.title || 'Bez názvu')}</div>
                                ${a.description ? `<div class="pt-ap-side-desc">${escapeHtml(a.description)}</div>` : ''}

                                ${chain.length > 1 ? `
                                    <div class="pt-ap-side-section">
                                        <div class="pt-ap-side-section-label">Verzie</div>
                                        <ol class="pt-ap-chain">
                                            ${chain.map(c => {
                                                const cs = APPROVAL_STATUS_META[c.status] || APPROVAL_STATUS_META.pending;
                                                const isCurrent = c.id === a.id;
                                                return `
                                                    <li class="pt-ap-chain-item ${isCurrent ? 'is-current' : ''}">
                                                        <button onclick="selectApproval('${c.id}')" ${isCurrent ? 'disabled' : ''}>
                                                            <span class="pt-ap-chain-ver">v${c.version || 1}</span>
                                                            <span class="adl-chip adl-chip-${cs.tone} adl-chip-sm">${cs.label}</span>
                                                            <span class="pt-ap-chain-date">${formatDate(c.created_at)}</span>
                                                        </button>
                                                    </li>
                                                `;
                                            }).join('')}
                                        </ol>
                                    </div>
                                ` : ''}

                                ${!isPending && reviewer ? `
                                    <div class="pt-ap-side-section">
                                        <div class="pt-ap-side-section-label">Rozhodnutie</div>
                                        <div class="pt-ap-decision">${escapeHtml(reviewer)}</div>
                                        ${a.feedback ? `<div class="pt-ap-feedback">${escapeHtml(a.feedback)}</div>` : ''}
                                    </div>
                                ` : ''}

                                ${isPending ? (isReject ? `
                                    <div class="pt-ap-side-section">
                                        <div class="pt-ap-side-section-label">Dôvod zamietnutia</div>
                                        <form onsubmit="event.preventDefault(); confirmReject('${a.id}', this)">
                                            <textarea id="ap-reject-feedback" class="pt-field-input" rows="4" required minlength="3" placeholder="Stručne čo treba upraviť — tím podľa toho pripraví novú verziu." style="font-family:inherit; resize:vertical;"></textarea>
                                            <div id="ap-reject-msg" style="margin-top:8px;"></div>
                                            <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:10px;">
                                                <button type="button" class="adl-btn adl-btn-outline adl-btn-sm" onclick="cancelDecision()">Späť</button>
                                                <button type="submit" class="adl-btn adl-btn-err adl-btn-sm">${I.X({size:13})} Zamietnuť verziu</button>
                                            </div>
                                        </form>
                                    </div>
                                ` : `
                                    <div class="pt-ap-actions">
                                        <div id="ap-action-msg"></div>
                                        <div class="pt-ap-actions-row">
                                            <button class="adl-btn adl-btn-outline adl-btn-sm pt-ap-btn-reject" onclick="startReject()">${I.X({size:13})} Zamietnuť</button>
                                            <button class="adl-btn adl-btn-primary adl-btn-sm pt-ap-btn-approve" onclick="confirmApprove('${a.id}')">${I.Check({size:13})} Schváliť</button>
                                        </div>
                                    </div>
                                `) : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function setApprovalsFilter(f) {
            approvalsFilter = f;
            render();
        }

        function selectApproval(id) {
            selectedApprovalId = id;
            approvalDecisionMode = null;
            render();
            requestAnimationFrame(() => {
                document.querySelector('.pt-ap-modal-body')?.scrollTo(0, 0);
            });
        }

        function closeApprovalDetail() {
            selectedApprovalId = null;
            approvalDecisionMode = null;
            render();
        }

        function startReject() {
            approvalDecisionMode = 'reject';
            render();
            requestAnimationFrame(() => document.getElementById('ap-reject-feedback')?.focus());
        }

        function cancelDecision() {
            approvalDecisionMode = null;
            render();
        }

        async function confirmApprove(id) {
            const msgEl = document.getElementById('ap-action-msg');
            if (isPreview) { previewBlocked(msgEl); return; }
            const idx = approvals.findIndex(a => a.id === id);
            if (idx === -1) return;
            const prev = approvals[idx];
            approvals[idx] = { ...prev, status: 'approved', reviewed_at: new Date().toISOString() };
            render();
            const { error } = await db.from('approvals').update({
                status: 'approved',
                reviewed_at: new Date().toISOString(),
                reviewed_by: user.id
            }).eq('id', id);
            if (error) {
                approvals[idx] = prev;
                render();
                alert('Schválenie zlyhalo: ' + error.message);
            }
        }

        async function confirmReject(id, formEl) {
            const ta = formEl.querySelector('#ap-reject-feedback');
            const msgEl = formEl.querySelector('#ap-reject-msg');
            const feedback = (ta?.value || '').trim();
            if (feedback.length < 3) {
                ta?.focus();
                return;
            }
            if (isPreview) { previewBlocked(msgEl); return; }
            const idx = approvals.findIndex(a => a.id === id);
            if (idx === -1) return;
            const prev = approvals[idx];
            approvals[idx] = { ...prev, status: 'rejected', feedback, reviewed_at: new Date().toISOString() };
            approvalDecisionMode = null;
            render();
            const { error } = await db.from('approvals').update({
                status: 'rejected',
                feedback,
                reviewed_at: new Date().toISOString(),
                reviewed_by: user.id
            }).eq('id', id);
            if (error) {
                approvals[idx] = prev;
                render();
                alert('Zamietnutie zlyhalo: ' + error.message);
            }
        }

        // ─── Reports (PR E1) ───
        function renderReports() {
            const kpis = client?.dashboard_kpis || {};
            const fmtNum = n => new Intl.NumberFormat('sk-SK').format(Math.round(n || 0));
            const fmtMoney = n => fmtNum(n) + ' €';
            const fmtBytes = bytes => {
                if (!bytes) return '';
                const mb = bytes / (1024 * 1024);
                if (mb < 1) return Math.round(bytes / 1024) + ' KB';
                return (mb < 10 ? mb.toFixed(1) : Math.round(mb)) + ' MB';
            };
            const fmtPeriod = (start, end) => {
                if (!start || !end) return '';
                const s = new Date(start), e = new Date(end);
                if (isNaN(s.getTime()) || isNaN(e.getTime())) return '';
                const sameYear = s.getFullYear() === e.getFullYear();
                const fmt = (d, withYear) => d.toLocaleDateString('sk-SK', { day: 'numeric', month: 'short', year: withYear ? 'numeric' : undefined });
                return `${fmt(s, !sameYear)} – ${fmt(e, true)}`;
            };

            const trend = Array.isArray(kpis.trend) ? kpis.trend : [];

            // Top kampane podľa konverzií
            const topCamps = [...campaigns]
                .filter(c => typeof c.conversions === 'number')
                .sort((a, b) => (b.conversions || 0) - (a.conversions || 0))
                .slice(0, 5);

            const totalConversionsCamps = topCamps.reduce((s, c) => s + (c.conversions || 0), 0);

            return `
                <div class="pt-rep-hero">
                    <div class="pt-rep-hero-head">
                        <div>
                            <div class="pt-rep-hero-eyebrow">Aktuálny mesiac</div>
                            <div class="pt-rep-hero-title">Výkonnostný prehľad</div>
                            <div class="pt-rep-hero-sub">${escapeHtml(client?.company_name || '')} · live KPI z kampaní</div>
                        </div>
                        ${trend.length ? `<div class="pt-rep-spark">${sparkline(trend, 220, 60, '#fff')}</div>` : ''}
                    </div>
                    <div class="pt-rep-kpi-grid">
                        <div class="pt-rep-kpi">
                            <div class="pt-rep-kpi-label">Konverzie</div>
                            <div class="pt-rep-kpi-value">${fmtNum(kpis.conversions)}</div>
                            ${typeof kpis.conversions_delta_pct === 'number' ? `<div class="pt-rep-kpi-delta ${kpis.conversions_delta_pct >= 0 ? 'is-up' : 'is-down'}">${kpis.conversions_delta_pct >= 0 ? '+' : ''}${kpis.conversions_delta_pct}%</div>` : ''}
                        </div>
                        <div class="pt-rep-kpi">
                            <div class="pt-rep-kpi-label">ROI</div>
                            <div class="pt-rep-kpi-value">${(kpis.roi || 0).toFixed(1)}×</div>
                            <div class="pt-rep-kpi-delta">${fmtMoney(kpis.conversion_value)} hodnota</div>
                        </div>
                        <div class="pt-rep-kpi">
                            <div class="pt-rep-kpi-label">Dosah</div>
                            <div class="pt-rep-kpi-value">${fmtNum(kpis.reach)}</div>
                            <div class="pt-rep-kpi-delta">${fmtNum(kpis.clicks)} kliknutí</div>
                        </div>
                        <div class="pt-rep-kpi">
                            <div class="pt-rep-kpi-label">Náklady</div>
                            <div class="pt-rep-kpi-value">${fmtMoney(kpis.spent)}</div>
                            <div class="pt-rep-kpi-delta">z ${fmtMoney(kpis.budget)} budgetu</div>
                        </div>
                    </div>
                </div>

                <div class="pt-card">

        function renderDocuments() {
            const categories = [
                { key: 'all',       label: 'Všetko',    match: () => true },
                { key: 'contract',  label: 'Zmluvy',    match: d => d.category === 'contract' },
                { key: 'report',    label: 'Reporty',   match: d => d.category === 'report' },
                { key: 'creative',  label: 'Kreatívy',  match: d => d.category === 'creative' },
                { key: 'invoice',   label: 'Faktúry',   match: d => d.category === 'invoice' },
            ];
            const docToneIcon = (cat) => {
                switch (cat) {
                    case 'contract': return { tone: 'mint',  icon: 'Docs' };
                    case 'report':   return { tone: 'lav',   icon: 'Chart' };
                    case 'creative': return { tone: 'rose',  icon: 'Template' };
                    case 'invoice':  return { tone: 'amber', icon: 'Invoice' };
                    default:         return { tone: 'sky',   icon: 'Docs' };
                }
            };
            const filtered = documents.filter(categories.find(c => c.key === currentDocFilter)?.match || (() => true));

            return `
                <div class="pt-chip-strip">
                    ${categories.map(c => {
                        const count = c.key === 'all' ? documents.length : documents.filter(c.match).length;
                        return `<button class="pt-chip-filter ${currentDocFilter === c.key ? 'active' : ''}" onclick="setDocFilter('${c.key}')">${c.label} (${count})</button>`;
                    }).join('')}
                </div>

                ${filtered.length > 0 ? `
                    <div class="pt-doc-grid">
                        ${filtered.map(d => {
                            const ti = docToneIcon(d.category);
                            return `
                                <a class="pt-doc-card" href="${d.file_url || '#'}" target="_blank" rel="noopener">
                                    <div class="pt-doc-icon pt-doc-icon-${ti.tone}">${I[ti.icon]({size:20})}</div>
                                    <div>
                                        <div class="pt-doc-title">${escapeHtml(d.name)}</div>
                                        <div class="pt-doc-sub">${escapeHtml(d.file_name || d.file_size_label || '')}</div>
                                    </div>
                                    <div class="pt-doc-foot">
                                        <span>${formatDate(d.created_at)}</span>
                                        ${I.Download({size:13})}
                                    </div>
                                </a>
                            `;
                        }).join('')}
                    </div>
                ` : `
                    <div class="pt-card" style="padding:60px 28px; text-align:center;">
                        <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:var(--n-50); color:var(--ink-mute); margin-bottom:14px;">${I.Docs({size:24})}</div>
                        <h2 style="font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:6px;">${currentDocFilter === 'all' ? 'Zatiaľ žiadne dokumenty' : 'V tejto kategórii nič nie je'}</h2>
                        <p style="color:var(--ink-sub); font-size:13px;">${currentDocFilter === 'all' ? 'Prvý dokument sa zobrazí po nahratí.' : 'Skús inú kategóriu.'}</p>
                    </div>
                `}
            `;
        }

        function setDocFilter(key) {
            currentDocFilter = key;
            render();
        }

        function renderMessages() {
            const am = client?.account_manager || { name: 'Adlify tím', role: 'Account manažér', response_time: 'odpovedá do 2h', email: 'team@adlify.sk', phone: '' };
            return `
                <div class="pt-msg-wrap">
                    <aside class="pt-msg-side">
                        <div class="pt-msg-am">
                            <div class="pt-msg-am-avatar">${initials(am.name)}</div>
                            <div class="pt-msg-am-name">${escapeHtml(am.name)}</div>
                            <div class="pt-msg-am-role">${escapeHtml(am.role || 'Account manažér')}</div>
                            <div class="pt-msg-am-status"><span class="pt-msg-dot"></span>${escapeHtml(am.response_time || 'odpovedá do 2h')}</div>
                            <div class="pt-msg-am-contact">
                                ${am.email ? `<a class="pt-msg-am-link" href="mailto:${escapeHtml(am.email)}">${I.Mail({size:13})} ${escapeHtml(am.email)}</a>` : ''}
                                ${am.phone ? `<a class="pt-msg-am-link" href="tel:${escapeHtml(am.phone)}">${I.Phone({size:13})} ${escapeHtml(am.phone)}</a>` : ''}

                        </div>
                        <div class="pt-msg-side-hint">${I.Info({size:12})} Odpovedáme zvyčajne do niekoľkých hodín v pracovných dňoch.</div>
                    </aside>
                    ${renderMessageThread()}
                </div>
            `;
        }

        function renderMessageThread() {
            const sorted = [...messages].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            const groups = groupMessagesByDay(sorted);
            const body = sorted.length === 0
                ? `<div class="pt-msg-empty">
                       <div class="pt-msg-empty-icon">${I.Mail({size:24})}</div>
                       <div class="pt-msg-empty-title">Zatiaľ žiadne správy</div>
                       <div class="pt-msg-empty-sub">Napíšte tímu prvú správu — odpovieme zvyčajne do niekoľkých hodín.</div>
                   </div>`
                : groups.map(g => `
                    <div class="pt-msg-daysep"><span>${escapeHtml(g.label)}</span></div>
                    ${g.items.map(m => renderMessageBubble(m)).join('')}
                `).join('');
            return `
                <section id="pt-msg-thread" class="pt-msg-thread">
                    ${body}
                    <form class="pt-msg-composer" onsubmit="event.preventDefault(); sendMessage(this);">
                        <div data-preview-banner></div>
                        <textarea
                            class="pt-msg-input"
                            placeholder="Napíšte správu tímu…"
                            rows="2"
                            oninput="onMessageInput(this)"
                            onkeydown="if(event.key==='Enter' && (event.metaKey||event.ctrlKey)){ event.preventDefault(); this.form.requestSubmit(); }"
                        >${escapeHtml(messageDraft)}</textarea>
                        <div class="pt-msg-composer-foot">
                            <span class="pt-msg-hint">Cmd/Ctrl + Enter na odoslanie</span>
                            <button type="submit" class="adl-btn adl-btn-primary adl-btn-sm">${I.Send({size:13})} Odoslať</button>
                        </div>
                    </form>
                </section>
            `;
        }

        function renderMessageBubble(m) {
            const isClient = m.sender_type === 'client';
            const time = new Date(m.created_at);
            const hh = String(time.getHours()).padStart(2, '0');
            const mm = String(time.getMinutes()).padStart(2, '0');
            return `
                <div class="pt-msg-row ${isClient ? 'pt-msg-row--out' : 'pt-msg-row--in'}">
                    <div class="pt-msg-bubble ${isClient ? 'pt-msg-bubble--out' : 'pt-msg-bubble--in'}">
                        <div class="pt-msg-text">${escapeHtml(m.content || '').replace(/\n/g, '<br>')}</div>
                        <div class="pt-msg-meta">${hh}:${mm}${isClient && m.is_read ? ` · prečítané` : ''}</div>
                    </div>
                </div>
            `;
        }

        function groupMessagesByDay(items) {
            const groups = [];
            let last = null;
            const today = new Date(); today.setHours(0,0,0,0);
            const yest  = new Date(today.getTime() - 86400000);
            for (const m of items) {
                const d = new Date(m.created_at); d.setHours(0,0,0,0);
                const key = d.toISOString().slice(0,10);
                let label;
                if (d.getTime() === today.getTime()) label = 'Dnes';
                else if (d.getTime() === yest.getTime()) label = 'Včera';
                else label = d.toLocaleDateString('sk-SK', { day: 'numeric', month: 'long', year: d.getFullYear() === today.getFullYear() ? undefined : 'numeric' });
                if (!last || last.key !== key) {
                    last = { key, label, items: [] };
                    groups.push(last);
                }
                last.items.push(m);
            }
            return groups;
        }

        const TICKET_STATUS_MAP = {
            open:        { label: 'Otvorené',   tone: 'sky'   },
            in_progress: { label: 'V riešení',  tone: 'amber' },
            waiting:     { label: 'Čaká',       tone: 'lav'   },
            resolved:    { label: 'Vyriešené',  tone: 'mint'  },
            closed:      { label: 'Uzatvorené', tone: 'n'     }
        };
        const TICKET_PRIORITY_MAP = {
            low:    { label: 'Nízka',   tone: 'n'     },
            medium: { label: 'Stredná', tone: 'sky'   },
            high:   { label: 'Vysoká',  tone: 'amber' },
            urgent: { label: 'Súrne',   tone: 'err'   }
        };
        const TICKET_CATEGORY_LABEL = { general: 'Všeobecné', billing: 'Fakturácia', technical: 'Technické', campaign: 'Kampaň', other: 'Iné' };
        const TICKET_FILTERS = [
            { key: 'all',       label: 'Všetky',   match: () => true },
            { key: 'open',      label: 'Otvorené', match: t => t.status === 'open' || t.status === 'in_progress' || t.status === 'waiting' },
            { key: 'resolved',  label: 'Hotové',   match: t => t.status === 'resolved' || t.status === 'closed' }
        ];

        function renderSupport() {
            const activeFilter = TICKET_FILTERS.find(f => f.key === ticketFilter) || TICKET_FILTERS[0];
            const filtered = tickets.filter(activeFilter.match);
            const selected = tickets.find(t => t.id === selectedTicketId) || null;

            return `
                <div class="pt-tk-wrap">
                    <aside class="pt-tk-side">
                        <div class="pt-tk-side-head">
                            <div class="pt-chip-strip" style="margin:0; padding:0;">
                                ${TICKET_FILTERS.map(f => {
                                    const count = tickets.filter(f.match).length;
                                    return `<button class="pt-chip-filter ${ticketFilter === f.key ? 'active' : ''}" onclick="setTicketFilter('${f.key}')">${f.label} (${count})</button>`;
                                }).join('')}
                            </div>
                            <button class="adl-btn adl-btn-primary adl-btn-sm" onclick="openTicketComposer()">${I.Plus({size:13})} Nový</button>
                        </div>
                        <div class="pt-tk-list">
                            ${filtered.length === 0 ? `
                                <div class="pt-tk-empty-mini">
                                    ${I.Ticket({size:18})}
                                    <div>Žiadne tickety v tejto kategórii</div>
                                </div>
                            ` : filtered.map(t => renderTicketListItem(t, t.id === selectedTicketId)).join('')}
                        </div>
                    </aside>
                    <section class="pt-tk-detail">
                        ${selected ? renderTicketDetail(selected) : renderTicketEmptyDetail()}
                    </section>
                </div>
                ${ticketComposerOpen ? renderTicketComposer() : ''}
            `;
        }

        function renderTicketListItem(t, isSelected) {
            const status = TICKET_STATUS_MAP[t.status] || TICKET_STATUS_MAP.open;
            const priority = TICKET_PRIORITY_MAP[t.priority] || TICKET_PRIORITY_MAP.medium;
            return `
                <button class="pt-tk-row ${isSelected ? 'is-selected' : ''}" onclick="selectTicket('${t.id}')">
                    <span class="pt-tk-row-bar" style="background:var(--acc-${status.tone}-ink, var(--brand-500));"></span>
                    <div class="pt-tk-row-body">
                        <div class="pt-tk-row-subject">${escapeHtml(t.subject || '—')}</div>
                        <div class="pt-tk-row-meta">
                            <span class="adl-chip adl-chip-${status.tone} adl-chip-sm"><span class="dot"></span>${status.label}</span>
                            <span class="pt-tk-row-pri pt-tk-row-pri--${priority.tone}" title="Priorita: ${priority.label}"></span>
                            <span class="pt-tk-row-date">${formatDate(t.created_at)}</span>
                        </div>
                    </div>
                </button>
            `;
        }

        function renderTicketEmptyDetail() {
            return `
                <div class="pt-tk-empty">
                    <div class="pt-tk-empty-icon">${I.Ticket({size:24})}</div>
                    <div class="pt-tk-empty-title">${tickets.length === 0 ? 'Zatiaľ žiadne tickety' : 'Vyberte ticket vľavo'}</div>
                    <div class="pt-tk-empty-sub">${tickets.length === 0 ? 'Vytvorte prvý ticket cez tlačidlo „Nový" — odpovedáme zvyčajne do niekoľkých hodín.' : 'Klikom na ticket sa zobrazí detail, popis a história stavu.'}</div>
                    ${tickets.length === 0 ? `<button class="adl-btn adl-btn-primary adl-btn-sm" style="margin-top:14px;" onclick="openTicketComposer()">${I.Plus({size:13})} Vytvoriť ticket</button>` : ''}
                </div>
            `;
        }

        function renderTicketDetail(t) {
            const status = TICKET_STATUS_MAP[t.status] || TICKET_STATUS_MAP.open;
            const priority = TICKET_PRIORITY_MAP[t.priority] || TICKET_PRIORITY_MAP.medium;
            const categoryLabel = TICKET_CATEGORY_LABEL[t.category] || t.category || '—';
            const ticketIdShort = (t.id || '').toString().slice(0, 8);
            const timeline = buildTicketTimeline(t);
            return `
                <header class="pt-tk-detail-head">
                    <div class="pt-tk-detail-head-row">
                        <span class="adl-chip adl-chip-${status.tone} adl-chip-sm"><span class="dot"></span>${status.label}</span>
                        <span class="adl-chip adl-chip-${priority.tone} adl-chip-sm">${priority.label}</span>
                        <span class="adl-chip adl-chip-sm">${categoryLabel}</span>
                        <span class="pt-tk-detail-id">#${escapeHtml(ticketIdShort)}</span>
                    </div>
                    <h2 class="pt-tk-detail-title">${escapeHtml(t.subject || '—')}</h2>
                    <div class="pt-tk-detail-sub">Vytvorené ${formatDate(t.created_at)}</div>
                </header>
                <div class="pt-tk-detail-body">
                    <div class="pt-tk-detail-section">
                        <div class="pt-tk-detail-section-label">Popis</div>
                        ${t.description
                            ? `<div class="pt-tk-detail-desc">${escapeHtml(t.description).replace(/\n/g, '<br>')}</div>`
                            : `<div class="pt-tk-detail-desc pt-tk-detail-desc--muted">Bez popisu.</div>`}
                    </div>
                    <div class="pt-tk-detail-section">
                        <div class="pt-tk-detail-section-label">História stavu</div>
                        <ol class="pt-tk-timeline">
                            ${timeline.map((step, i) => `
                                <li class="pt-tk-timeline-item ${step.done ? 'is-done' : ''} ${i === timeline.length - 1 ? 'is-last' : ''}">
                                    <span class="pt-tk-timeline-dot" style="${step.done ? `background:var(--acc-${step.tone}-ink, var(--brand-500));` : ''}"></span>
                                    <div class="pt-tk-timeline-body">
                                        <div class="pt-tk-timeline-label">${step.label}</div>
                                        ${step.hint ? `<div class="pt-tk-timeline-hint">${escapeHtml(step.hint)}</div>` : ''}
                                    </div>
                                </li>
                            `).join('')}
                        </ol>
                    </div>
                    <div class="pt-tk-detail-hint">
                        ${I.Info({size:12})} Pre konkrétne otázky napíšte do <a href="#" onclick="event.preventDefault(); switchTab('messages')">Správy</a> — odpovedáme rýchlejšie ako tu.
                    </div>
                </div>
            `;
        }

        function buildTicketTimeline(t) {
            const status = t.status || 'open';
            const order = ['open', 'in_progress', 'waiting', 'resolved'];
            const currentIdx = Math.max(0, order.indexOf(status === 'closed' ? 'resolved' : status));
            const steps = [
                { key: 'open',        label: 'Vytvorené',     tone: 'sky',   hint: formatDate(t.created_at) },
                { key: 'in_progress', label: 'V riešení',     tone: 'amber', hint: status === 'in_progress' ? 'Náš tím pracuje na ticketu' : '' },
                { key: 'waiting',     label: 'Čaká na vás',   tone: 'lav',   hint: status === 'waiting' ? 'Potrebujeme od vás doplniť informácie' : '' },
                { key: 'resolved',    label: status === 'closed' ? 'Uzatvorené' : 'Vyriešené', tone: 'mint', hint: '' }
            ];
            return steps.map((s, i) => ({ ...s, done: i <= currentIdx }));
        }

        function renderTicketComposer() {
            return `
                <div class="pt-modal-overlay" onclick="if(event.target===this) closeTicketComposer()">
                    <div class="pt-modal">
                        <div class="pt-modal-head">
                            <h3 class="pt-modal-title">${I.Plus({size:16})} Nový ticket</h3>
                            <button class="pt-iconbtn" onclick="closeTicketComposer()" title="Zatvoriť">${I.X ? I.X({size:14}) : '×'}</button>
                        </div>
                        <form id="ticket-form" class="pt-modal-body" onsubmit="submitTicket(event)">
                            <div>
                                <label class="pt-field-label">Predmet *</label>
                                <input type="text" id="t-subject" required maxlength="200" class="pt-field-input" placeholder="Stručný popis problému alebo otázky">
                            </div>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                                <div>
                                    <label class="pt-field-label">Kategória</label>
                                    <select id="t-category" class="pt-field-input">
                                        <option value="general">Všeobecné</option>
                                        <option value="billing">Fakturácia</option>
                                        <option value="technical">Technické</option>
                                        <option value="campaign">Kampaň</option>
                                        <option value="other">Iné</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="pt-field-label">Priorita</label>
                                    <select id="t-priority" class="pt-field-input">
                                        <option value="low">Nízka</option>
                                        <option value="medium" selected>Stredná</option>
                                        <option value="high">Vysoká</option>
                                        <option value="urgent">Súrne</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="pt-field-label">Popis</label>
                                <textarea id="t-description" rows="4" class="pt-field-input" style="resize:vertical; font-family:inherit;" placeholder="Detailný popis problému, kroky reprodukcie alebo otázka…"></textarea>
                            </div>
                            <div id="ticket-form-msg"></div>
                            <div class="pt-modal-foot">
                                <button type="button" class="adl-btn adl-btn-outline adl-btn-sm" onclick="closeTicketComposer()">Zrušiť</button>
                                <button type="submit" id="ticket-submit-btn" class="adl-btn adl-btn-primary adl-btn-sm">${I.Send({size:13})} Odoslať</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function setTicketFilter(f) {
            ticketFilter = f;
            render();
        }

        function selectTicket(id) {
            selectedTicketId = id;
            render();
        }

        function openTicketComposer(prefill) {
            currentTab = 'support';
            ticketComposerOpen = true;
            render();
            requestAnimationFrame(() => {
                const subject = document.getElementById('t-subject');
                if (subject && prefill?.subject) subject.value = prefill.subject;
                const cat = document.getElementById('t-category');
                if (cat && prefill?.category) cat.value = prefill.category;
                const desc = document.getElementById('t-description');
                if (desc && prefill?.description) desc.value = prefill.description;
                (prefill?.description ? desc : subject)?.focus();
            });
        }

        function closeTicketComposer() {
            ticketComposerOpen = false;
            render();
        }

        async function submitTicket(e) {
            e.preventDefault();
            const subject = document.getElementById('t-subject').value.trim();
            const description = document.getElementById('t-description').value.trim();
            const category = document.getElementById('t-category').value;
            const priority = document.getElementById('t-priority').value;
            const btn = document.getElementById('ticket-submit-btn');
            const msg = document.getElementById('ticket-form-msg');
            if (!subject) return;

            if (isPreview) { previewBlocked(msg); return; }

            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = 'Odosielam…';
            msg.innerHTML = '';

            try {
                const { data, error } = await db.from('tickets').insert([{
                    client_id: client.id,
                    subject,
                    description: description || null,
                    category,
                    priority,
                    status: 'open'
                }]).select().single();
                if (error) throw error;
                tickets.unshift(data);
                selectedTicketId = data.id;
                ticketComposerOpen = false;
                render();
            } catch (err) {
                console.error('Create ticket error:', err);
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} Chyba: ${err.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = original;
            }
        }

        // ─── Calendar (PR D) ───
        const CALENDAR_FILTERS = [
            { key: 'all',       label: 'Všetko',    match: () => true },
            { key: 'invoices',  label: 'Faktúry',   match: e => e.kind === 'invoice' },
            { key: 'campaigns', label: 'Kampane',   match: e => e.kind === 'campaign' },
            { key: 'meetings',  label: 'Stretnutia',match: e => e.kind === 'meeting' }
        ];

        function buildCalendarEvents() {
            const out = [];
            const now = new Date();
            const startOfToday = new Date(now); startOfToday.setHours(0, 0, 0, 0);

            (invoices || []).forEach(inv => {
                if (!inv.due_date || inv.status === 'paid') return;
                const due = new Date(inv.due_date);
                if (isNaN(due.getTime())) return;
                out.push({
                    iso_date: due.toISOString(),
                    kind: 'invoice',
                    title: `Splatnosť faktúry ${inv.invoice_number || ''}`.trim(),
                    sub: inv.description || inv.note || '',
                    tone: due < startOfToday ? 'err' : 'amber',
                    target_tab: 'invoices'
                });
            });

            (campaigns || []).forEach(c => {
                if (!c.created_at) return;
                const launched = new Date(c.created_at);
                if (isNaN(launched.getTime())) return;
                if (launched < startOfToday) return;
                out.push({
                    iso_date: launched.toISOString(),
                    kind: 'campaign',
                    title: `Spustenie: ${c.name || 'kampaň'}`,
                    sub: c.platform_label || '',
                    tone: c.cover_tone || 'sky',
                    target_tab: 'campaigns'
                });
            });

            (client?.upcoming_events || []).forEach(ev => {
                if (!ev.iso_date) return;
                out.push({
                    iso_date: ev.iso_date,
                    kind: ev.kind || 'meeting',
                    title: ev.title || 'Udalosť',
                    sub: ev.sub || (ev.time ? `o ${ev.time}` : ''),
                    tone: ev.tone || 'sky'
                });
            });

            out.sort((a, b) => new Date(a.iso_date) - new Date(b.iso_date));
            return out;
        }

        const CAL_KIND_ICON = { invoice: 'Invoice', campaign: 'Campaign', meeting: 'Calendar', ticket: 'Ticket' };
        const CAL_WEEKDAYS_SHORT = ['Po', 'Ut', 'St', 'Št', 'Pi', 'So', 'Ne'];

        function dateKey(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function getViewedMonth() {
            if (calendarMonth) return calendarMonth;
            const now = new Date();
            return { year: now.getFullYear(), month0: now.getMonth() };
        }

        function getSelectedDateObj() {
            if (calendarSelectedDate) {
                const [y, m, d] = calendarSelectedDate.split('-').map(Number);
                return new Date(y, m - 1, d);
            }
            const now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), now.getDate());
        }

        function buildMonthGrid(year, month0, eventsByDay) {
            const firstOfMonth = new Date(year, month0, 1);
            const offset = (firstOfMonth.getDay() + 6) % 7; // Po-first
            const start = new Date(year, month0, 1 - offset);
            const days = [];
            const todayKey = dateKey(new Date());
            const selectedKey = dateKey(getSelectedDateObj());
            for (let i = 0; i < 42; i++) {
                const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
                const key = dateKey(d);
                days.push({
                    date: d,
                    dateStr: key,
                    inMonth: d.getMonth() === month0,
                    isToday: key === todayKey,
                    isSelected: key === selectedKey,
                    events: eventsByDay.get(key) || []
                });
            }
            // 42 = 6 týždňov; ak posledný týždeň je celý out-of-month, useknime ho
            const lastWeek = days.slice(35);
            if (lastWeek.every(d => !d.inMonth)) days.length = 35;
            return days;
        }

        function groupEventsByDay(events) {
            const map = new Map();
            events.forEach(ev => {
                const k = dateKey(new Date(ev.iso_date));
                if (!map.has(k)) map.set(k, []);
                map.get(k).push(ev);
            });
            return map;
        }

        function renderCalendar() {
            const all = buildCalendarEvents();
            const activeFilter = CALENDAR_FILTERS.find(f => f.key === calendarFilter) || CALENDAR_FILTERS[0];
            const filtered = all.filter(activeFilter.match);
            const eventsByDay = groupEventsByDay(filtered);

            const { year, month0 } = getViewedMonth();
            const days = buildMonthGrid(year, month0, eventsByDay);
            const monthLabel = new Date(year, month0, 1).toLocaleDateString('sk-SK', { month: 'long', year: 'numeric' });
            const monthLabelCap = monthLabel.charAt(0).toUpperCase() + monthLabel.slice(1);

            const selectedDate = getSelectedDateObj();
            const selectedDayEvents = eventsByDay.get(dateKey(selectedDate)) || [];

            return `
                <div class="pt-cal-toolbar">
                    <div class="pt-cal-nav">
                        <button class="pt-cal-navbtn" onclick="navCalendar(-1)" title="Predchádzajúci mesiac">${I.ChevronLeft({size:14})}</button>
                        <div class="pt-cal-month-label">${escapeHtml(monthLabelCap)}</div>
                        <button class="pt-cal-navbtn" onclick="navCalendar(1)" title="Ďalší mesiac">${I.Chevron({size:14})}</button>
                        <button class="adl-btn adl-btn-outline adl-btn-sm" onclick="gotoToday()" style="margin-left:6px;">Dnes</button>
                    </div>
                    <div class="pt-chip-strip" style="margin:0;">
                        ${CALENDAR_FILTERS.map(f => {
                            const count = all.filter(f.match).length;
                            return `<button class="pt-chip-filter ${calendarFilter === f.key ? 'active' : ''}" onclick="setCalendarFilter('${f.key}')">${f.label} (${count})</button>`;
                        }).join('')}
                    </div>
                </div>

                <div class="pt-cal-wrap">
                    <div class="pt-cal-grid-card">
                        <div class="pt-cal-weekdays">
                            ${CAL_WEEKDAYS_SHORT.map(w => `<div class="pt-cal-wd">${w}</div>`).join('')}
                        </div>
                        <div class="pt-cal-grid">
                            ${days.map(renderCalendarDayCell).join('')}
                        </div>
                    </div>
                    <aside class="pt-cal-agenda">
                        <div class="pt-cal-agenda-head">
                            <div class="pt-cal-agenda-weekday">${escapeHtml(selectedDate.toLocaleDateString('sk-SK', { weekday: 'long' }))}</div>
                            <div class="pt-cal-agenda-date">${selectedDate.getDate()}. ${escapeHtml(selectedDate.toLocaleDateString('sk-SK', { month: 'long' }))}</div>
                            <div class="pt-cal-agenda-year">${selectedDate.getFullYear()}</div>
                        </div>
                        <div class="pt-cal-agenda-body">
                            ${selectedDayEvents.length === 0 ? `
                                <div class="pt-cal-agenda-empty">
                                    <div class="pt-cal-agenda-empty-icon">${I.Calendar({size:18})}</div>
                                    <div>Žiadne udalosti</div>
                                    <div class="pt-cal-agenda-empty-sub">v tento deň</div>
                                </div>
                            ` : selectedDayEvents.map(renderAgendaEvent).join('')}
                        </div>
                        ${all.length > 0 ? `
                            <div class="pt-cal-agenda-foot">
                                <span class="pt-cal-agenda-foot-label">Celkom udalostí</span>
                                <span class="pt-cal-agenda-foot-count">${all.length}</span>
                            </div>
                        ` : ''}
                    </aside>
                </div>
            `;
        }

        function renderCalendarDayCell(day) {
            const cls = [
                'pt-cal-day',
                !day.inMonth && 'is-out',
                day.isToday && 'is-today',
                day.isSelected && 'is-selected',
                day.events.length > 0 && 'has-events'
            ].filter(Boolean).join(' ');
            const maxDots = 4;
            const dots = day.events.slice(0, maxDots).map(ev =>
                `<span class="pt-cal-day-dot pt-cal-day-dot--${ev.tone || 'sky'}" title="${escapeHtml(ev.title || '')}"></span>`
            ).join('');
            const extra = day.events.length > maxDots ? `<span class="pt-cal-day-more">+${day.events.length - maxDots}</span>` : '';
            return `
                <button class="${cls}" onclick="selectCalendarDay('${day.dateStr}')">
                    <span class="pt-cal-day-num">${day.date.getDate()}</span>
                    ${day.events.length > 0 ? `<span class="pt-cal-day-dots">${dots}${extra}</span>` : ''}
                </button>
            `;
        }

        function renderAgendaEvent(ev) {
            const iconName = CAL_KIND_ICON[ev.kind] || 'Calendar';
            const d = new Date(ev.iso_date);
            const time = (d.getHours() || d.getMinutes()) ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '';
            const onClick = ev.target_tab ? `onclick="switchTab('${ev.target_tab}')"` : '';
            const cls = ev.target_tab ? 'pt-cal-agenda-event is-clickable' : 'pt-cal-agenda-event';
            return `
                <div class="${cls}" ${onClick}>
                    <div class="pt-cal-agenda-event-icon pt-cal-event-icon--${ev.tone || 'sky'}">${I[iconName]({size:16})}</div>
                    <div class="pt-cal-agenda-event-body">
                        <div class="pt-cal-agenda-event-title">${escapeHtml(ev.title || '')}</div>
                        ${ev.sub ? `<div class="pt-cal-agenda-event-sub">${escapeHtml(ev.sub)}</div>` : ''}
                    </div>
                    ${time ? `<div class="pt-cal-agenda-event-time">${time}</div>` : ''}
                </div>
            `;
        }

        function navCalendar(delta) {
            const cur = getViewedMonth();
            const d = new Date(cur.year, cur.month0 + delta, 1);
            calendarMonth = { year: d.getFullYear(), month0: d.getMonth() };
            render();
        }

        function gotoToday() {
            const now = new Date();
            calendarMonth = { year: now.getFullYear(), month0: now.getMonth() };
            calendarSelectedDate = dateKey(now);
            render();
        }

        function selectCalendarDay(dateStr) {
            calendarSelectedDate = dateStr;
            const [y, m] = dateStr.split('-').map(Number);
            // Ak je vybraný deň mimo aktuálne zobrazeného mesiaca, posuň aj mesiac
            const cur = getViewedMonth();
            if (cur.year !== y || cur.month0 !== m - 1) {
                calendarMonth = { year: y, month0: m - 1 };
            }
            render();
        }

        function setCalendarFilter(f) {
            calendarFilter = f;
            render();
        }

        const SETTINGS_SECTIONS = [
            { key: 'profile',       label: 'Profil',          icon: 'Users' },
            { key: 'company',       label: 'Firma',           icon: 'Building' },
            { key: 'notifications', label: 'Notifikácie',     icon: 'Bell' },
            { key: 'ad_accounts',   label: 'Reklamné účty',   icon: 'Link' },
            { key: 'payment',       label: 'Spôsob platby',   icon: 'Money' },

        function renderAccount() {
            return `
                <div class="pt-settings-grid">
                    <div class="pt-settings-nav">
                        ${SETTINGS_SECTIONS.map(s => `
                            <button class="pt-settings-nav-item ${currentSettingsSection === s.key ? 'active' : ''}" onclick="setSettingsSection('${s.key}')">
                                ${I[s.icon]({size:16})}
                                <span>${s.label}</span>

                    <div>${renderSettingsSection()}</div>

        }
