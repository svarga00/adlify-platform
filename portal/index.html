<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientský portál | Adlify</title>
    <link rel="icon" type="image/svg+xml" href="/shared/img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Adlify Design System -->
    <link rel="stylesheet" href="/shared/css/tokens.css">
    <link rel="stylesheet" href="/shared/css/ui.css">
    <link rel="stylesheet" href="/shared/css/chrome.css">
    <link rel="stylesheet" href="/shared/css/responsive.css">
    <script src="/shared/js/design/icons.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            min-height: 100vh;
            color: var(--ink);
        }

        /* ===== Topbar right actions ===== */
        .pt-iconbtn {
            width: 34px; height: 34px;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: inline-flex; align-items: center; justify-content: center;
            position: relative;
            color: var(--ink-sub);
            cursor: pointer;
        }
        .pt-iconbtn:hover { color: var(--ink); background: var(--n-50); }
        .pt-iconbtn .dot {
            position: absolute; top: 7px; right: 8px;
            width: 6px; height: 6px; border-radius: 99px; background: var(--brand-500);
        }

        /* ===== Dashboard hero ===== */
        .pt-hero {
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            border-radius: 16px;
            padding: 28px;
            color: #fff;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .pt-hero::before {
            content: ''; position: absolute; right: -50px; top: -50px;
            width: 260px; height: 260px;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
            pointer-events: none;
        }
        .pt-hero-row { display: flex; align-items: flex-start; gap: 40px; position: relative; }
        .pt-hero-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.85; font-weight: 600; }
        .pt-hero-value { font-size: 44px; font-weight: 700; letter-spacing: -1.5px; margin-top: 6px; line-height: 1.1; font-family: var(--font-mono); }
        .pt-hero-meta { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
        .pt-hero-chip {
            font-family: var(--font-mono);
            font-size: 13px;
            background: rgba(255,255,255,0.18);
            padding: 4px 10px; border-radius: 999px;
        }
        .pt-hero-sub { font-size: 13px; opacity: 0.85; }
        .pt-hero-spark { width: 300px; flex-shrink: 0; }
        @media (max-width: 720px) {
            .pt-hero-row { flex-direction: column; gap: 16px; }
            .pt-hero-spark { width: 100%; }
            .pt-hero-value { font-size: 34px; }
        }

        /* ===== KPI stat grid ===== */
        .pt-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        @media (max-width: 900px) { .pt-stats { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) {
            .pt-stats { grid-template-columns: 1fr; }
            .adl-topbar-title { font-size: 18px !important; letter-spacing: -0.3px; }
            .adl-topbar-sub { font-size: 11px !important; }
            .adl-content { padding: 12px !important; }
            .pt-card { padding: 16px; }
            .pt-card-head { padding: 14px 16px; }
            .pt-rep-kpi-grid { grid-template-columns: 1fr !important; }
            .pt-rep-hero { padding: 18px 16px; }
            .pt-rep-hero-title { font-size: 17px; }
            .pt-tk-wrap { height: auto; min-height: 0; }
            .pt-msg-bubble { max-width: 92%; padding: 8px 12px; font-size: 12px; }
            .pt-msg-composer { padding: 10px 12px; }
            .pt-modal-overlay { padding: 8px; }
            .pt-modal { max-height: calc(100vh - 16px); border-radius: 12px; }
            .pt-cal-event { grid-template-columns: 42px 28px 1fr; gap: 8px; padding: 10px 12px; }
            .pt-cal-event-icon { width: 28px; height: 28px; }
            .pt-cal-event-day { font-size: 16px; }
            .adl-ap-grid, .pt-ap-grid { grid-template-columns: 1fr; }
            .pt-rep-archive { grid-template-columns: 1fr; }
            .pt-tour-card { padding: 16px 18px; }
            .pt-tour-title { font-size: 15px; }
            .pt-tour-body { font-size: 12px; }
        }
        .pt-stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .pt-stat-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
        .pt-stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-top: 6px; font-family: var(--font-mono); color: var(--ink); }
        .pt-stat-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 11px; }
        .pt-stat-delta-up { color: var(--ok); font-weight: 600; }
        .pt-stat-delta-down { color: var(--err); font-weight: 600; }
        .pt-stat-hint { color: var(--ink-mute); }

        /* ===== Two-col dashboard grids ===== */
        .pt-grid-13 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin-bottom: 16px; }
        .pt-grid-2  { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 900px) { .pt-grid-13, .pt-grid-2 { grid-template-columns: 1fr; } }

        /* ===== Cards (light) ===== */
        .pt-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .pt-card-head {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
        }
        .pt-card-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
        .pt-card-body { padding: 18px; }
        .pt-card-body.tight { padding: 0; }

        /* ===== Campaign row in dashboard ===== */
        .pt-camp-row {
            padding: 14px 18px;
            display: grid;
            grid-template-columns: 2fr 100px 80px 80px 60px;
            gap: 14px;
            align-items: center;
        }
        .pt-camp-row + .pt-camp-row { border-top: 1px solid var(--border); }
        .pt-camp-name { font-size: 13px; font-weight: 600; color: var(--ink); }
        .pt-camp-meta { font-size: 11px; color: var(--ink-sub); display: flex; gap: 6px; align-items: center; margin-top: 2px; }
        @media (max-width: 720px) {
            .pt-camp-row { grid-template-columns: 1fr auto; }
            .pt-camp-row > :nth-child(n+3) { display: none; }
        }

        /* ===== Action items ===== */
        .pt-action {
            display: flex; gap: 12px;
            padding: 12px 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background .12s;
        }
        .pt-action:hover { background: var(--n-50); }
        .pt-action-icon {
            width: 34px; height: 34px; border-radius: 9px;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .pt-action-body { flex: 1; min-width: 0; }
        .pt-action-title { font-size: 13px; font-weight: 600; color: var(--ink); }
        .pt-action-sub { font-size: 11px; color: var(--ink-sub); margin-top: 2px; }

        /* ===== Team + events ===== */
        .pt-team-row { display: flex; align-items: center; gap: 14px; }
        .pt-team-name { font-size: 14px; font-weight: 600; color: var(--ink); }
        .pt-team-sub { font-size: 11px; color: var(--ink-sub); margin-top: 2px; }
        .pt-event {
            display: flex; gap: 14px;
            padding: 10px 0;
        }
        .pt-event + .pt-event { border-top: 1px dashed var(--border); }
        .pt-event-date {
            text-align: center; width: 44px; flex-shrink: 0;
            font-family: var(--font-mono);
            font-size: 15px; font-weight: 600; color: var(--ink);
        }
        .pt-event-time { font-size: 10px; color: var(--ink-mute); margin-top: 2px; }
        .pt-event-body { flex: 1; font-size: 13px; padding-left: 12px; border-left: 3px solid var(--acc-sky-ink); color: var(--ink); }

        /* ===== Preview banner ===== */
        .pt-preview-badge {
            background: color-mix(in oklab, var(--warn) 18%, var(--surface));
            color: var(--warn);
            font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
            font-size: 10px;
            padding: 3px 8px; border-radius: 6px;
        }

        /* ===== Mobile sidebar toggle (PR A: simple — hidden on mobile, content goes full-width) ===== */
        .pt-menu-btn { display: none; }
        @media (max-width: 900px) {
            .pt-menu-btn {
                display: inline-flex; align-items: center; justify-content: center;
                width: 34px; height: 34px; border-radius: 9px;
                border: 1px solid var(--border); background: var(--surface);
                color: var(--ink-sub);
            }
        }

        /* ===== Campaigns grid (PR B) ===== */
        .pt-camp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        @media (max-width: 1100px) { .pt-camp-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px)  { .pt-camp-grid { grid-template-columns: 1fr; } }
        .pt-camp-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
        }
        .pt-camp-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); }
        .pt-camp-cover {
            height: 100px;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 14px;
        }
        .pt-camp-cover-rose { background: linear-gradient(135deg, var(--acc-rose), #F0B5BF); }
        .pt-camp-cover-mint { background: linear-gradient(135deg, var(--acc-mint), #A3D6B5); }
        .pt-camp-cover-lav  { background: linear-gradient(135deg, var(--acc-lavender), #C6BDF0); }
        .pt-camp-cover-sky  { background: linear-gradient(135deg, var(--acc-sky), #B0CFEA); }
        .pt-camp-cover-amber{ background: linear-gradient(135deg, var(--acc-amber), #F2C879); }
        .pt-camp-platforms {
            position: absolute; top: 14px; right: 14px;
            display: flex; gap: 6px;
            background: rgba(255,255,255,0.85);
            padding: 5px 8px; border-radius: 8px;
            color: var(--ink);
        }
        .pt-camp-body { padding: 18px; }
        .pt-camp-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); }
        .pt-camp-sub   { font-size: 12px; color: var(--ink-sub); margin-top: 2px; }
        .pt-progress-wrap { margin-top: 14px; }
        .pt-progress-head {
            display: flex; justify-content: space-between;
            font-size: 11px; color: var(--ink-mute);
            margin-bottom: 6px;
        }
        .pt-progress-bar {
            height: 6px; background: var(--n-75);
            border-radius: 99px; overflow: hidden;
        }
        .pt-progress-fill { height: 100%; background: var(--brand-500); }
        .pt-camp-stats {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px; padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .pt-camp-stat-label {
            font-size: 10px; color: var(--ink-mute);
            text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600;
        }
        .pt-camp-stat-value {
            font-size: 20px; font-weight: 600;
            font-family: var(--font-mono);
            color: var(--ink);
        }
        .pt-camp-stat-value.ok   { color: var(--ok); }
        .pt-camp-stat-value.warn { color: var(--warn); }

        /* ===== Data table (PR B — Invoices, Tickets) ===== */
        .pt-table { width: 100%; }
        .pt-table-row {
            display: grid;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            align-items: center;
            gap: 12px;
        }
        .pt-table-row:first-of-type { border-top: none; }
        .pt-table-head {
            display: grid;
            padding: 12px 20px;
            background: var(--n-50);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-sub);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            gap: 12px;
        }
        .pt-table-cols-inv      { grid-template-columns: 140px 1fr 100px 120px 110px 100px 32px; }
        @media (max-width: 900px) {
            .pt-table-cols-inv  { grid-template-columns: 1fr 100px 100px; }
            .pt-table-cols-inv > :nth-child(n+4) { display: none; }
            .pt-table-head.pt-table-cols-inv > :nth-child(n+4) { display: none; }
        }

        /* ===== Filter chip strip (PR B — Documents) ===== */
        .pt-chip-strip {
            display: flex; gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .pt-chip-filter {
            display: inline-flex; align-items: center;
            padding: 5px 12px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 500;
            color: var(--ink-sub);
            cursor: pointer;
            transition: all .12s;
            font-family: inherit;
        }
        .pt-chip-filter:hover { color: var(--ink); background: var(--n-50); }
        .pt-chip-filter.active {
            background: var(--n-900);
            color: #fff;
            border-color: var(--n-900);
        }

        /* ===== Document grid (PR B) ===== */
        .pt-doc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        @media (max-width: 1100px) { .pt-doc-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 720px)  { .pt-doc-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px)  { .pt-doc-grid { grid-template-columns: 1fr; } }
        .pt-doc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex; flex-direction: column;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: transform .12s, box-shadow .12s, border-color .12s;
        }
        .pt-doc-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); border-color: var(--n-100); }
        .pt-doc-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .pt-doc-icon-mint { background: var(--acc-mint); color: var(--acc-mint-ink); }
        .pt-doc-icon-lav  { background: var(--acc-lavender); color: var(--acc-lavender-ink); }
        .pt-doc-icon-sky  { background: var(--acc-sky); color: var(--acc-sky-ink); }
        .pt-doc-icon-rose { background: var(--acc-rose); color: var(--acc-rose-ink); }
        .pt-doc-icon-amber{ background: var(--acc-amber); color: var(--acc-amber-ink); }
        .pt-doc-title { font-size: 13px; font-weight: 600; color: var(--ink); }
        .pt-doc-sub   { font-size: 11px; color: var(--ink-sub); margin-top: 2px; }
        .pt-doc-foot {
            display: flex; justify-content: space-between;
            font-size: 11px; color: var(--ink-mute);
            margin-top: auto;
            align-items: center;
        }

        /* ===== Settings 2-col layout (PR B) ===== */
        .pt-settings-grid {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 24px;
        }
        @media (max-width: 900px) {
            .pt-settings-grid { grid-template-columns: 1fr; gap: 14px; }
        }
        .pt-settings-nav {
            display: flex; flex-direction: column;
            gap: 2px;
        }
        @media (max-width: 900px) {
            .pt-settings-nav { flex-direction: row; flex-wrap: wrap; }
        }
        .pt-settings-nav-item {
            display: flex; align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-sub);
            cursor: pointer;
            background: transparent;
            border: none;
            font-family: inherit;
            text-align: left;
        }
        .pt-settings-nav-item:hover { background: var(--n-50); color: var(--ink); }
        .pt-settings-nav-item.active {
            background: var(--n-75);
            color: var(--ink);
            font-weight: 600;
        }

        /* ===== Settings — Profile readonly fields ===== */
        .pt-field-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 640px) { .pt-field-grid { grid-template-columns: 1fr; } }
        .pt-field-label {
            font-size: 11px;
            color: var(--ink-mute);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        .pt-field-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--n-50);
            border: 1px solid var(--border);
            border-radius: 9px;
            font-size: 13px;
            font-family: inherit;
            color: var(--ink);
        }
        .pt-field-input:focus {
            outline: none;
            border-color: var(--brand-500);
            background: var(--surface);
        }

        /* ===== Profile header (settings) ===== */
        .pt-profile-head {
            display: flex; gap: 20px; align-items: center;
            margin-bottom: 20px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .pt-profile-avatar-lg {
            width: 70px; height: 70px;
            border-radius: 99px;
            background: var(--brand-500); color: #fff;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 600;
            flex-shrink: 0;
            overflow: hidden;
        }

        /* ─── First-time tour ─── */
        .pt-tour-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 9999;
            animation: pt-fade-in .2s ease-out;
        }
        .pt-tour-highlight {
            border: 3px solid var(--brand-500);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.5);
            transition: all .25s ease-out;
        }
        .pt-tour-card {
            background: var(--surface);
            border-radius: 14px;
            padding: 20px 22px 18px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.3);
            z-index: 10000;
            border: 1px solid var(--border);
        }
        .pt-tour-progress {
            display: flex; gap: 6px;
            margin-bottom: 14px;
        }
        .pt-tour-dot {
            width: 28px; height: 4px;
            border-radius: 99px;
            background: var(--n-100);
            transition: background .15s;
        }
        .pt-tour-dot.is-active { background: var(--brand-500); }
        .pt-tour-dot.is-done   { background: color-mix(in oklab, var(--brand-500) 50%, var(--n-100)); }
        .pt-tour-title {
            font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
            color: var(--ink);
            margin: 0 0 8px;
        }
        .pt-tour-body {
            font-size: 13px; color: var(--ink-sub);
            line-height: 1.55;
            margin: 0 0 16px;
        }
        .pt-tour-actions {
            display: flex; justify-content: space-between; align-items: center;
            gap: 8px;
        }
        .pt-profile-avatar-lg img,
        .adl-avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .adl-avatar { overflow: hidden; }

        /* ===== Legacy styles still used by other tabs (PR B will refactor) ===== */
        .card {
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 18px;
            box-shadow: var(--sh-sm);
        }
        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h2 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-body { padding: 20px; }

        .item-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--n-50);
            border-radius: 10px;
            cursor: pointer;
            transition: background .12s, transform .12s;
            text-decoration: none;
            color: inherit;
        }
        .item:hover { background: var(--n-75); transform: translateX(2px); }
        .item-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .item-icon.project { background: var(--acc-sky); color: var(--acc-sky-ink); }
        .item-icon.campaign { background: var(--acc-amber); color: var(--acc-amber-ink); }
        .item-icon.invoice { background: var(--acc-mint); color: var(--acc-mint-ink); }
        .item-icon.document { background: var(--acc-lavender); color: var(--acc-lavender-ink); }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 600; font-size: 13px; color: var(--ink); letter-spacing: -0.1px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 11px; color: var(--ink-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-status {
            padding: 3px 9px; border-radius: 999px;
            font-size: 11px; font-weight: 500; flex-shrink: 0;
        }
        .status-active, .status-paid { background: var(--acc-mint); color: var(--acc-mint-ink); }
        .status-pending, .status-in_progress { background: var(--acc-amber); color: var(--acc-amber-ink); }
        .status-draft { background: var(--n-100); color: var(--ink-sub); }
        .status-overdue { background: color-mix(in oklab, var(--err) 14%, transparent); color: var(--err); }

        .invoice-amount { font-weight: 700; color: var(--ink); margin-right: 1rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--ink-sub); }
        .empty-state h3 { font-size: 1rem; font-weight: 500; }

        .error-screen {
            min-height: 80vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }
        .error-screen h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .error-screen p { color: var(--ink-sub); margin-bottom: 1.5rem; }

        .btn {
            padding: 10px 16px; border-radius: 10px;
            font-weight: 500; font-size: 13px;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid transparent;
            font-family: inherit;
        }
        .btn-primary { background: var(--brand-500); color: white; border-color: var(--brand-500); }
        .btn-primary:hover { background: var(--brand-600); }

        .loading {
            min-height: 80vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--n-100);
            border-top-color: var(--brand-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .contact-card {
            display: flex; align-items: center; gap: 1rem;
            padding: 1.5rem;
            background: var(--n-50);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .contact-avatar {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.25rem;
        }
        .contact-info { flex: 1; }
        .contact-info h4 { font-size: 1rem; margin-bottom: 0.25rem; }
        .contact-info p { font-size: 0.85rem; color: var(--ink-sub); }
        .contact-actions { display: flex; gap: 0.5rem; }

        /* ─── Messages (PR C) ─── */
        .pt-msg-wrap {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 16px;
            height: calc(100vh - 160px);
            min-height: 520px;
        }
        .pt-msg-side {
            display: flex; flex-direction: column; gap: 12px;
        }
        .pt-msg-am {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
        }
        .pt-msg-am-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            color: #fff;
            font-weight: 700; font-size: 22px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 10px;
        }
        .pt-msg-am-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); }
        .pt-msg-am-role { font-size: 12px; color: var(--ink-sub); margin-top: 2px; }
        .pt-msg-am-status {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 10px; font-size: 11px; color: var(--ink-sub);
            background: color-mix(in oklab, var(--ok, #10b981) 12%, var(--surface));
            padding: 4px 10px; border-radius: 99px;
        }
        .pt-msg-dot {
            width: 6px; height: 6px; border-radius: 99px;
            background: var(--ok, #10b981);
        }
        .pt-msg-am-contact {
            display: flex; flex-direction: column; gap: 6px;
            margin-top: 14px; padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .pt-msg-am-link {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 12px; color: var(--ink-sub);
            text-decoration: none;
        }
        .pt-msg-am-link:hover { color: var(--brand-500); }
        .pt-msg-side-hint {
            display: flex; align-items: flex-start; gap: 6px;
            font-size: 11px; color: var(--ink-mute);
            padding: 10px 12px;
            background: var(--n-50);
            border-radius: 10px;
            line-height: 1.5;
        }

        .pt-msg-thread {
            display: flex; flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }
        #pt-msg-thread {
            overflow-y: auto;
            padding: 16px 20px 0;
        }
        .pt-msg-daysep {
            display: flex; align-items: center; gap: 10px;
            margin: 10px 0;
        }
        .pt-msg-daysep::before, .pt-msg-daysep::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .pt-msg-daysep span {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
            color: var(--ink-mute); font-weight: 600;
        }
        .pt-msg-row { display: flex; margin-bottom: 8px; }
        .pt-msg-row--in  { justify-content: flex-start; }
        .pt-msg-row--out { justify-content: flex-end; }
        .pt-msg-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.5;
        }
        .pt-msg-bubble--in {
            background: var(--n-50);
            color: var(--ink);
            border-bottom-left-radius: 4px;
        }
        .pt-msg-bubble--out {
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .pt-msg-text { white-space: pre-wrap; word-wrap: break-word; }
        .pt-msg-meta {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            font-family: var(--font-mono);
        }
        .pt-msg-empty {
            flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            padding: 40px 20px;
            color: var(--ink-sub);
        }
        .pt-msg-empty-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 56px; height: 56px; border-radius: 14px;
            background: var(--n-50); color: var(--ink-mute);
            margin-bottom: 12px;
        }
        .pt-msg-empty-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
        .pt-msg-empty-sub { font-size: 12px; max-width: 340px; }

        .pt-msg-composer {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            background: var(--surface);
            display: flex; flex-direction: column; gap: 8px;
        }
        .pt-msg-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            font-size: 13px;
            color: var(--ink);
            background: var(--surface);
            resize: vertical;
            min-height: 56px;
            max-height: 200px;
            outline: none;
        }
        .pt-msg-input:focus { border-color: var(--brand-500); }
        .pt-msg-composer-foot {
            display: flex; justify-content: space-between; align-items: center;
        }
        .pt-msg-hint { font-size: 10px; color: var(--ink-mute); }

        /* Sidebar unread badge */
        .adl-sidebar-item-badge {
            margin-left: auto;
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 99px;
            background: var(--brand-500);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center;
            line-height: 1;
        }

        @media (max-width: 900px) {
            .pt-msg-wrap {
                grid-template-columns: 1fr;
                height: auto;
            }
            .pt-msg-side { order: 2; }
            .pt-msg-thread { order: 1; min-height: 480px; }
            .pt-msg-bubble { max-width: 85%; }
        }

        /* ─── Tickets 2-col (PR D) ─── */
        .pt-tk-wrap {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 16px;
            height: calc(100vh - 160px);
            min-height: 520px;
        }
        .pt-tk-side {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .pt-tk-side-head {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 12px 10px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .pt-tk-side-head .pt-chip-strip { flex: 1; min-width: 0; }
        .pt-tk-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .pt-tk-row {
            display: flex; align-items: stretch;
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 0;
            cursor: pointer;
            text-align: left;
            margin-bottom: 4px;
            font: inherit;
            color: inherit;
            transition: background .12s, border-color .12s;
        }
        .pt-tk-row:hover { background: var(--n-50); }
        .pt-tk-row.is-selected {
            background: color-mix(in oklab, var(--brand-500) 8%, var(--surface));
            border-color: color-mix(in oklab, var(--brand-500) 30%, var(--border));
        }
        .pt-tk-row-bar {
            width: 3px;
            border-radius: 99px;
            margin: 10px 8px 10px 6px;
            background: var(--brand-500);
        }
        .pt-tk-row-body {
            flex: 1; min-width: 0;
            padding: 10px 10px 10px 0;
        }
        .pt-tk-row-subject {
            font-size: 13px; font-weight: 600;
            color: var(--ink); letter-spacing: -0.1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .pt-tk-row-meta {
            display: flex; align-items: center; gap: 6px;
            margin-top: 6px;
        }
        .pt-tk-row-pri {
            width: 6px; height: 6px; border-radius: 99px;
            background: var(--ink-mute);
        }
        .pt-tk-row-pri--sky   { background: var(--acc-sky-ink, #3b82f6); }
        .pt-tk-row-pri--amber { background: var(--warn, #d97706); }
        .pt-tk-row-pri--err   { background: var(--err, #ef4444); }
        .pt-tk-row-pri--n     { background: var(--ink-mute); }
        .pt-tk-row-date {
            margin-left: auto;
            font-size: 10px; color: var(--ink-mute);
            font-family: var(--font-mono);
        }
        .pt-tk-empty-mini {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; padding: 40px 16px;
            color: var(--ink-mute);
            font-size: 12px; text-align: center;
        }

        .pt-tk-detail {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow-y: auto;
            display: flex; flex-direction: column;
        }
        .pt-tk-empty {
            flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            padding: 40px 20px;
            color: var(--ink-sub);
        }
        .pt-tk-empty-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 56px; height: 56px; border-radius: 14px;
            background: var(--n-50); color: var(--ink-mute);
            margin-bottom: 12px;
        }
        .pt-tk-empty-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
        .pt-tk-empty-sub { font-size: 12px; max-width: 380px; line-height: 1.5; }

        .pt-tk-detail-head {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
        }
        .pt-tk-detail-head-row {
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .pt-tk-detail-id {
            margin-left: auto;
            font-size: 11px; color: var(--ink-mute);
            font-family: var(--font-mono);
        }
        .pt-tk-detail-title {
            font-size: 18px; font-weight: 600; letter-spacing: -0.3px;
            color: var(--ink);
            margin: 0;
            line-height: 1.35;
        }
        .pt-tk-detail-sub {
            margin-top: 4px;
            font-size: 12px; color: var(--ink-sub);
        }
        .pt-tk-detail-body {
            padding: 20px 24px 28px;
            display: flex; flex-direction: column; gap: 22px;
        }
        .pt-tk-detail-section-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
            font-weight: 600; color: var(--ink-mute);
            margin-bottom: 8px;
        }
        .pt-tk-detail-desc {
            font-size: 13px; color: var(--ink);
            line-height: 1.6;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .pt-tk-detail-desc--muted { color: var(--ink-sub); font-style: italic; }

        .pt-tk-timeline {
            list-style: none; padding: 0; margin: 0;
            display: flex; flex-direction: column;
        }
        .pt-tk-timeline-item {
            position: relative;
            padding-left: 22px;
            padding-bottom: 16px;
        }
        .pt-tk-timeline-item:not(.is-last)::before {
            content: '';
            position: absolute;
            left: 5px; top: 14px; bottom: 0;
            width: 2px;
            background: var(--border);
        }
        .pt-tk-timeline-item.is-done:not(.is-last)::before {
            background: color-mix(in oklab, var(--brand-500) 60%, var(--border));
        }
        .pt-tk-timeline-dot {
            position: absolute;
            left: 0; top: 4px;
            width: 12px; height: 12px;
            border-radius: 99px;
            background: var(--n-100);
            border: 2px solid var(--surface);
            box-shadow: 0 0 0 1px var(--border);
        }
        .pt-tk-timeline-item.is-done .pt-tk-timeline-dot {
            box-shadow: 0 0 0 1px transparent;
        }
        .pt-tk-timeline-label {
            font-size: 13px; font-weight: 600; color: var(--ink);
        }
        .pt-tk-timeline-item:not(.is-done) .pt-tk-timeline-label { color: var(--ink-mute); }
        .pt-tk-timeline-hint {
            font-size: 11px; color: var(--ink-sub);
            margin-top: 2px;
        }
        .pt-tk-detail-hint {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 12px;
            background: var(--n-50);
            border-radius: 10px;
            font-size: 12px; color: var(--ink-sub);
        }
        .pt-tk-detail-hint a {
            color: var(--brand-500);
            text-decoration: none;
            font-weight: 500;
        }
        .pt-tk-detail-hint a:hover { text-decoration: underline; }

        @media (max-width: 900px) {
            .pt-tk-wrap {
                grid-template-columns: 1fr;
                height: auto;
            }
            .pt-tk-detail { min-height: 360px; }
        }

        /* ─── Modal (ticket composer) ─── */
        .pt-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            z-index: 100;
            animation: pt-fade-in .15s ease-out;
        }
        @keyframes pt-fade-in { from { opacity: 0; } to { opacity: 1; } }
        .pt-modal {
            background: var(--surface);
            border-radius: 14px;
            width: 100%;
            max-width: 540px;
            max-height: calc(100vh - 48px);
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.25);
        }
        .pt-modal-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .pt-modal-title {
            font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
            color: var(--ink);
            margin: 0;
            display: flex; align-items: center; gap: 8px;
        }
        .pt-modal-body {
            padding: 20px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 14px;
        }
        .pt-modal-foot {
            display: flex; justify-content: flex-end; gap: 8px;
            padding-top: 6px;
        }

        /* ─── Calendar month grid (PR D v2) ─── */
        .pt-cal-toolbar {
            display: flex; align-items: center; gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .pt-cal-nav {
            display: flex; align-items: center; gap: 8px;
        }
        .pt-cal-navbtn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink-sub);
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background .12s, color .12s, border-color .12s;
        }
        .pt-cal-navbtn:hover {
            color: var(--ink);
            background: var(--n-50);
            border-color: color-mix(in oklab, var(--brand-500) 25%, var(--border));
        }
        .pt-cal-month-label {
            font-size: 17px; font-weight: 600; letter-spacing: -0.3px;
            color: var(--ink);
            min-width: 160px; text-align: center;
        }

        .pt-cal-wrap {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 16px;
        }

        .pt-cal-grid-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        .pt-cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--n-50);
            border-bottom: 1px solid var(--border);
        }
        .pt-cal-wd {
            padding: 10px 0;
            text-align: center;
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px;
            font-weight: 600; color: var(--ink-mute);
        }
        .pt-cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .pt-cal-day {
            position: relative;
            min-height: 92px;
            background: var(--surface);
            border: 0;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 8px 8px 6px;
            text-align: left;
            cursor: pointer;
            font: inherit;
            color: inherit;
            display: flex; flex-direction: column; align-items: flex-start;
            transition: background .12s;
        }
        .pt-cal-grid .pt-cal-day:nth-child(7n) { border-right: 0; }
        .pt-cal-day:hover { background: var(--n-50); }
        .pt-cal-day.is-out .pt-cal-day-num { color: var(--ink-mute); opacity: 0.55; }
        .pt-cal-day.is-out { background: color-mix(in oklab, var(--n-50) 60%, var(--surface)); }
        .pt-cal-day.is-today .pt-cal-day-num {
            background: var(--brand-500); color: #fff;
            width: 24px; height: 24px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 99px;
            font-weight: 700;
        }
        .pt-cal-day.is-selected {
            background: color-mix(in oklab, var(--brand-500) 8%, var(--surface));
            outline: 2px solid var(--brand-500);
            outline-offset: -2px;
            z-index: 1;
        }
        .pt-cal-day-num {
            font-size: 13px; font-weight: 600;
            color: var(--ink);
            font-family: var(--font-mono);
            letter-spacing: -0.2px;
            line-height: 1;
            padding: 2px 0;
        }
        .pt-cal-day-dots {
            display: flex; flex-wrap: wrap; gap: 3px;
            margin-top: 6px;
            width: 100%;
        }
        .pt-cal-day-dot {
            width: 6px; height: 6px; border-radius: 99px;
            background: var(--brand-500);
        }
        .pt-cal-day-dot--sky   { background: var(--acc-sky-ink, #3b82f6); }
        .pt-cal-day-dot--amber { background: var(--acc-amber-ink, #d97706); }
        .pt-cal-day-dot--mint  { background: var(--acc-mint-ink, #059669); }
        .pt-cal-day-dot--lav   { background: var(--acc-lavender-ink, #7c3aed); }
        .pt-cal-day-dot--rose  { background: var(--acc-rose-ink, #e11d48); }
        .pt-cal-day-dot--err   { background: var(--err, #ef4444); }
        .pt-cal-day-more {
            font-size: 9px; font-weight: 700;
            color: var(--ink-mute);
            margin-left: 2px;
            letter-spacing: 0.3px;
        }

        /* Agenda (right) */
        .pt-cal-agenda {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .pt-cal-agenda-head {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, color-mix(in oklab, var(--brand-500) 8%, var(--surface)), var(--surface));
        }
        .pt-cal-agenda-weekday {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px;
            font-weight: 600; color: var(--brand-500);
        }
        .pt-cal-agenda-date {
            font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
            color: var(--ink);
            margin-top: 2px;
        }
        .pt-cal-agenda-year {
            font-size: 11px; color: var(--ink-mute);
            font-family: var(--font-mono);
            margin-top: 2px;
        }
        .pt-cal-agenda-body {
            flex: 1;
            padding: 14px 16px;
            display: flex; flex-direction: column; gap: 8px;
            overflow-y: auto;
            min-height: 200px;
        }
        .pt-cal-agenda-event {
            display: grid;
            grid-template-columns: 32px 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--n-50);
            transition: background .12s, transform .12s;
        }

        function startTour() {
            tourActive = true;
            tourStep = 0;
            renderTourStep();
        }

        function tourNext() {
            if (tourStep < TOUR_STEPS.length - 1) {
                tourStep++;
                renderTourStep();
            } else {
                finishTour(true);
            }
        }

        function tourPrev() {
            if (tourStep > 0) {
                tourStep--;
                renderTourStep();
            }
        }

        async function finishTour(completed) {
            tourActive = false;
            document.getElementById('tour-overlay')?.remove();
            if (isPreview) return;
            const now = new Date().toISOString();
            userProfile.tour_completed_at = now;
            await db.from('user_profiles').update({ tour_completed_at: now }).eq('id', user.id);
        }

        function renderTourStep() {
            const step = TOUR_STEPS[tourStep];
            if (!step) { finishTour(true); return; }

            // Prepni tab ak step ho špecifikuje
            if (step.tab && currentTab !== step.tab) {
                currentTab = step.tab;
                render();
            }

            requestAnimationFrame(() => {
                const targetEl = step.target ? document.querySelector(step.target) : null;
                const rect = targetEl ? targetEl.getBoundingClientRect() : null;

                let pos = '';
                if (rect) {
                    const card = { w: 360, h: 200 };
                    let left = rect.right + 14;
                    let top = rect.top;
                    if (left + card.w > window.innerWidth - 16) left = Math.max(16, rect.left - card.w - 14);
                    if (top + card.h > window.innerHeight - 16) top = Math.max(16, window.innerHeight - card.h - 16);
                    pos = `style="position:fixed; left:${left}px; top:${top}px; max-width:${card.w}px;"`;
                } else {
                    pos = `style="position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); max-width:440px;"`;
                }

                const highlight = rect
                    ? `<div class="pt-tour-highlight" style="position:fixed; left:${rect.left - 6}px; top:${rect.top - 6}px; width:${rect.width + 12}px; height:${rect.height + 12}px; pointer-events:none;"></div>`
                    : '';

                const existing = document.getElementById('tour-overlay');
                if (existing) existing.remove();
                const overlay = document.createElement('div');
                overlay.id = 'tour-overlay';
                overlay.className = 'pt-tour-overlay';
                overlay.innerHTML = `
                    ${highlight}
                    <div class="pt-tour-card" ${pos}>
                        <div class="pt-tour-progress">
                            ${TOUR_STEPS.map((_, i) => `<span class="pt-tour-dot ${i === tourStep ? 'is-active' : i < tourStep ? 'is-done' : ''}"></span>`).join('')}
                        </div>
                        <h3 class="pt-tour-title">${escapeHtml(step.title)}</h3>
                        <p class="pt-tour-body">${escapeHtml(step.body)}</p>
                        <div class="pt-tour-actions">
                            <button class="adl-btn adl-btn-ghost adl-btn-sm" onclick="finishTour(false)">Preskočiť</button>
                            <div style="display:flex; gap:6px;">
                                ${tourStep > 0 ? `<button class="adl-btn adl-btn-outline adl-btn-sm" onclick="tourPrev()">← Späť</button>` : ''}
                                <button class="adl-btn adl-btn-primary adl-btn-sm" onclick="tourNext()">${tourStep === TOUR_STEPS.length - 1 ? '✓ Hotovo' : (step.cta || 'Ďalej →')}</button>
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
            });
        }

        async function init() {
            if (isPreview) {
                loadPreviewData();
                render();
                return;
            }

            // Check authentication
            const { data: { session } } = await db.auth.getSession();

            if (!session) {
                window.location.href = '/portal/login.html';
                return;
            }

            user = session.user;

            try {
                // Get client user link
                const { data: clientUser, error: clientError } = await db
                    .from('client_users')
                    .select('*, clients(*)')
                    .eq('user_id', user.id)
                    .single();

                if (clientError || !clientUser) {
                    showError('Účet nie je prepojený', 'Váš účet nie je prepojený so žiadnou firmou. Kontaktujte podporu.');
                    return;
                }

                client = clientUser.clients;

                // Načítaj user profile (pre avatar + tour state)
                const { data: prof } = await db.from('user_profiles').select('avatar_url, full_name, tour_completed_at').eq('id', user.id).single();
                userProfile = prof || {};

                // Check if onboarding completed
                if (client.onboarding_status && client.onboarding_status !== 'completed') {
                    window.location.href = '/portal/onboarding.html';
                    return;
                }

                await Promise.all([loadProjects(), loadCampaigns(), loadInvoices(), loadDocuments(), loadTickets(), loadMessages(), loadReports(), loadApprovals()]);
                render();
                subscribeToMessages();
                subscribeToApprovals();
                // First-time tour ak ešte neabsolvovaný
                if (!userProfile.tour_completed_at) {
                    setTimeout(() => startTour(), 600);
                }

            } catch (error) {
                console.error('Init error:', error);
                const detail = error?.message || error?.error_description || '';
                const friendly = detail.includes('JWT') || detail.includes('expired')
                    ? 'Vaše prihlásenie expirovalo. Prihláste sa znova.'
                    : detail.includes('Failed to fetch') || detail.includes('Network')
                    ? 'Pripojenie k serveru zlyhalo. Skontrolujte internet a obnovte stránku.'
                    : 'Nepodarilo sa načítať vaše dáta. ' + (detail ? `Detail: ${detail}` : 'Skúste obnoviť stránku.');
                showError('Chyba pri načítaní', friendly);
            }
        }

        function subscribeToApprovals() {
            if (isPreview || !client?.id) return;
            try { approvalsSubscription?.unsubscribe(); } catch (_) {}
            approvalsSubscription = db.channel(`approvals-${client.id}`)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'approvals', filter: `client_id=eq.${client.id}` }, payload => {
                    const ev = payload.eventType;
                    const row = payload.new || payload.old;
                    if (!row) return;
                    if (ev === 'INSERT') {
                        if (!approvals.find(a => a.id === row.id)) approvals.unshift(row);
                    } else if (ev === 'UPDATE') {
                        const i = approvals.findIndex(a => a.id === row.id);
                        if (i !== -1) approvals[i] = row;
                    } else if (ev === 'DELETE') {
                        approvals = approvals.filter(a => a.id !== row.id);
                        if (selectedApprovalId === row.id) selectedApprovalId = null;
                    }
                    if (currentTab === 'approvals') render();
                    else renderSidebarOnly();
                })
                .subscribe();
        }

        function subscribeToMessages() {
            if (isPreview || !client?.id) return;
            try { messagesSubscription?.unsubscribe(); } catch (_) {}
            messagesSubscription = db.channel(`messages-${client.id}`)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `client_id=eq.${client.id}` }, payload => {
                    const m = payload.new;
                    if (!m) return;
                    if (m.sender_type === 'client' && m.sender_id === user?.id) return;
                    if (messages.find(x => x.id === m.id)) return;
                    messages.push(m);
                    if (currentTab === 'messages') {
                        renderMessageThreadOnly();
                        if (m.sender_type === 'team') markMessagesAsRead();
                    } else {
                        renderSidebarOnly();
                    }
                })
                .subscribe();
        }

        function unreadTeamMessagesCount() {
            return messages.filter(m => m.sender_type === 'team' && !m.is_read).length;
        }

        async function markMessagesAsRead() {
            const unread = messages.filter(m => m.sender_type === 'team' && !m.is_read);
            if (unread.length === 0) return;
            unread.forEach(m => { m.is_read = true; m.read_at = new Date().toISOString(); });
            renderSidebarOnly();
            if (isPreview) return;
            const ids = unread.map(m => m.id);
            await db.from('messages').update({ is_read: true, read_at: new Date().toISOString() }).in('id', ids);
        }

        async function sendMessage(formEl) {
            const ta = formEl.querySelector('textarea');
            const content = (ta.value || '').trim();
            if (!content) return;
            if (isPreview) {
                const banner = formEl.querySelector('[data-preview-banner]');
                previewBlocked(banner);
                return;
            }
            const btn = formEl.querySelector('button[type="submit"]');
            btn.disabled = true;
            const optimistic = {
                id: 'tmp-' + Date.now(),
                client_id: client.id,
                sender_id: user.id,
                sender_type: 'client',
                content,
                is_read: true,
                created_at: new Date().toISOString()
            };
            messages.push(optimistic);
            ta.value = '';
            messageDraft = '';
            renderMessageThreadOnly();
            const { data, error } = await db.from('messages').insert({
                client_id: client.id,
                sender_id: user.id,
                sender_type: 'client',
                content,
                // Defensive — niektoré legacy DB schémy majú messages.from_email
                // ako NOT NULL stĺpec. Posielame user.email aj keby DB to
                // nepotrebovala — nemá negatívny efekt.
                from_email: user.email || null,
                from_name: user.user_metadata?.full_name || user.email || null,
            }).select().single();
            if (error) {
                messages = messages.filter(m => m.id !== optimistic.id);
                ta.value = content;
                messageDraft = content;
                renderMessageThreadOnly();
                alert('Správu sa nepodarilo odoslať: ' + error.message);
            } else if (data) {
                const idx = messages.findIndex(m => m.id === optimistic.id);
                if (idx !== -1) messages[idx] = data;
                renderMessageThreadOnly();
            }
            btn.disabled = false;
        }

            document.getElementById('app').innerHTML = `
                <div class="error-screen">

                    <h1>${title}</h1>

                    <button class="btn btn-primary" onclick="logout()">Odhlásiť sa</button>

                            <div class="adl-sidebar-brand-text">Adlify<span class="adl-sidebar-brand-subtag">Klient</span></div>
                        </div>
                        <nav class="adl-sidebar-nav">
                            ${SIDEBAR_GROUPS.map(g => `

        function renderSidebarOnly() {

        function sparkline(data, w = 300, h = 80, color = '#fff') {
            if (!data || data.length < 2) return '';
            const max = Math.max(...data), min = Math.min(...data);
            const range = max - min || 1;
            const step = w / (data.length - 1);
            const points = data.map((v, i) => `${i * step},${h - ((v - min) / range) * (h - 4) - 2}`);
            const path = `M ${points.join(' L ')}`;
            const fillPath = `${path} L ${w},${h} L 0,${h} Z`;
            return `
                <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block; max-width:100%;">
                    <defs>
                        <linearGradient id="spark-grad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="${color}" stop-opacity="0.4"/>
                            <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <path d="${fillPath}" fill="url(#spark-grad)" stroke="none"/>
                    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            `;
        }

        function renderDashboard() {

            const roi = k.roi ?? 0;
            const cpa = k.cost_per_conversion ?? 0;
            const reach = k.reach ?? 0;
            const clicks = k.clicks ?? 0;
            const ctr = k.ctr_pct;
            const spent = k.spent ?? 0;
            const budget = k.budget ?? 0;
            const value = k.conversion_value ?? 0;
            const valueDelta = k.conversion_value_delta_pct;
            const trend = k.trend || [];
            const actionItems = client.action_items || [];
            const teamMember = client.account_manager || null;
            const upcomingEvents = client.upcoming_events || [];
            const activeCamps = campaigns.filter(c => c.status === 'active' || c.status === 'paused').slice(0, 3);

            const fmtNum = (n) => new Intl.NumberFormat('sk-SK').format(Math.round(n));
            const fmtMoney = (n) => new Intl.NumberFormat('sk-SK', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' €';
            const deltaChip = (pct) => pct == null ? ''
                : `<span class="${pct >= 0 ? 'pt-stat-delta-up' : 'pt-stat-delta-down'}">${pct >= 0 ? '↑' : '↓'} ${Math.abs(pct)}%</span>`;
            const statusToneClass = (s) => s === 'active' ? 'adl-chip-mint' : s === 'paused' ? 'adl-chip-amber' : '';
            const statusLabel = (s) => s === 'active' ? 'Aktívna' : s === 'paused' ? 'Pauza' : (s || '—');

            return `

                    <div class="pt-stat">
                        <div class="pt-stat-label">Dosah</div>
                        <div class="pt-stat-value">${fmtNum(reach)}</div>
                    </div>
                    <div class="pt-stat">
                        <div class="pt-stat-label">Kliky</div>
                        <div class="pt-stat-value">${fmtNum(clicks)}</div>
                        <div class="pt-stat-meta">${ctr != null ? `<span class="pt-stat-hint">CTR ${ctr}%</span>` : ''}</div>
                    </div>
                    <div class="pt-stat">
                        <div class="pt-stat-label">Minuté z budgetu</div>
                        <div class="pt-stat-value">${fmtMoney(spent)}</div>
                        ${budget ? `<div class="pt-stat-meta"><span class="pt-stat-hint">z ${fmtMoney(budget)}</span></div>` : ''}
                    </div>
                    <div class="pt-stat">
                        <div class="pt-stat-label">Hodnota konverzií</div>
                        <div class="pt-stat-value">${fmtMoney(value)}</div>
                        <div class="pt-stat-meta">${deltaChip(valueDelta)}</div>

                    <div class="pt-card">
                        <div class="pt-card-head">
                            <div class="pt-card-title">Aktívne kampane (${activeCamps.length})</div>
                            <button class="adl-btn adl-btn-ghost adl-btn-sm" onclick="switchTab('campaigns')">Všetky ${I.ArrowRight({size:12})}</button>

                                    ${c.roi != null ? `<span class="adl-chip ${c.roi > 2 ? 'adl-chip-mint' : 'adl-chip-amber'} adl-chip-sm">${c.roi}×</span>` : '<span></span>'}

                        </div>

                    <div class="pt-card">

                            <div class="pt-card-title">Vyžaduje vašu akciu</div>
                        </div>
                        <div class="pt-card-body">
                            ${actionItems.length > 0 ? actionItems.map((a, i) => `
                                <div class="pt-action" onclick="${a.target_tab ? `switchTab('${a.target_tab}')` : ''}" style="${i === 0 ? 'background:var(--brand-50);' : ''}">
                                    <div class="pt-action-icon" style="background:${a.tone === 'brand' ? 'var(--brand-500)' : `var(--acc-${a.tone || 'sky'})`}; color:${a.tone === 'brand' ? '#fff' : `var(--acc-${a.tone || 'sky'}-ink)`};">

                                </div>

                    <div class="pt-card">
                        <div class="pt-card-head"><div class="pt-card-title">Najbližšie udalosti</div></div>
                        <div class="pt-card-body">
                            ${upcomingEvents.length > 0 ? upcomingEvents.map(ev => {
                                const dateLabel = ev.date || (ev.iso_date ? (() => { const d = new Date(ev.iso_date); return `${d.getDate()}. ${d.getMonth() + 1}.`; })() : '');

                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

        function renderProjects() {
            return `
                <div class="card">
                    <div class="card-header">
                        <h2>Aktuálne projekty</h2>
                    </div>
                    <div class="card-body">
                        ${projects.length > 0 ? `
                            <div class="item-list">

        function renderCampaigns() {
