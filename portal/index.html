<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientský portál | Adlify</title>
    <link rel="icon" type="image/svg+xml" href="/shared/img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Adlify Design System -->
    <link rel="stylesheet" href="/shared/css/tokens.css">
    <link rel="stylesheet" href="/shared/css/ui.css">
    <link rel="stylesheet" href="/shared/css/chrome.css">
    <link rel="stylesheet" href="/shared/css/responsive.css">
    <script src="/shared/js/design/icons.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            min-height: 100vh;
            color: var(--ink);
        }

        .portal-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 10px; }
        .client-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .client-name { font-weight: 500; color: var(--ink-sub); font-size: 13px; }

        .portal-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
        }

        .nav-tabs { display: flex; gap: 4px; }

        .nav-tab {
            padding: 12px 16px;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-sub);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color .12s, border-color .12s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .nav-tab:hover { color: var(--ink); }
        .nav-tab.active { color: var(--brand-600); border-bottom-color: var(--brand-500); font-weight: 600; }

        .portal-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .card {
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 18px;
            box-shadow: var(--sh-sm);
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-body { padding: 20px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 520px) { .stats-grid { grid-template-columns: 1fr; } }
        @media (max-width: 640px) {
            .portal-header { padding: 1rem; flex-wrap: wrap; }
            .portal-nav { padding: 0 0.5rem; overflow-x: auto; }
            .nav-tabs { flex-wrap: nowrap; white-space: nowrap; }
            .portal-main { padding: 1rem; }
        }

        .stat-card {
            background: var(--surface);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--sh-sm);
        }

        .stat-icon { display: inline-flex; align-items: center; justify-content: center; margin-bottom: 8px; color: var(--brand-500); }
        .stat-icon svg { width: 22px; height: 22px; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; }
        .stat-label { font-size: 12px; color: var(--ink-sub); margin-top: 2px; }

        .welcome-card {
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            color: white;
            border: none;
            position: relative;
            overflow: hidden;
        }
        .welcome-card::before {
            content: ''; position: absolute; right: -60px; top: -60px;
            width: 240px; height: 240px;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
        }

        .welcome-card .card-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-text h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .welcome-text p { opacity: 0.9; }
        .welcome-icon { font-size: 4rem; }

        .item-list { display: flex; flex-direction: column; gap: 0.75rem; }

        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--n-50);
            border-radius: 10px;
            cursor: pointer;
            transition: background .12s, transform .12s;
            text-decoration: none;
            color: inherit;
        }
        .item:hover { background: var(--n-75); transform: translateX(2px); }

        .item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .item-icon.project { background: var(--acc-sky); color: var(--acc-sky-ink); }
        .item-icon.campaign { background: var(--acc-amber); color: var(--acc-amber-ink); }
        .item-icon.invoice { background: var(--acc-mint); color: var(--acc-mint-ink); }
        .item-icon.document { background: var(--acc-lavender); color: var(--acc-lavender-ink); }

        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 600; font-size: 13px; color: var(--ink); letter-spacing: -0.1px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 11px; color: var(--ink-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .item-status {
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            flex-shrink: 0;
        }
        .status-active, .status-paid { background: var(--acc-mint); color: var(--acc-mint-ink); }
        .status-pending, .status-in_progress { background: var(--acc-amber); color: var(--acc-amber-ink); }
        .status-draft { background: var(--n-100); color: var(--ink-sub); }
        .status-overdue { background: color-mix(in oklab, var(--err) 14%, transparent); color: var(--err); }

        .invoice-amount {
            font-weight: 700;
            color: #1e293b;
            margin-right: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state h3 { font-size: 1rem; font-weight: 500; }

        .error-screen {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-icon { font-size: 4rem; margin-bottom: 1rem; }
        .error-screen h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .error-screen p { color: #64748b; margin-bottom: 1.5rem; }

        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
            transition: background .12s;
            font-family: inherit;
        }
        .btn-primary { background: var(--brand-500); color: white; border-color: var(--brand-500); }
        .btn-primary:hover { background: var(--brand-600); }
        .btn-secondary { background: var(--n-75); color: var(--ink); border-color: transparent; }
        .btn-secondary:hover { background: var(--n-100); }

        .loading {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--n-100);
            border-top-color: var(--brand-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .contact-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, #fef3e7, #fce7f3);
            border-radius: 12px;
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f97316, #ec4899);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .contact-info { flex: 1; }
        .contact-info h4 { font-size: 1rem; margin-bottom: 0.25rem; }
        .contact-info p { font-size: 0.85rem; color: #64748b; }
        .contact-actions { display: flex; gap: 0.5rem; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .portal-header { padding: 1rem; }
            .portal-main { padding: 1rem; }
            .nav-tabs { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p style="color: #64748b;">Načítavam portál...</p>
        </div>
    </div>

    <script>
        // Config
        const SUPABASE_URL = 'https://eidkljfaeqvvegiponwl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpZGtsamZhZXF2dmVnaXBvbndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY4NTgzNjgsImV4cCI6MjA4MjQzNDM2OH0.jFJe_IddYNiO-TOAdxhPSYtSQJlx4i6CFflB0CN4AIQ';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // State
        let user = null;
        let client = null;
        let projects = [];
        let campaigns = [];
        let invoices = [];
        let documents = [];
        let tickets = [];
        let currentTab = 'dashboard';
        let expandedTicketId = null;
        let ticketReplies = {};

        async function init() {
            // Check authentication
            const { data: { session } } = await db.auth.getSession();
            
            if (!session) {
                window.location.href = '/portal/login.html';
                return;
            }
            
            user = session.user;

            try {
                // Get client user link
                const { data: clientUser, error: clientError } = await db
                    .from('client_users')
                    .select('*, clients(*)')
                    .eq('user_id', user.id)
                    .single();

                if (clientError || !clientUser) {
                    showError('Účet nie je prepojený', 'Váš účet nie je prepojený so žiadnou firmou. Kontaktujte podporu.');
                    return;
                }

                client = clientUser.clients;
                
                // Check if onboarding completed
                if (client.onboarding_status && client.onboarding_status !== 'completed') {
                    window.location.href = '/portal/onboarding.html';
                    return;
                }

                await Promise.all([loadProjects(), loadCampaigns(), loadInvoices(), loadDocuments(), loadTickets()]);
                render();

            } catch (error) {
                console.error('Init error:', error);
                showError('Chyba', 'Nastala chyba pri načítavaní. Skúste obnoviť stránku.');
            }
        }

        async function loadProjects() {
            const { data } = await db.from('campaign_projects').select('*').eq('client_id', client.id).order('created_at', { ascending: false });
            projects = data || [];
        }

        async function loadCampaigns() {
            const { data } = await db.from('campaigns').select('*').eq('client_id', client.id).order('created_at', { ascending: false });
            campaigns = data || [];
        }

        async function loadInvoices() {
            const { data } = await db.from('invoices').select('*').eq('client_id', client.id).order('created_at', { ascending: false });
            invoices = data || [];
        }

        async function loadDocuments() {
            const { data } = await db.from('documents').select('*').eq('client_id', client.id).eq('is_public', true).order('created_at', { ascending: false });
            documents = data || [];
        }

        async function loadTickets() {
            const { data } = await db.from('tickets').select('*').eq('client_id', client.id).order('created_at', { ascending: false });
            tickets = data || [];
        }

        function showError(title, message) {
            document.getElementById('app').innerHTML = `
                <div class="error-screen">
                    <div style="display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:12px; background:var(--n-75); color:var(--ink-mute); margin-bottom:12px;">${I.Warning({size:22})}</div>
                    <h1>${title}</h1>
                    <p>${message}</p>
                    <button class="btn btn-primary" onclick="logout()">Odhlásiť sa</button>
                </div>
            `;
        }

        async function logout() {
            await db.auth.signOut();
            window.location.href = '/portal/login.html';
        }

        function render() {
            const firstName = user.user_metadata?.full_name?.split(' ')[0] || client.contact_person?.split(' ')[0] || 'vážený klient';
            
            document.getElementById('app').innerHTML = `
                <header class="portal-header">
                    <div class="logo" style="display:flex; align-items:center; gap:10px;">
                        ${I.Logo({size:30, id:'pl'})}
                        <span class="logo-text" style="font-size:18px; font-weight:700; letter-spacing:-0.5px;">Adlify</span>
                        <span class="client-badge" style="background:var(--brand-50); color:var(--brand-700); font-weight:600; letter-spacing:0.4px; text-transform:uppercase;">Klient</span>
                    </div>
                    <div class="header-right" style="display:flex; align-items:center; gap:12px;">
                        <span class="client-name" style="font-size:13px; color:var(--ink-sub);">${client.company_name}</span>
                        <button class="adl-btn adl-btn-outline adl-btn-sm" onclick="logout()">${I.Logout({size:14})} Odhlásiť</button>
                    </div>
                </header>

                <nav class="portal-nav">
                    <div class="nav-tabs">
                        <button class="nav-tab ${currentTab === 'dashboard' ? 'active' : ''}" onclick="switchTab('dashboard')">${I.Dashboard({size:16})} Prehľad</button>
                        <button class="nav-tab ${currentTab === 'campaigns' ? 'active' : ''}" onclick="switchTab('campaigns')">${I.Campaign({size:16})} Kampane</button>
                        <button class="nav-tab ${currentTab === 'invoices' ? 'active' : ''}" onclick="switchTab('invoices')">${I.Invoice({size:16})} Faktúry</button>
                        <button class="nav-tab ${currentTab === 'documents' ? 'active' : ''}" onclick="switchTab('documents')">${I.Docs({size:16})} Dokumenty</button>
                        <button class="nav-tab ${currentTab === 'support' ? 'active' : ''}" onclick="switchTab('support')">${I.Ticket({size:16})} Podpora</button>
                        <button class="nav-tab ${currentTab === 'account' ? 'active' : ''}" onclick="switchTab('account')">${I.Settings({size:16})} Môj účet</button>
                    </div>
                </nav>

                <main class="portal-main">
                    ${renderContent()}
                </main>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            render();
        }

        function renderContent() {
            switch (currentTab) {
                case 'dashboard': return renderDashboard();
                case 'campaigns': return renderCampaigns();
                case 'invoices': return renderInvoices();
                case 'documents': return renderDocuments();
                case 'support': return renderSupport();
                case 'account': return renderAccount();
                default: return renderDashboard();
            }
        }

        function renderDashboard() {
            const firstName = user.user_metadata?.full_name?.split(' ')[0] || 'vážený klient';
            const unpaidInvoices = invoices.filter(i => i.status !== 'paid').length;
            const activeCampaigns = campaigns.filter(c => c.status === 'active').length;
            const openTickets = tickets.filter(t => t.status !== 'resolved' && t.status !== 'closed').length;
            
            return `
                <div class="card welcome-card">
                    <div class="card-body" style="position:relative; z-index:1;">
                        <div class="welcome-text">
                            <h1 style="font-size:28px; letter-spacing:-0.5px; margin-bottom:6px;">Vitajte, ${firstName}</h1>
                            <p style="opacity:0.9; font-size:14px;">Toto je Váš klientský portál — sledujte výkon kampaní, faktúry a komunikáciu s tímom.</p>
                        </div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><div style="color:var(--brand-500); display:inline-flex;">${I.Campaign({size:22})}</div><div class="stat-value">${activeCampaigns}</div><div class="stat-label">Aktívne kampane</div></div>
                    <div class="stat-card"><div style="color:var(--warn); display:inline-flex;">${I.Invoice({size:22})}</div><div class="stat-value">${unpaidInvoices}</div><div class="stat-label">Neuhradené faktúry</div></div>
                    <div class="stat-card"><div style="color:var(--acc-amber-ink); display:inline-flex;">${I.Ticket({size:22})}</div><div class="stat-value">${openTickets}</div><div class="stat-label">Otvorené tickety</div></div>
                    <div class="stat-card"><div style="color:var(--acc-sky-ink); display:inline-flex;">${I.Docs({size:22})}</div><div class="stat-value">${documents.length}</div><div class="stat-label">Dokumenty</div></div>
                </div>

                ${unpaidInvoices > 0 ? `
                    <div class="card" style="border-color: var(--warn);">
                        <div class="card-header" style="background: color-mix(in oklab, var(--warn) 12%, var(--surface));">
                            <h2 style="color:var(--warn); display:flex; align-items:center; gap:8px;">${I.Warning({size:18})} Neuhradené faktúry (${unpaidInvoices})</h2>
                            <button class="adl-btn adl-btn-primary adl-btn-sm" onclick="switchTab('invoices')">Zobraziť</button>
                        </div>
                    </div>
                ` : ''}

                ${renderProjects()}
            `;
        }

        function renderProjects() {
            return `
                <div class="card">
                    <div class="card-header">
                        <h2>Aktuálne projekty</h2>
                    </div>
                    <div class="card-body">
                        ${projects.length > 0 ? `
                            <div class="item-list">
                                ${projects.map(p => `
                                    <div class="item">
                                        <div class="item-icon project" style="color:var(--acc-sky-ink);">${I.Folder({size:18})}</div>
                                        <div class="item-info">
                                            <div class="item-name">${p.name}</div>
                                            <div class="item-meta">${p.description || 'Bez popisu'}</div>
                                        </div>
                                        <span class="item-status status-${p.status || 'draft'}">${getStatusLabel(p.status)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `<div style="padding:40px 24px; text-align:center; color:var(--ink-sub); background:var(--n-50); border-radius:10px;"><div style="display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:var(--n-75); color:var(--ink-mute); margin-bottom:10px;">${I.Folder({size:18})}</div><div style="font-size:14px; font-weight:600; color:var(--ink);">Zatiaľ žiadne projekty</div></div>`}
                    </div>
                </div>
            `;
        }

        function renderCampaigns() {
            return `
                <div class="card">
                    <div class="card-header"><h2>Vaše kampane</h2></div>
                    <div class="card-body">
                        ${campaigns.length > 0 ? `
                            <div class="item-list">
                                ${campaigns.map(c => `
                                    <div class="item">
                                        <div class="item-icon campaign" style="color:var(--acc-amber-ink);">${c.platform === 'meta' ? I.Fb({size:18}) : I.Google({size:18})}</div>
                                        <div class="item-info">
                                            <div class="item-name">${c.name}</div>
                                            <div class="item-meta">${c.platform === 'meta' ? 'Meta Ads' : 'Google Ads'} • Budget: ${formatCurrency(c.budget || 0)}/mes</div>
                                        </div>
                                        <span class="item-status status-${c.status || 'draft'}">${getStatusLabel(c.status)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `<div style="padding:40px 24px; text-align:center; color:var(--ink-sub); background:var(--n-50); border-radius:10px;"><div style="display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:var(--n-75); color:var(--ink-mute); margin-bottom:10px;">${I.Campaign({size:18})}</div><div style="font-size:14px; font-weight:600; color:var(--ink);">Zatiaľ žiadne kampane</div><div style="font-size:12px; margin-top:4px;">Kampane sa zobrazia po spustení</div></div>`}
                    </div>
                </div>
            `;
        }

        function renderInvoices() {
            return `
                <div class="card">
                    <div class="card-header"><h2>Faktúry</h2></div>
                    <div class="card-body">
                        ${invoices.length > 0 ? `
                            <div class="item-list">
                                ${invoices.map(i => `
                                    <div class="item">
                                        <div class="item-icon invoice" style="color:var(--acc-mint-ink);">${I.Invoice({size:18})}</div>
                                        <div class="item-info">
                                            <div class="item-name">${i.invoice_number || 'Faktúra'}</div>
                                            <div class="item-meta">Vystavená: ${formatDate(i.issue_date || i.created_at)} | Splatnosť: ${formatDate(i.due_date)}</div>
                                        </div>
                                        <span class="invoice-amount">${formatCurrency(i.total)}</span>
                                        <span class="item-status status-${i.status || 'pending'}">${getInvoiceStatusLabel(i.status)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `<div style="padding:40px 24px; text-align:center; color:var(--ink-sub); background:var(--n-50); border-radius:10px;"><div style="display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:var(--n-75); color:var(--ink-mute); margin-bottom:10px;">${I.Invoice({size:18})}</div><div style="font-size:14px; font-weight:600; color:var(--ink);">Zatiaľ žiadne faktúry</div></div>`}
                    </div>
                </div>
            `;
        }

        function renderDocuments() {
            return `
                <div class="card">
                    <div class="card-header"><h2>Dokumenty</h2></div>
                    <div class="card-body">
                        ${documents.length > 0 ? `
                            <div class="item-list">
                                ${documents.map(d => `
                                    <a href="${d.file_url}" target="_blank" class="item">
                                        <div class="item-icon document">${getDocIcon(d.category)}</div>
                                        <div class="item-info">
                                            <div class="item-name">${d.name}</div>
                                            <div class="item-meta">${d.file_name} • ${formatDate(d.created_at)}</div>
                                        </div>
                                        <span style="color:var(--ink-mute);">${I.Download({size:16})}</span>
                                    </a>
                                `).join('')}
                            </div>
                        ` : `<div style="padding:40px 24px; text-align:center; color:var(--ink-sub); background:var(--n-50); border-radius:10px;"><div style="display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:var(--n-75); color:var(--ink-mute); margin-bottom:10px;">${I.Docs({size:18})}</div><div style="font-size:14px; font-weight:600; color:var(--ink);">Zatiaľ žiadne dokumenty</div></div>`}
                    </div>
                </div>
            `;
        }

        function renderSupport() {
            return `
                <div class="card">
                    <div class="card-header">
                        <h2>${I.Plus({size:16})} Vytvoriť nový ticket</h2>
                    </div>
                    <div class="card-body">
                        <form id="ticket-form" onsubmit="submitTicket(event)" style="display:flex; flex-direction:column; gap:14px;">
                            <div>
                                <label style="display:block; font-size:12px; font-weight:500; color:var(--ink-sub); margin-bottom:4px;">Predmet *</label>
                                <input type="text" id="t-subject" required maxlength="200" class="adl-input" placeholder="Stručný popis problému alebo otázky">
                            </div>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                                <div>
                                    <label style="display:block; font-size:12px; font-weight:500; color:var(--ink-sub); margin-bottom:4px;">Kategória</label>
                                    <select id="t-category" class="adl-input">
                                        <option value="general">Všeobecné</option>
                                        <option value="billing">Fakturácia</option>
                                        <option value="technical">Technické</option>
                                        <option value="campaign">Kampaň</option>
                                        <option value="other">Iné</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="display:block; font-size:12px; font-weight:500; color:var(--ink-sub); margin-bottom:4px;">Priorita</label>
                                    <select id="t-priority" class="adl-input">
                                        <option value="low">Nízka</option>
                                        <option value="medium" selected>Stredná</option>
                                        <option value="high">Vysoká</option>
                                        <option value="urgent">Súrne</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label style="display:block; font-size:12px; font-weight:500; color:var(--ink-sub); margin-bottom:4px;">Popis</label>
                                <textarea id="t-description" rows="4" class="adl-input" style="resize:vertical; font-family:inherit;" placeholder="Detailný popis problému, kroky reprodukcie alebo otázka..."></textarea>
                            </div>
                            <div id="ticket-form-msg"></div>
                            <div style="display:flex; justify-content:flex-end;">
                                <button type="submit" id="ticket-submit-btn" class="adl-btn adl-btn-primary">${I.Send({size:14})} Odoslať ticket</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>${I.Ticket({size:16})} Vaše tickety (${tickets.length})</h2>
                    </div>
                    <div class="card-body">
                        ${tickets.length > 0 ? `
                            <div class="item-list">
                                ${tickets.map(t => renderTicketRow(t)).join('')}
                            </div>
                        ` : `
                            <div style="padding:40px 24px; text-align:center; color:var(--ink-sub); background:var(--n-50); border-radius:10px;">
                                <div style="display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:var(--n-75); color:var(--ink-mute); margin-bottom:10px;">${I.Ticket({size:18})}</div>
                                <div style="font-size:14px; font-weight:600; color:var(--ink);">Žiadne tickety</div>
                                <div style="font-size:12px; margin-top:4px;">Vytvorte prvý ticket vyššie</div>
                            </div>
                        `}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h2>${I.Phone({size:16})} Priamy kontakt</h2></div>
                    <div class="card-body">
                        <div class="contact-card">
                            <div class="contact-avatar">A</div>
                            <div class="contact-info">
                                <h4 style="font-size:15px; margin-bottom:2px;">Adlify Support</h4>
                                <p style="font-size:12px; color:var(--ink-sub);">Váš marketing partner · Po-Pi 9:00–17:00</p>
                            </div>
                            <div class="contact-actions">
                                <a href="mailto:info@adlify.eu" class="adl-btn adl-btn-outline adl-btn-sm">${I.Mail({size:14})} Email</a>
                                <a href="tel:+421944184045" class="adl-btn adl-btn-primary adl-btn-sm">${I.Phone({size:14})} Zavolať</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderTicketRow(t) {
            const statusMap = {
                open: { label: 'Otvorené', tone: 'sky' },
                in_progress: { label: 'V riešení', tone: 'amber' },
                waiting: { label: 'Čaká', tone: 'lav' },
                resolved: { label: 'Vyriešené', tone: 'mint' },
                closed: { label: 'Uzatvorené', tone: 'n' }
            };
            const priorityMap = {
                low: { label: 'Nízka', tone: 'n' },
                medium: { label: 'Stredná', tone: 'sky' },
                high: { label: 'Vysoká', tone: 'amber' },
                urgent: { label: 'Súrne', tone: 'err' }
            };
            const categoryLabel = ({ general: 'Všeobecné', billing: 'Fakturácia', technical: 'Technické', campaign: 'Kampaň', other: 'Iné' })[t.category] || t.category || '—';
            const status = statusMap[t.status] || statusMap.open;
            const priority = priorityMap[t.priority] || priorityMap.medium;
            return `
                <div style="padding:14px; background:var(--n-50); border-radius:10px; display:flex; flex-direction:column; gap:8px;">
                    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                        <div style="flex:1; min-width:0; font-size:14px; font-weight:600; color:var(--ink); letter-spacing:-0.1px;">${(t.subject || '—').replace(/</g,'&lt;')}</div>
                        <span class="adl-chip adl-chip-${status.tone} adl-chip-sm"><span class="dot"></span>${status.label}</span>
                    </div>
                    <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
                        <span class="adl-chip adl-chip-sm">${categoryLabel}</span>
                        <span class="adl-chip adl-chip-${priority.tone} adl-chip-sm">${priority.label}</span>
                        <span style="font-size:11px; color:var(--ink-mute); margin-left:auto;">${formatDate(t.created_at)}</span>
                    </div>
                    ${t.description ? `<div style="font-size:12px; color:var(--ink-sub); white-space:pre-wrap; line-height:1.5;">${t.description.replace(/</g,'&lt;')}</div>` : ''}
                </div>
            `;
        }

        async function submitTicket(e) {
            e.preventDefault();
            const subject = document.getElementById('t-subject').value.trim();
            const description = document.getElementById('t-description').value.trim();
            const category = document.getElementById('t-category').value;
            const priority = document.getElementById('t-priority').value;
            const btn = document.getElementById('ticket-submit-btn');
            const msg = document.getElementById('ticket-form-msg');
            if (!subject) return;

            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = 'Odosielam…';
            msg.innerHTML = '';

            try {
                const { data, error } = await db.from('tickets').insert([{
                    client_id: client.id,
                    subject,
                    description: description || null,
                    category,
                    priority,
                    status: 'open'
                }]).select().single();
                if (error) throw error;
                tickets.unshift(data);
                render();
            } catch (err) {
                console.error('Create ticket error:', err);
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} Chyba: ${err.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = original;
            }
        }

        function renderAccount() {
            const lbl = (text) => `<label style="display:block; font-size:12px; font-weight:500; color:var(--ink-sub); margin-bottom:4px;">${text}</label>`;
            const section = (title, body) => `
                <div style="background:var(--n-50); padding:18px; border-radius:12px; display:flex; flex-direction:column; gap:12px;">
                    <h3 style="margin:0; font-size:13px; font-weight:600; color:var(--ink); letter-spacing:-0.1px;">${title}</h3>
                    ${body}
                </div>`;
            return `
                <div class="card">
                    <div class="card-header">
                        <h2>${I.Settings({size:16})} Môj účet</h2>
                    </div>
                    <div class="card-body">
                        <form id="account-form" onsubmit="saveAccount(event)" style="display:flex; flex-direction:column; gap:18px;">
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:14px;">
                                ${section(`${I.Building({size:14})} Firemné údaje`, `
                                    <div>${lbl('Názov firmy')}<input type="text" id="acc-company" value="${client?.company_name || ''}" class="adl-input"></div>
                                    <div>${lbl('IČO')}<input type="text" id="acc-ico" value="${client?.ico || ''}" class="adl-input"></div>
                                    <div>${lbl('DIČ')}<input type="text" id="acc-dic" value="${client?.dic || ''}" class="adl-input"></div>
                                    <div>${lbl('IČ DPH')}<input type="text" id="acc-ic-dph" value="${client?.ic_dph || ''}" class="adl-input" placeholder="SK1234567890"></div>
                                    <div>${lbl('Web')}<input type="url" id="acc-web" value="${client?.domain || ''}" class="adl-input" placeholder="https://www.firma.sk"></div>
                                `)}

                                ${section(`${I.Phone({size:14})} Kontaktné údaje`, `
                                    <div>${lbl('Kontaktná osoba')}<input type="text" id="acc-contact" value="${client?.contact_person || ''}" class="adl-input"></div>
                                    <div>${lbl('Email')}<input type="email" id="acc-email" value="${client?.email || ''}" class="adl-input"></div>
                                    <div>${lbl('Telefón')}<input type="tel" id="acc-phone" value="${client?.phone || ''}" class="adl-input" placeholder="+421 9XX XXX XXX"></div>
                                `)}

                                ${section(`${I.Globe({size:14})} Fakturačná adresa`, `
                                    <div>${lbl('Ulica a číslo')}<input type="text" id="acc-street" value="${client?.billing_street || ''}" class="adl-input"></div>
                                    <div style="display:grid; grid-template-columns:1fr 2fr; gap:10px;">
                                        <div>${lbl('PSČ')}<input type="text" id="acc-zip" value="${client?.billing_zip || ''}" class="adl-input"></div>
                                        <div>${lbl('Mesto')}<input type="text" id="acc-city" value="${client?.billing_city || ''}" class="adl-input"></div>
                                    </div>
                                    <div>${lbl('Krajina')}<select id="acc-country" class="adl-input">
                                        <option value="SK" ${(client?.billing_country || 'SK') === 'SK' ? 'selected' : ''}>Slovensko</option>
                                        <option value="CZ" ${client?.billing_country === 'CZ' ? 'selected' : ''}>Česko</option>
                                        <option value="HU" ${client?.billing_country === 'HU' ? 'selected' : ''}>Maďarsko</option>
                                        <option value="AT" ${client?.billing_country === 'AT' ? 'selected' : ''}>Rakúsko</option>
                                        <option value="PL" ${client?.billing_country === 'PL' ? 'selected' : ''}>Poľsko</option>
                                    </select></div>
                                `)}
                            </div>

                            <div id="account-message"></div>

                            <div style="display:flex; gap:10px; justify-content:flex-end; padding-top:6px; border-top:1px solid var(--border);">
                                <button type="submit" class="adl-btn adl-btn-primary" id="save-account-btn">${I.Check({size:14})} Uložiť zmeny</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>${I.Lock({size:16})} Bezpečnosť</h2>
                    </div>
                    <div class="card-body">
                        <form id="password-form" onsubmit="changePassword(event)" style="display:flex; flex-direction:column; gap:14px; max-width:480px;">
                            <p style="margin:0; font-size:13px; color:var(--ink-sub);">Pre zmenu hesla zadajte nové dvakrát. Heslo musí mať aspoň 8 znakov.</p>
                            <div>${lbl('Nové heslo')}<input type="password" id="pw-new" required minlength="8" autocomplete="new-password" class="adl-input" placeholder="••••••••"></div>
                            <div>${lbl('Nové heslo (znova)')}<input type="password" id="pw-confirm" required minlength="8" autocomplete="new-password" class="adl-input" placeholder="••••••••"></div>
                            <div id="password-message"></div>
                            <div style="display:flex; justify-content:flex-end;">
                                <button type="submit" id="pw-submit-btn" class="adl-btn adl-btn-primary">${I.Lock({size:14})} Zmeniť heslo</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        async function changePassword(e) {
            e.preventDefault();
            const pw1 = document.getElementById('pw-new').value;
            const pw2 = document.getElementById('pw-confirm').value;
            const msg = document.getElementById('password-message');
            const btn = document.getElementById('pw-submit-btn');
            msg.innerHTML = '';
            if (pw1 !== pw2) {
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} Heslá sa nezhodujú</div>`;
                return;
            }
            btn.disabled = true;
            const original = btn.innerHTML;
            btn.innerHTML = 'Ukladám…';
            try {
                const { error } = await db.auth.updateUser({ password: pw1 });
                if (error) throw error;
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--ok) 14%, var(--surface)); color:var(--ok); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Check({size:14})} Heslo bolo zmenené</div>`;
                document.getElementById('pw-new').value = '';
                document.getElementById('pw-confirm').value = '';
            } catch (err) {
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} ${err.message}</div>`;
            }
            btn.disabled = false;
            btn.innerHTML = original;
        }

        async function saveAccount(e) {
            e.preventDefault();
            
            const btn = document.getElementById('save-account-btn');
            const msg = document.getElementById('account-message');
            
            btn.disabled = true;
            const originalBtn = btn.innerHTML;
            btn.innerHTML = 'Ukladám…';
            msg.innerHTML = '';

            try {
                const updateData = {
                    company_name: document.getElementById('acc-company').value.trim(),
                    ico: document.getElementById('acc-ico').value.trim(),
                    dic: document.getElementById('acc-dic').value.trim(),
                    ic_dph: document.getElementById('acc-ic-dph').value.trim(),
                    domain: document.getElementById('acc-web').value.trim(),
                    contact_person: document.getElementById('acc-contact').value.trim(),
                    email: document.getElementById('acc-email').value.trim(),
                    phone: document.getElementById('acc-phone').value.trim(),
                    billing_street: document.getElementById('acc-street').value.trim(),
                    billing_zip: document.getElementById('acc-zip').value.trim(),
                    billing_city: document.getElementById('acc-city').value.trim(),
                    billing_country: document.getElementById('acc-country').value
                };

                const { error } = await db
                    .from('clients')
                    .update(updateData)
                    .eq('id', client.id);

                if (error) throw error;

                Object.assign(client, updateData);

                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--ok) 14%, var(--surface)); color:var(--ok); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Check({size:14})} Údaje boli uložené</div>`;
                btn.disabled = false;
                btn.innerHTML = originalBtn;

            } catch (err) {
                console.error('Save error:', err);
                msg.innerHTML = `<div style="padding:10px 14px; background:color-mix(in oklab, var(--err) 12%, var(--surface)); color:var(--err); border-radius:8px; font-size:13px; display:inline-flex; align-items:center; gap:8px;">${I.Warning({size:14})} Chyba pri ukladaní: ${err.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = originalBtn;
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('sk-SK');
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('sk-SK', { style: 'currency', currency: 'EUR', minimumFractionDigits: 0 }).format(amount || 0);
        }

        function getStatusLabel(status) {
            const labels = { draft: 'Návrh', active: 'Aktívny', in_progress: 'V procese', completed: 'Dokončený', paused: 'Pozastavený' };
            return labels[status] || status || 'Návrh';
        }

        function getInvoiceStatusLabel(status) {
            const labels = { draft: 'Návrh', sent: 'Odoslaná', pending: 'Čaká', paid: 'Zaplatená', overdue: 'Po splatnosti' };
            return labels[status] || status || 'Čaká';
        }

        function getDocIcon(category) {
            const map = {
                contract: I.Edit({size:18}),
                invoice: I.Invoice({size:18}),
                proposal: I.Docs({size:18}),
                report: I.Chart({size:18}),
                image: I.Image({size:18})
            };
            return map[category] || I.Docs({size:18});
        }

        init();
    </script>
</body>
</html>
