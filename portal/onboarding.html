<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding | Adlify</title>
  <link rel="icon" type="image/svg+xml" href="/shared/img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Adlify Design System -->
  <link rel="stylesheet" href="/shared/css/tokens.css">
  <link rel="stylesheet" href="/shared/css/ui.css">
  <link rel="stylesheet" href="/shared/css/responsive.css">
  <script src="/shared/js/design/icons.js"></script>
  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--ink); }
    .loading-screen, .error-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background: var(--bg);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--n-100);
      border-top-color: var(--brand-500);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-screen h1 { font-size: 18px; font-weight: 700; color: var(--ink); margin: 12px 0 4px; }
    .error-screen p { color: var(--ink-sub); margin-bottom: 16px; max-width: 420px; }
    /* Onboarding module používa .gradient-bg ale nedefinuje ho — bez tohto je
       tlačidlo "Ďalej" biele na bielom pozadí = neviditeľné */
    .gradient-bg { background: linear-gradient(135deg, #7c3aed 0%, #ec4899 50%, #f97316 100%); }
    .gradient-bg:hover { background: linear-gradient(135deg, #6d28d9 0%, #db2777 50%, #ea580c 100%); }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div style="display:inline-flex; align-items:center; justify-content:center; margin-bottom:16px;" id="brand-mark"></div>
      <div class="spinner"></div>
      <p style="margin-top:16px; color:var(--ink-sub); font-size:13px;">Načítavam dotazník…</p>
    </div>
  </div>

  <!-- Core scripts -->
  <script src="/shared/js/core/config.js"></script>
  <script src="/shared/js/core/database.js"></script>
  <script src="/shared/js/core/utils.js"></script>

  <!-- Onboarding module -->
  <script src="/modules/onboarding/onboarding.js"></script>
  <script src="/modules/onboarding/onboarding-extension.js"></script>

  <script>
    (async function() {
      const app = document.getElementById('app');

      // Inject brand mark
      const brand = document.getElementById('brand-mark');
      if (brand && window.I) brand.innerHTML = I.Logo({ size: 56, id: 'ob' });

      function showError(title, message, linkText = 'Kontaktovať podporu', linkHref = 'mailto:info@adlify.eu') {
        app.innerHTML = `
          <div class="error-screen">
            <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:var(--n-75); color:var(--ink-mute); margin-bottom:8px;">${I.Warning({size:26})}</div>
            <h1>${title}</h1>
            <p>${message}</p>
            <a href="${linkHref}" class="adl-btn adl-btn-primary">${linkText}</a>
          </div>
        `;
      }

      function showLoading(text = 'Načítavam…') {
        app.innerHTML = `
          <div class="loading-screen">
            <div style="margin-bottom:16px;">${I.Logo({size:56, id:'ob2'})}</div>
            <div class="spinner"></div>
            <p style="margin-top:16px; color:var(--ink-sub); font-size:13px;">${text}</p>
          </div>
        `;
      }

      try {
        if (typeof Database !== 'undefined' && Database.init) {
          await Database.init();
        }

        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('t') || urlParams.get('token');
        let token = urlToken;

        if (!token && typeof Database !== 'undefined' && Database.client) {
          const { data: { session } } = await Database.client.auth.getSession();

          if (session) {
            const { data: clientUser, error: clientError } = await Database.client
              .from('client_users')
              .select('client_id, clients(id, onboarding_token, onboarding_status)')
              .eq('user_id', session.user.id)
              .single();

            if (clientError || !clientUser) {
              showError('Účet nie je prepojený', 'Váš účet nie je prepojený so žiadnou firmou.', 'Kontaktovať podporu', 'mailto:info@adlify.eu');
              return;
            }

            if (clientUser.clients?.onboarding_status === 'completed') {
              window.location.href = '/portal/';
              return;
            }

            token = clientUser.clients?.onboarding_token;
          }
        }

        if (!token) {
          showError(
            'Chýba prístupový token',
            'Pre prístup k dotazníku potrebujete platný odkaz z emailu alebo sa prihláste.',
            'Prihlásiť sa',
            '/portal/login.html'
          );
          return;
        }

        if (typeof OnboardingModule === 'undefined') {
          throw new Error('OnboardingModule sa nepodarilo načítať');
        }

        if (OnboardingModule.init) {
          OnboardingModule.init();
        }

        showLoading('Pripravujem dotazník…');
        await OnboardingModule.renderPublic(app, token);

      } catch (error) {
        console.error('Onboarding error:', error);
        showError(
          'Niečo sa pokazilo',
          `Nepodarilo sa načítať dotazník. Skúste obnoviť stránku. (${error.message})`,
          'Obnoviť stránku',
          'javascript:location.reload()'
        );
      }
    })();
  </script>
</body>
</html>
