<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nové heslo | Adlify klientský portál</title>
  <link rel="icon" type="image/png" href="https://eidkljfaeqvvegiponwl.supabase.co/storage/v1/object/public/assets/brand/logo_url_1771774258989.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/shared/css/tokens.css">
  <link rel="stylesheet" href="/shared/css/ui.css">
  <link rel="stylesheet" href="/shared/css/responsive.css">
  <script src="/shared/js/design/icons.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: var(--font-sans);
      color: var(--ink);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 32px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }
    .brand-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .brand-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .brand-text .tag {
      font-size: 11px; font-weight: 500; color: var(--ink-sub);
      letter-spacing: 0.4px; text-transform: uppercase; margin-left: 4px;
    }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.6px; margin: 0 0 8px; }
    .sub { font-size: 13px; color: var(--ink-sub); margin-bottom: 24px; line-height: 1.55; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      font-size: 14px; font-family: inherit;
      color: var(--ink);
      transition: border-color .12s, box-shadow .12s;
      box-sizing: border-box;
    }
    .field input:focus {
      outline: none;
      border-color: var(--brand-400);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand-500) 14%, transparent);
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px 16px;
      background: var(--brand-500);
      color: #fff;
      border: 0;
      border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .12s;
    }
    button[type="submit"]:hover { background: var(--brand-600); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; }
    .msg-error   { background: color-mix(in oklab, var(--err) 10%, var(--surface)); color: var(--err); border: 1px solid color-mix(in oklab, var(--err) 30%, transparent); }
    .msg-success { background: color-mix(in oklab, var(--ok)  10%, var(--surface)); color: var(--ok);  border: 1px solid color-mix(in oklab, var(--ok)  30%, transparent); }
    .msg-info    { background: color-mix(in oklab, var(--brand-500) 8%, var(--surface)); color: var(--brand-700); border: 1px solid color-mix(in oklab, var(--brand-500) 24%, transparent); }
    .foot { text-align: center; font-size: 12px; color: var(--ink-mute); margin-top: 18px; }
    .foot a { color: var(--brand-600); font-weight: 500; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-row">
      <span id="logo-slot"></span>
      <div class="brand-text">Adlify<span class="tag">Klient</span></div>
    </div>

    <h1>Nové heslo</h1>
    <p class="sub">Zvoľte si nové heslo pre svoj klientský účet. Po uložení vás presmerujeme na portál.</p>

    <div id="message"></div>

    <form id="reset-form">
      <div class="field">
        <label for="pw-new">Nové heslo</label>
        <input id="pw-new" type="password" minlength="8" autocomplete="new-password" required placeholder="min. 8 znakov">
      </div>
      <div class="field">
        <label for="pw-confirm">Potvrdiť heslo</label>
        <input id="pw-confirm" type="password" minlength="8" autocomplete="new-password" required placeholder="zopakujte heslo">
      </div>
      <button type="submit" id="submit-btn">Uložiť nové heslo</button>
    </form>

    <div class="foot">
      <a href="/portal/login.html">← Späť na prihlásenie</a>
    </div>
  </div>

  <script>
    document.getElementById('logo-slot').innerHTML = I.Logo({ size: 24 });

    const SUPABASE_URL = 'https://eidkljfaeqvvegiponwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpZGtsamZhZXF2dmVnaXBvbndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY4NTgzNjgsImV4cCI6MjA4MjQzNDM2OH0.jFJe_IddYNiO-TOAdxhPSYtSQJlx4i6CFflB0CN4AIQ';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const msgEl = document.getElementById('message');
    const showMsg = (cls, text) => msgEl.innerHTML = `<div class="msg ${cls}">${text}</div>`;
    const clearMsg = () => msgEl.innerHTML = '';

    // Supabase pri redirect z reset emailu vytvorí session typu 'recovery'.
    // Ak žiadna session — buď user prišiel priamo, alebo link expiroval.
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (!session) {
        showMsg('msg-info', 'Tento odkaz expiroval alebo bol už použitý. Požiadajte o nový z <a href="/portal/login.html" style="color:inherit; text-decoration:underline;">prihlasovacej stránky</a>.');
        document.getElementById('reset-form').style.display = 'none';
      }
    })();

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw1 = document.getElementById('pw-new').value;
      const pw2 = document.getElementById('pw-confirm').value;
      const btn = document.getElementById('submit-btn');
      clearMsg();

      if (pw1 !== pw2) { showMsg('msg-error', 'Heslá sa nezhodujú.'); return; }
      if (pw1.length < 8) { showMsg('msg-error', 'Heslo musí mať aspoň 8 znakov.'); return; }

      btn.disabled = true;
      btn.textContent = 'Ukladám…';

      const { error } = await db.auth.updateUser({ password: pw1 });
      if (error) {
        showMsg('msg-error', 'Nepodarilo sa uložiť heslo: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'Uložiť nové heslo';
        return;
      }

      showMsg('msg-success', 'Heslo zmenené. Presmerujem vás do portálu…');
      setTimeout(() => { window.location.href = '/portal/'; }, 1500);
    });
  </script>
</body>
</html>
