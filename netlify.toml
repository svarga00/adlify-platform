# Admin redirecty
[[redirects]]
  from = "/"
  to = "/admin/index.html"
  status = 200
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Portal - špecifické stránky (MUSIA byť PRED wildcardom!)
[[redirects]]
  from = "/portal/login.html"
  to = "/portal/login.html"
  status = 200
[[redirects]]
  from = "/portal/register.html"
  to = "/portal/register.html"
  status = 200
[[redirects]]
  from = "/portal/onboarding.html"
  to = "/portal/onboarding.html"
  status = 200
[[redirects]]
  from = "/portal/proposal.html"
  to = "/portal/proposal.html"
  status = 200
[[redirects]]
  from = "/portal/reset-password.html"
  to = "/portal/reset-password.html"
  status = 200

# Portal - SPA fallback pre dashboard
[[redirects]]
  from = "/portal"
  to = "/portal/index.html"
  status = 200
[[redirects]]
  from = "/portal/"
  to = "/portal/index.html"
  status = 200

# Funkcie
[functions]
  directory = "netlify/functions"

# Scheduled function — outreach scheduler (posiela ďalšie kroky kampaní)
# Cron: každú hodinu o :05
[functions."outreach-scheduler"]
  schedule = "5 * * * *"

# Scheduled function — sync Google/Meta Ads metrík každé 2 hodiny o :15
[functions."ads-scheduled-sync"]
  schedule = "15 */2 * * *"

# Plugin pre inštaláciu dependencies vo functions
[[plugins]]
  package = "@netlify/plugin-functions-install-core"
