<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketingová ponuka - Adlify</title>
  <link rel="icon" href="/admin/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; min-height: 100vh; }
    
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 1rem; }
    .loading .spinner { width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 1rem; text-align: center; padding: 2rem; }
    .error-page h1 { font-size: 4rem; color: #f97316; }
    .error-page p { color: #64748b; max-width: 400px; }
    .error-page a { color: #f97316; text-decoration: none; font-weight: 600; }
    .error-page a:hover { text-decoration: underline; }
    
    .proposal-container { max-width: 100%; }
    
    /* Floating action bar */
    .action-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 12px 24px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; gap: 12px; z-index: 1000; }
    .action-bar button { padding: 10px 20px; border: none; border-radius: 25px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .action-bar .btn-primary { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
    .action-bar .btn-primary:hover { box-shadow: 0 4px 15px rgba(249,115,22,0.4); transform: translateY(-2px); }
    .action-bar .btn-secondary { background: #f1f5f9; color: #475569; }
    .action-bar .btn-secondary:hover { background: #e2e8f0; }
    
    @media print {
      .action-bar { display: none !important; }
    }
    
    @media (max-width: 600px) {
      .action-bar { width: calc(100% - 40px); justify-content: center; }
      .action-bar button { padding: 10px 15px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Načítavam ponuku...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      // Supabase config - wrapped in IIFE to avoid conflicts
      const SUPABASE_URL = 'https://eidkljfaeqvvegiponwl.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpZGtsamZhZXF2dmVnaXBvbndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY4OTg0NjksImV4cCI6MjA2MjQ3NDQ2OX0.5n8Xti-xnM7pemH_kKALEfgnHfLnKAckqzLqLord0WU';
      
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      async function loadProposal() {
        const app = document.getElementById('app');
        
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('t') || urlParams.get('token');
        
        if (!token) {
          showError('Chýba token ponuky', 'Odkaz na ponuku nie je platný.');
          return;
        }
        
        console.log('Loading proposal with token:', token);
        
        try {
          // Fetch proposal
          const { data: proposal, error } = await db
            .from('proposals')
            .select('*')
            .eq('token', token)
            .single();
          
          console.log('Proposal result:', { proposal, error });
          
          if (error) {
            console.error('DB Error:', error);
            showError('Ponuka nenájdená', 'Táto ponuka neexistuje alebo jej platnosť vypršala. (' + error.message + ')');
            return;
          }
          
          if (!proposal) {
            showError('Ponuka nenájdená', 'Táto ponuka neexistuje.');
            return;
          }
          
          // Check expiration
          if (proposal.expires_at && new Date(proposal.expires_at) < new Date()) {
            showError('Ponuka vypršala', 'Platnosť tejto ponuky už vypršala. Kontaktujte nás pre novú ponuku.');
            return;
          }
          
          // Increment views (don't wait for it)
          db.rpc('increment_proposal_views', { proposal_token: token }).catch(console.warn);
          
          // Render proposal
          app.innerHTML = `
            <div class="proposal-container">
              ${proposal.html_content}
            </div>
            <div class="action-bar">
              <button class="btn-secondary" onclick="window.print()">
                📄 Stiahnuť PDF
              </button>
              <button class="btn-primary" onclick="window.location.href='mailto:info@adlify.eu?subject=Záujem o ponuku'">
                📧 Kontaktovať nás
              </button>
            </div>
          `;
          
          // Update page title
          document.title = 'Ponuka pre ' + (proposal.company_name || 'Vás') + ' - Adlify';
          
        } catch (err) {
          console.error('Load proposal error:', err);
          showError('Chyba', 'Nepodarilo sa načítať ponuku. Skúste to znova neskôr.');
        }
      }
      
      function showError(title, message) {
        document.getElementById('app').innerHTML = `
          <div class="error-page">
            <h1>😕</h1>
            <h2>${title}</h2>
            <p>${message}</p>
            <a href="https://adlify.eu">Navštíviť adlify.eu →</a>
          </div>
        `;
      }
      
      // Load on page ready
      loadProposal();
    })();
  </script>
</body>
</html>
