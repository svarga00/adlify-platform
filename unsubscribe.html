<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Odhlásenie z odberu — Adlify</title>
    <link rel="icon" type="image/svg+xml" href="/shared/img/favicon.svg">
<link rel="stylesheet" href="/shared/css/tokens.css">
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #F7F5F1; color: #14120E; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border: 1px solid #EAE6DE; border-radius: 16px; max-width: 520px; width: 100%; padding: 40px 36px; text-align: center; box-shadow: 0 20px 50px -12px rgba(20,18,14,0.08); }
  .icon { width: 56px; height: 56px; border-radius: 14px; background: #FFF7ED; color: #F97316; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; }
  h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  p { margin: 0 0 14px; color: #6F6758; line-height: 1.6; font-size: 15px; }
  .company { color: #14120E; font-weight: 600; }
  .actions { margin-top: 28px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  button { height: 44px; padding: 0 22px; border-radius: 11px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; font-family: inherit; transition: all .15s; }
  .btn-danger { background: #DC2626; color: #fff; border-color: #DC2626; }
  .btn-danger:hover { background: #B91C1C; }
  .btn-ghost { background: #fff; color: #6F6758; border-color: #E5E0D7; }
  .btn-ghost:hover { background: #F7F5F1; }
  .state-ok { display: none; }
  .state-ok .icon { background: #DCFCE7; color: #16A34A; }
  .error { color: #DC2626; background: #FEE2E2; border: 1px solid #FCA5A5; padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-top: 16px; display: none; }
</style>
</head>
<body>
  <div class="card" id="app">
    <div id="state-confirm">
      <div class="icon">✉</div>
      <h1>Odhlásiť z odberu</h1>
      <p>Naozaj sa chcete odhlásiť z outreach emailov od <span class="company">Adlify</span>?</p>
      <p id="company-line" style="font-size:13px;color:#948B7C;"></p>
      <div class="actions">
        <button class="btn-ghost" onclick="window.close()">Nie, zostať</button>
        <button class="btn-danger" id="confirm-btn" onclick="unsubscribe()">Áno, odhlásiť</button>
      </div>
      <div class="error" id="error"></div>
    </div>

    <div class="state-ok" id="state-ok">
      <div class="icon">✓</div>
      <h1>Odhlásené</h1>
      <p>Ďakujeme — viac od nás email nepríde. Ak to bola chyba, napíšte na <a href="mailto:info@adlify.eu" style="color:#F97316;text-decoration:none;">info@adlify.eu</a>.</p>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://eidkljfaeqvvegiponwl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpZGtsamZhZXF2dmVnaXBvbndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1Nzg3NjQsImV4cCI6MjA3MzE1NDc2NH0.8aRgXwwtXTGHOyWyOJXNF5UzjNcJDVDzO12MfJG4Nxk';
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(location.search);
  const token = params.get('t') || params.get('audit');

  // Load prospect info (ak existuje)
  (async () => {
    if (!token) return;
    const { data } = await db.from('prospects')
      .select('company_name, domain, email, outreach_stage')
      .eq('audit_token', token)
      .maybeSingle();
    if (data) {
      document.getElementById('company-line').textContent =
        `${data.company_name || data.domain || ''}${data.email ? ' · ' + data.email : ''}`;
      if (data.outreach_stage === 'unsubscribed') {
        // už odhlásený
        document.getElementById('state-confirm').style.display = 'none';
        document.getElementById('state-ok').style.display = 'block';
      }
    }
  })();

  window.unsubscribe = async () => {
    const btn = document.getElementById('confirm-btn');
    const err = document.getElementById('error');
    err.style.display = 'none';
    if (!token) {
      err.textContent = 'Chýba token — otvorte prosím pôvodný odkaz z emailu.';
      err.style.display = 'block';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Odhlasujem…';
    try {
      const r = await fetch('/.netlify/functions/unsubscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      if (!r.ok) {
        const t = await r.text().catch(() => '');
        throw new Error(t || `HTTP ${r.status}`);
      }
      document.getElementById('state-confirm').style.display = 'none';
      document.getElementById('state-ok').style.display = 'block';
    } catch (e) {
      err.textContent = 'Chyba: ' + e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Skúsiť znova';
    }
  };
</script>
</body>
</html>
